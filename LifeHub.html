function GamingGameRow({ game, onEdit, t, settings }) {
  const total = game.scores ? calcTotal(game.scores, settings.helhetWeight, game.nostalgi) : null;
  const scoreColor = total >= 9 ? t.orange : total >= 7 ? t.green : total >= 5 ? t.blue : "#ef4444";
  const completedStr = [game.completedMonth ? ["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"][parseInt(game.completedMonth)-1] : null, game.yearCompleted].filter(Boolean).join(" ");
  return (
    <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "12px 14px", marginBottom: 8, display: "flex", alignItems: "center", gap: 10 }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 600, fontSize: 14, color: t.text }}>{game.title}</div>
        <div style={{ display: "flex", gap: 8, marginTop: 3, flexWrap: "wrap" }}>
          {game.platform && <span style={{ fontSize: 11, color: t.textMuted }}>{game.platform}</span>}
          {game.status && <span style={{ fontSize: 11, color: t.textMuted }}>{game.status}</span>}
          {game.type && <span style={{ fontSize: 11, color: game.type === "anbefalt" ? t.orange : t.blue, fontWeight: 600 }}>{game.type}</span>}
          {completedStr && <span style={{ fontSize: 11, color: t.textFaint }}>{completedStr}</span>}
        </div>
        {game.notes && <div style={{ fontSize: 12, color: t.textFaint, marginTop: 3 }}>{game.notes}</div>}
      </div>
      {total !== null && <div style={{ fontSize: 18, fontWeight: 900, color: scoreColor, minWidth: 36, textAlign: "center" }}>{total}</div>}
      <button onClick={onEdit} style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 16, padding: "4px" }}>✏️</button>
    </div>
  );
}

// ── Main GamingApp component ───────────────────────────────────────────────────
function GamingApp({ t, onBack }) {
  const [tab, setTab] = useState("forside");
  const [loaded, setLoaded] = useState(false);
  const [platforms, setPlatforms] = useState(DEFAULT_PLATFORMS);
  const [releases, setReleases] = useState([]);
  const [backlog, setBacklog] = useState([]);
  const [wishlist, setWishlist] = useState([]);
  const [favorites, setFavorites] = useState([]);
  const [settings, setSettings] = useState({ helhetWeight: 2 });
  const [addRelease, setAddRelease] = useState(false);
  const [editRelease, setEditRelease] = useState(null);
  const [addBacklog, setAddBacklog] = useState(false);
  const [editBacklog, setEditBacklog] = useState(null);
  const [addWish, setAddWish] = useState(false);
  const [editWish, setEditWish] = useState(null);
  const [addFav, setAddFav] = useState(false);
  const [editFav, setEditFav] = useState(null);
  const [showSettingsPanel, setShowSettingsPanel] = useState(false);
  const [showPlatforms, setShowPlatforms] = useState(false);
  const [settingDays, setSettingDays] = useState("6");
  const [settingHours, setSettingHours] = useState("0");
  const [settingMins, setSettingMins] = useState("0");
  const [favTab, setFavTab] = useState("alle");
  const [favSort, setFavSort] = useState("score");

  const newReleaseDefault = { title: "", platform: "", releaseDate: "", dateType: "full", price: "", notes: "" };
  const newBacklogDefault = { title: "", platform: "", status: "ikke påbegynt", notes: "" };
  const newWishDefault    = { title: "", platform: "", type: "ønsk", notes: "" };
  const newFavDefault     = { title: "", platform: "", yearCompleted: "", completedMonth: "", scores: {}, notes: "" };

  const [newRel,  setNewRel]  = useState(newReleaseDefault);
  const [newBl,   setNewBl]   = useState(newBacklogDefault);
  const [newWish, setNewWish] = useState(newWishDefault);
  const [newFav,  setNewFav]  = useState(newFavDefault);

  useEffect(() => {
    async function load() {
      try {
        const p = localStorage.getItem("gaming:platforms");
        const r = localStorage.getItem("gaming:releases");
        const b = localStorage.getItem("gaming:backlog");
        const w = localStorage.getItem("gaming:wishlist");
        const f = localStorage.getItem("gaming:favorites");
        const s = localStorage.getItem("gaming:settings");
        if (p) setPlatforms(JSON.parse(p));
        if (r) setReleases(JSON.parse(r));
        if (b) setBacklog(JSON.parse(b));
        if (w) setWishlist(JSON.parse(w));
        if (f) setFavorites(JSON.parse(f));
        if (s) setSettings(JSON.parse(s));
        // Load shiny timer interval for settings panel
        try {
          const sh = localStorage.getItem("gaming:shiny");
          if (sh) {
            const shParsed = JSON.parse(sh);
            if (shParsed.__timer && shParsed.__timer.intervalMs) {
              const iv = shParsed.__timer.intervalMs;
              const totalMins = Math.round(iv / 60000);
              const d = Math.floor(totalMins / 1440);
              const h = Math.floor((totalMins % 1440) / 60);
              const m = totalMins % 60;
              setSettingDays(String(d));
              setSettingHours(String(h));
              setSettingMins(String(m));
            }
          }
        } catch(_) {}
      } catch(_) {}
      setLoaded(true);
    }
    load();
  }, []);

  function makeSaver(key, setter) {
    return (val) => { setter(val); try { localStorage.setItem("gaming:" + key, JSON.stringify(val)); } catch(_) {} };
  }
  const savePlatforms = makeSaver("platforms", setPlatforms);
  const saveReleases  = makeSaver("releases",  setReleases);
  const saveBacklog   = makeSaver("backlog",   setBacklog);
  const saveWishlist  = makeSaver("wishlist",  setWishlist);
  const saveFavorites = makeSaver("favorites", setFavorites);
  const saveSettings  = makeSaver("settings",  setSettings);

  function applyTimerSettings() {
    const d = parseInt(settingDays) || 0;
    const h = parseInt(settingHours) || 0;
    const m = parseInt(settingMins) || 0;
    const ms = ((d * 24 * 60) + (h * 60) + m) * 60000;
    const iv = ms > 0 ? ms : 6 * 24 * 60 * 60 * 1000;
    try {
      const raw = localStorage.getItem("gaming:shiny");
      const data = raw ? JSON.parse(raw) : {};
      data.__timer = { ...(data.__timer || {}), intervalMs: iv };
      localStorage.setItem("gaming:shiny", JSON.stringify(data));
    } catch(_) {}
    setShowSettingsPanel(false);
  }

  function injectReleaseToRegnskap(game) {
    if (!game.price || !game.releaseDate) return;
    const price = parseFloat(game.price);
    if (!price) return;
    const d = parseReleaseDate(game);
    if (!d) return;
    const mk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    try {
      const raw = localStorage.getItem("okonomi:transaksjoner");
      const trans = raw ? JSON.parse(raw) : {};
      const existing = trans[mk] || [];
      if (existing.some(tx => tx.gameId === game.id)) return;
      trans[mk] = [...existing, { id: "trans_" + Date.now(), label: "🎮 " + game.title, beløp: price, type: "utgift", kilde: "gaming", gameId: game.id }];
      localStorage.setItem("okonomi:transaksjoner", JSON.stringify(trans));
    } catch(_) {}
  }
  function removeReleaseFromRegnskap(gameId) {
    try {
      const raw = localStorage.getItem("okonomi:transaksjoner");
      if (!raw) return;
      const trans = JSON.parse(raw);
      Object.keys(trans).forEach(mk => { trans[mk] = trans[mk].filter(tx => tx.gameId !== gameId); });
      localStorage.setItem("okonomi:transaksjoner", JSON.stringify(trans));
    } catch(_) {}
  }

  const blue = t.blue; const blueDim = t.blueDim; const blueBorder = t.blueBorder;
  const inputStyle = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, boxSizing: "border-box", outline: "none", fontFamily: "inherit" };
  const selectStyle = { ...inputStyle, cursor: "pointer" };
  const labelStyle = { fontSize: 11, color: t.textMuted, display: "block", marginBottom: 4 };

  const sortedReleases = [...releases].sort((a, b) => {
    const da = parseReleaseDate(a); const db = parseReleaseDate(b);
    if (!da && !db) return 0; if (!da) return 1; if (!db) return -1;
    return da - db;
  });
  const nextRelease = sortedReleases.find(g => { const d = daysUntilRelease(g); return d !== null && d >= 0; });

  const sortedFavs = [...favorites].sort((a, b) => {
    const ta = calcTotal(a.scores, settings.helhetWeight, a.nostalgi);
    const tb = calcTotal(b.scores, settings.helhetWeight, b.nostalgi);
    if (favSort === "score") return (tb || 0) - (ta || 0);
    if (favSort === "alpha") return a.title.localeCompare(b.title, "nb");
    if (favSort === "year") return (b.yearCompleted || "").localeCompare(a.yearCompleted || "");
    if (favSort === "platform") return (a.platform || "").localeCompare(b.platform || "");
    return 0;
  });
  const allTimeFavs = sortedFavs.filter(f => { const s = calcTotal(f.scores, settings.helhetWeight, f.nostalgi); return s !== null && s >= 9; });

  const TABS = [["forside","🏠 Forside"],["releases","📅 Releases"],["backlog","📂 Backlog"],["ønskeliste","💫 Ønskeliste"],["favoritter","⭐ Favoritter"],["shiny","✨ Shiny"]];

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: t.textMuted }}>Laster...</div></div>;

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 70 }}>
      {/* Header */}
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.text }}>Gaming 🎮</span>
        <button onClick={() => setShowSettingsPanel(true)} style={{ background: "transparent", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 18 }}>⚙️</button>
      </div>

      {/* Tabs — wrapped */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6, padding: "14px 16px 0" }}>
        {TABS.map(([id, label]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ padding: "7px 12px", borderRadius: 12, border: `1px solid ${tab === id ? blueBorder : t.border}`, background: tab === id ? blueDim : "transparent", color: tab === id ? blue : t.textMuted, fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
            {label}
          </button>
        ))}
      </div>

      {/* ═══ FORSIDE ═══ */}
      {tab === "forside" && (
        <div style={{ padding: "16px 20px 0" }}>
          {nextRelease ? (
            <div style={{ background: blueDim, border: `1px solid ${blueBorder}`, borderRadius: 18, padding: "20px", marginBottom: 16 }}>
              <div style={{ fontSize: 11, color: t.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6 }}>Neste release</div>
              <div style={{ fontSize: 22, fontWeight: 900, color: t.text, marginBottom: 4 }}>{nextRelease.title}</div>
              <div style={{ fontSize: 13, color: t.textMuted, marginBottom: 12 }}>{nextRelease.platform && nextRelease.platform + " · "}{formatReleaseDate(nextRelease)}</div>
              {(() => {
                const d = daysUntilRelease(nextRelease);
                return d === 0 ? <div style={{ fontSize: 28, fontWeight: 900, color: t.orange }}>I DAG! 🎉</div>
                  : d === 1 ? <div style={{ fontSize: 28, fontWeight: 900, color: t.orange }}>I MORGEN!</div>
                  : <div style={{ display: "flex", alignItems: "baseline", gap: 6 }}>
                      <span style={{ fontSize: 48, fontWeight: 900, color: blue, lineHeight: 1 }}>{d}</span>
                      <span style={{ fontSize: 16, color: t.textMuted }}>dager igjen</span>
                    </div>;
              })()}
            </div>
          ) : (
            <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 18, padding: "20px", marginBottom: 16, textAlign: "center", color: t.textMuted }}>
              <div style={{ fontSize: 32, marginBottom: 8 }}>🎮</div>
              <div>Ingen kommende releases lagt inn</div>
            </div>
          )}
          <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
            {[["Backlog", backlog.length, "spill", t.text], ["Favoritter", favorites.length, "rangert", t.text], ["All Time", allTimeFavs.length, "≥9.0", t.orange]].map(([label, val, sub, color]) => (
              <div key={label} style={{ flex: 1, background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px" }}>
                <div style={{ fontSize: 11, color: t.textMuted, marginBottom: 4 }}>{label}</div>
                <div style={{ fontSize: 24, fontWeight: 800, color }}>{val}</div>
                <div style={{ fontSize: 11, color: t.textFaint }}>{sub}</div>
              </div>
            ))}
          </div>
          {sortedReleases.filter(g => { const d = daysUntilRelease(g); return d !== null && d > 0 && d <= 90; }).length > (nextRelease ? 1 : 0) && (
            <div>
              <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 8, fontWeight: 600 }}>Kommende 90 dager</div>
              {sortedReleases.filter(g => { const d = daysUntilRelease(g); return d !== null && d > 0 && d <= 90 && g.id !== nextRelease?.id; }).map(g => (
                <div key={g.id} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "10px 14px", marginBottom: 6, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: t.text }}>{g.title}</div>
                    <div style={{ fontSize: 11, color: t.textMuted }}>{g.platform}</div>
                  </div>
                  <div style={{ fontSize: 12, color: blue, fontWeight: 700 }}>om {daysUntilRelease(g)}d</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* ═══ RELEASES ═══ */}
      {tab === "releases" && (
        <div style={{ padding: "16px 20px 0" }}>
          {sortedReleases.length === 0 && !addRelease && (
            <div style={{ textAlign: "center", padding: "40px 20px", color: t.textMuted }}><div style={{ fontSize: 32, marginBottom: 10 }}>📅</div><div>Ingen releases lagt inn ennå</div></div>
          )}
          {sortedReleases.map(game => {
            const d = daysUntilRelease(game);
            const isReleased = d !== null && d < 0;
            return (
              <div key={game.id} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "12px 14px", marginBottom: 8 }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 15, color: isReleased ? t.textMuted : t.text }}>{game.title}</div>
                    <div style={{ display: "flex", gap: 8, marginTop: 3, flexWrap: "wrap", alignItems: "center" }}>
                      {game.platform && <span style={{ fontSize: 11, color: t.textMuted }}>{game.platform}</span>}
                      <span style={{ fontSize: 11, color: isReleased ? t.textFaint : blue, fontWeight: 600 }}>{formatReleaseDate(game)}</span>
                      {game.price && <span style={{ fontSize: 11, color: t.green, fontWeight: 600 }}>{game.price} kr</span>}
                    </div>
                    {game.notes && <div style={{ fontSize: 12, color: t.textFaint, marginTop: 4 }}>{game.notes}</div>}
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
                    {d !== null && d >= 0 && <div style={{ fontSize: 13, fontWeight: 700, color: d <= 7 ? t.orange : blue }}>{d === 0 ? "I dag!" : d === 1 ? "I morgen" : `${d}d`}</div>}
                    {isReleased && <div style={{ fontSize: 11, color: t.textFaint }}>Ute</div>}
                    <button onClick={() => setEditRelease({ ...game })} style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 15 }}>✏️</button>
                  </div>
                </div>
              </div>
            );
          })}
          <button onClick={() => { setNewRel(newReleaseDefault); setAddRelease(true); }}
            style={{ width: "100%", padding: "13px", borderRadius: 14, border: `1px dashed ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 4 }}>
            + Legg til release
          </button>
        </div>
      )}

      {/* ═══ BACKLOG ═══ */}
      {tab === "backlog" && (
        <div style={{ padding: "16px 20px 0" }}>
          {backlog.length === 0 && !addBacklog && (
            <div style={{ textAlign: "center", padding: "40px 20px", color: t.textMuted }}><div style={{ fontSize: 32, marginBottom: 10 }}>📂</div><div>Backloggen er tom!</div></div>
          )}
          {backlog.map(game => (
            <GamingGameRow key={game.id} game={game} t={t} settings={settings} onEdit={() => setEditBacklog({ ...game })} />

// ── Lister app ────────────────────────────────────────────────────────────────
// Storage: lister:notes, lister:categories
// Notes store `text` (plain string with line prefixes) instead of blocks.
// Line prefixes: "# " H1, "## " H2, "### " H3, "- " bullet, "1. " number,
//   "[] " unchecked, "[x] " checked. Leading "**" wraps not used; bold is per-line via "*b* ".

function getListerColors(isDark) {
  if (isDark) return {
    standard: null,
    rød:   { bg: "#2d1010", border: "#7f1d1d", accent: "#fca5a5" },
    gul:   { bg: "#2d2a08", border: "#713f12", accent: "#fde68a" },
    grønn: { bg: "#0d2a14", border: "#14532d", accent: "#86efac" },
    blå:   { bg: "#0c1a3d", border: "#1e3a6e", accent: "#93c5fd" },
    lilla: { bg: "#1a0d2e", border: "#4c1d95", accent: "#c4b5fd" },
  };
  return {
    standard: null,
    rød:   { bg: "#fde8e8", border: "#f5a0a0", accent: "#c0392b" },
    gul:   { bg: "#fef9e0", border: "#f5d67a", accent: "#92620a" },
    grønn: { bg: "#e6f9ee", border: "#7dd9a3", accent: "#1a6b3a" },
    blå:   { bg: "#e8f1fe", border: "#93c5fd", accent: "#1a56c4" },
    lilla: { bg: "#f0e8fe", border: "#c4b5fd", accent: "#5b21b6" },
  };
}
const LISTER_COLORS = getListerColors(true);

// Parse a single line into {type, checked, text}
function parseLine(line) {
  if (line.startsWith("### ")) return { type: "h3", text: line.slice(4) };
  if (line.startsWith("## ")) return { type: "h2", text: line.slice(3) };
  if (line.startsWith("# ")) return { type: "h1", text: line.slice(2) };
  if (line.startsWith("[x] ")) return { type: "check", checked: true, text: line.slice(4) };
  if (line.startsWith("[] ")) return { type: "check", checked: false, text: line.slice(3) };
  if (line.startsWith("- ")) return { type: "bullet", text: line.slice(2) };
  const numMatch = line.match(/^(\d+)\.\s(.*)$/);
  if (numMatch) return { type: "number", num: numMatch[1], text: numMatch[2] };
  return { type: "text", text: line };
}

// Convert legacy blocks -> text (for migrating old notes)
function blocksToText(blocks) {
  if (!blocks) return "";
  return blocks.map(b => {
    const c = b.content || "";
    if (b.type === "h1") return "# " + c;
    if (b.type === "h2") return "## " + c;
    if (b.type === "h3") return "### " + c;
    if (b.type === "bullet") return "- " + c;
    if (b.type === "number") return "1. " + c;
    if (b.type === "check") return (b.checked ? "[x] " : "[] ") + c;
    return c;
  }).join("\n");
}

function noteText(note) {
  if (typeof note.text === "string") return note.text;
  if (note.blocks) return blocksToText(note.blocks);
  return "";
}

// ── Rendered read-only view of note text (for cards + could reuse) ─────────────
function renderNoteLines(text, colors, opts) {
  const lines = text.split("\n");
  let numCounter = 0;
  const out = [];
  lines.forEach((line, i) => {
    const p = parseLine(line);
    if (p.type === "number") numCounter++; else if (p.type !== "text" || line === "") { if(p.type!=="number") numCounter = 0; }
    const base = { fontSize: 13, color: colors.accent, lineHeight: 1.5, marginBottom: 2, wordBreak: "break-word" };
    if (p.type === "h1") out.push(<div key={i} style={{ ...base, fontSize: 16, fontWeight: 900 }}>{p.text}</div>);
    else if (p.type === "h2") out.push(<div key={i} style={{ ...base, fontSize: 14, fontWeight: 800 }}>{p.text}</div>);
    else if (p.type === "h3") out.push(<div key={i} style={{ ...base, fontWeight: 700 }}>{p.text}</div>);
    else if (p.type === "bullet") out.push(<div key={i} style={{ ...base, display: "flex", gap: 6 }}><span style={{ color: colors.muted }}>•</span><span>{p.text}</span></div>);
    else if (p.type === "number") out.push(<div key={i} style={{ ...base, display: "flex", gap: 6 }}><span style={{ color: colors.muted, minWidth: 16 }}>{numCounter}.</span><span>{p.text}</span></div>);
    else if (p.type === "check") out.push(
      <div key={i} style={{ ...base, display: "flex", gap: 6, alignItems: "center", opacity: p.checked ? 0.6 : 1 }}>
        <div style={{ width: 12, height: 12, borderRadius: 3, border: `1.5px solid ${p.checked ? colors.green : colors.muted}`, background: p.checked ? colors.green : "transparent", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
          {p.checked && <span style={{ color: "#fff", fontSize: 8, fontWeight: 900 }}>✓</span>}
        </div>
        <span style={{ textDecoration: p.checked ? "line-through" : "none" }}>{p.text}</span>
      </div>
    );
    else out.push(<div key={i} style={{ ...base, minHeight: line === "" ? "0.7em" : "auto" }}>{p.text}</div>);
  });
  return out;
}

// ── Note editor ───────────────────────────────────────────────────────────────
function LNote({ note, onSave, onClose, onDelete, categories, colors, lColors }) {
  const [title, setTitle] = useState(note.title || "");
  const [text, setText] = useState(noteText(note));
  const [color, setColor] = useState(note.color || "standard");
  const [cat, setCat] = useState(note.category || "");
  const [pinned, setPinned] = useState(note.pinned || false);
  const [mode, setMode] = useState("edit"); // edit | preview
  const taRef = useRef(null);

  const lc = lColors || LISTER_COLORS;
  const col = lc[color];
  const bg = col ? col.bg : colors.bg;
  const border = col ? col.border : colors.border;
  const textColor = col ? col.accent : colors.text;

  // Apply a line-prefix to the current line(s) in the textarea
  function applyLinePrefix(prefix, toggle) {
    const ta = taRef.current;
    if (!ta) return;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const lines = text.split("\n");
    // Find which lines are covered by selection
    let charCount = 0, startLine = 0, endLine = 0;
    for (let i = 0; i < lines.length; i++) {
      const lineStart = charCount;
      const lineEnd = charCount + lines[i].length;
      if (start >= lineStart && start <= lineEnd) startLine = i;
      if (end >= lineStart && end <= lineEnd) endLine = i;
      charCount = lineEnd + 1;
    }
    const prefixes = ["# ", "## ", "### ", "- ", "1. ", "[] ", "[x] "];
    for (let i = startLine; i <= endLine; i++) {
      let ln = lines[i];
      // Strip existing prefix
      let stripped = ln;
      for (const p of prefixes) {
        if (stripped.startsWith(p)) { stripped = stripped.slice(p.length); break; }
      }
      const numM = stripped.match(/^\d+\.\s(.*)$/);
      if (numM) stripped = numM[1];
      // Toggle: if line already had this prefix, remove it
      const hadPrefix = ln.startsWith(prefix) || (prefix === "1. " && /^\d+\.\s/.test(ln));
      lines[i] = (toggle && hadPrefix) ? stripped : prefix + stripped;
    }
    const newText = lines.join("\n");
    setText(newText);
    setTimeout(() => { ta.focus(); }, 10);
  }

  function toggleBold() {
    const ta = taRef.current;
    if (!ta) return;
    const start = ta.selectionStart, end = ta.selectionEnd;
    if (start === end) return;
    const sel = text.slice(start, end);
    const wrapped = sel.startsWith("**") && sel.endsWith("**") ? sel.slice(2, -2) : "**" + sel + "**";
    const newText = text.slice(0, start) + wrapped + text.slice(end);
    setText(newText);
  }

  // Autoformat: Enter continues lists
  function handleKeyDown(e) {
    if (e.key === "Enter") {
      const ta = taRef.current;
      const pos = ta.selectionStart;
      const before = text.slice(0, pos);
      const curLineStart = before.lastIndexOf("\n") + 1;
      const curLine = before.slice(curLineStart);
      const p = parseLine(curLine);
      // If current line is an empty list item, break out
      if ((p.type === "bullet" || p.type === "number" || p.type === "check") && p.text.trim() === "") {
        e.preventDefault();
        const newText = text.slice(0, curLineStart) + "" + text.slice(pos);
        setText(newText);
        setTimeout(() => { ta.selectionStart = ta.selectionEnd = curLineStart; }, 0);
        return;
      }
      // Continue list
      let cont = null;
      if (p.type === "bullet") cont = "- ";
      else if (p.type === "check") cont = "[] ";
      else if (p.type === "number") cont = (parseInt(p.num) + 1) + ". ";
      if (cont) {
        e.preventDefault();
        const newText = text.slice(0, pos) + "\n" + cont + text.slice(pos);
        setText(newText);
        setTimeout(() => { ta.selectionStart = ta.selectionEnd = pos + 1 + cont.length; }, 0);
      }
    }
  }

  // Toggle a checkbox in preview mode
  function toggleCheckLine(lineIdx) {
    const lines = text.split("\n");
    const ln = lines[lineIdx];
    if (ln.startsWith("[] ")) lines[lineIdx] = "[x] " + ln.slice(3);
    else if (ln.startsWith("[x] ")) lines[lineIdx] = "[] " + ln.slice(4);
    setText(lines.join("\n"));
  }

  const fmtBtns = [
    ["# ", "H1"], ["## ", "H2"], ["### ", "H3"],
    ["- ", "•"], ["1. ", "1."], ["[] ", "☑"],
  ];

  return (
    <div style={{ position: "fixed", inset: 0, background: bg, zIndex: 100, display: "flex", flexDirection: "column" }}>
      {/* Top bar */}
      <div style={{ padding: "16px 16px 12px", display: "flex", gap: 8, alignItems: "center", borderBottom: `1px solid ${border}`, flexShrink: 0 }}>
        <button onClick={onClose} style={{ background: "transparent", border: "none", color: colors.muted, cursor: "pointer", fontSize: 22, lineHeight: 1, padding: "0 4px" }}>←</button>
        <input value={title} onChange={e => setTitle(e.target.value)} placeholder="Tittel"
          style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: textColor, fontSize: 18, fontWeight: 800, fontFamily: "inherit" }} />
        <button onClick={() => setMode(m => m === "edit" ? "preview" : "edit")}
          style={{ background: "transparent", border: `1px solid ${colors.border}`, borderRadius: 8, color: colors.muted, cursor: "pointer", fontSize: 12, padding: "5px 10px", fontWeight: 600 }}>
          {mode === "edit" ? "👁️" : "✏️"}
        </button>
        <button onClick={() => setPinned(p => !p)} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 20, opacity: pinned ? 1 : 0.35 }}>📌</button>
        <button onClick={() => onSave({ ...note, title, text, blocks: undefined, color, category: cat, pinned })}
          style={{ padding: "8px 16px", borderRadius: 10, border: `1px solid ${colors.blueBorder}`, background: colors.blueDim, color: colors.blue, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Lagre</button>
        {onDelete && <button onClick={onDelete} style={{ background: "transparent", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 20 }}>🗑️</button>}
      </div>

      {/* Category + color */}
      <div style={{ padding: "8px 16px", display: "flex", gap: 8, alignItems: "center", borderBottom: `1px solid ${border}`, flexShrink: 0, flexWrap: "wrap" }}>
        <select value={cat} onChange={e => setCat(e.target.value)}
          style={{ background: colors.surface2, border: `1px solid ${colors.border}`, borderRadius: 8, color: colors.muted, fontSize: 12, padding: "4px 8px", cursor: "pointer", fontFamily: "inherit" }}>
          <option value="">Ingen kategori</option>
          {categories.map(c => <option key={c}>{c}</option>)}
        </select>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          {Object.entries(lc).map(([name, c]) => (
            <button key={name} onClick={() => setColor(name)}
              style={{ width: 22, height: 22, borderRadius: 11, background: c ? c.bg : colors.surface, border: `2px solid ${color === name ? (c ? c.accent : colors.text) : (c ? c.border : colors.border)}`, cursor: "pointer" }} />
          ))}
        </div>
      </div>

      {/* Content area */}
      <div style={{ flex: 1, overflowY: "auto", display: "flex", flexDirection: "column" }}>
        {mode === "edit" ? (
          <textarea
            ref={taRef}
            value={text}
            onChange={e => setText(e.target.value)}
            onKeyDown={handleKeyDown}
            placeholder="Skriv her..."
            style={{ flex: 1, width: "100%", background: "transparent", border: "none", outline: "none", color: textColor, fontFamily: "inherit", fontSize: 15, lineHeight: 1.6, padding: "16px", resize: "none", boxSizing: "border-box", minHeight: "40vh" }}
          />
        ) : (
          <div style={{ padding: "16px", flex: 1 }}>
            {text.split("\n").map((line, i) => {
              const p = parseLine(line);
              if (p.type === "check") {
                return (
                  <div key={i} style={{ display: "flex", gap: 8, marginBottom: 4, alignItems: "center", opacity: p.checked ? 0.6 : 1 }}>
                    <button onClick={() => toggleCheckLine(i)}
                      style={{ width: 18, height: 18, borderRadius: 4, border: `2px solid ${p.checked ? colors.green : colors.muted}`, background: p.checked ? colors.green : "transparent", flexShrink: 0, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                      {p.checked && <span style={{ color: "#fff", fontSize: 10, fontWeight: 900 }}>✓</span>}
                    </button>
                    <span style={{ fontSize: 15, color: textColor, textDecoration: p.checked ? "line-through" : "none" }}>{p.text}</span>
                  </div>
                );
              }
              return <div key={i}>{renderNoteLines(line, { accent: textColor, muted: colors.muted, green: colors.green })}</div>;
            })}
          </div>
        )}
      </div>

      {/* Format toolbar — only in edit mode */}
      {mode === "edit" && (
        <div style={{ display: "flex", gap: 6, padding: "10px 12px", borderTop: `1px solid ${border}`, flexShrink: 0, flexWrap: "wrap", background: colors.surface }}>
          {fmtBtns.map(([prefix, label]) => (
            <button key={label} onMouseDown={e => { e.preventDefault(); applyLinePrefix(prefix, true); }}
              style={{ padding: "7px 12px", borderRadius: 8, border: `1px solid ${colors.border}`, background: "transparent", color: colors.text, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
              {label}
            </button>
          ))}
          <button onMouseDown={e => { e.preventDefault(); toggleBold(); }}
            style={{ padding: "7px 12px", borderRadius: 8, border: `1px solid ${colors.border}`, background: "transparent", color: colors.text, fontSize: 13, fontWeight: 900, cursor: "pointer" }}>B</button>
        </div>
      )}
    </div>
  );
}

// ── Note card ─────────────────────────────────────────────────────────────────
function LCard({ note, colors, lColors, onOpen, selectMode, selected }) {
  const lc = lColors || LISTER_COLORS;
  const col = lc[note.color || "standard"];
  const bg = col ? col.bg : colors.surface;
  const border = col ? col.border : colors.border;
  const accent = col ? col.accent : colors.text;
  const muted = col ? col.accent + "88" : colors.muted;

  const text = noteText(note);
  const lines = text.split("\n").filter(l => {
    const p = parseLine(l);
    return !(p.type === "check" && p.checked);
  }).slice(0, 6);
  const allLines = text.split("\n");
  const checks = allLines.map(parseLine).filter(p => p.type === "check");
  const doneChecks = checks.filter(p => p.checked).length;

  const isSelected = selected && selectMode;
  return (
    <div onClick={onOpen} style={{ background: bg, border: `2px solid ${isSelected ? colors.blue : border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10, cursor: "pointer", position: "relative" }}>
      {selectMode && <div style={{ position: "absolute", top: 10, right: 10, width: 20, height: 20, borderRadius: 10, border: `2px solid ${isSelected ? colors.blue : colors.muted}`, background: isSelected ? colors.blue : "transparent", display: "flex", alignItems: "center", justifyContent: "center" }}>
        {isSelected && <span style={{ color: "#fff", fontSize: 12, fontWeight: 900 }}>✓</span>}
      </div>}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: note.title ? 6 : 0, paddingRight: selectMode ? 28 : 0 }}>
        {note.title && <div style={{ fontWeight: 700, fontSize: 15, color: accent }}>{note.title}</div>}
        {note.pinned && !selectMode && <span style={{ fontSize: 12, flexShrink: 0, marginLeft: 8 }}>📌</span>}
      </div>
      <div style={{ opacity: 0.9 }}>
        {renderNoteLines(lines.join("\n"), { accent, muted, green: colors.green })}
      </div>
      {allLines.length > 6 && <div style={{ fontSize: 11, color: muted, marginTop: 4 }}>…</div>}
      {checks.length > 0 && <div style={{ marginTop: 6, fontSize: 11, color: muted }}>✓ {doneChecks}/{checks.length}</div>}
      {note.category && <div style={{ marginTop: 4, fontSize: 10, color: muted }}>{note.category}</div>}
    </div>
  );
}

// ── Keep importer ─────────────────────────────────────────────────────────────
function keepToNote(kn) {
  let text = "";
  if (kn.listContent) {
    text = kn.listContent.filter(i => i.text).map(i => (i.isChecked ? "[x] " : "[] ") + i.text).join("\n");
  } else if (kn.textContent) {
    text = kn.textContent;
  }
  return { id: "k" + Date.now() + String(Math.random()).slice(2,6), title: kn.title || "", text, color: "standard", category: "Keep-import", pinned: false, createdAt: kn.createdTimestampUsec ? Math.floor(kn.createdTimestampUsec/1000) : Date.now() };
}

// ── Main app ──────────────────────────────────────────────────────────────────
function ListerApp({ th, onBack }) {
  const [loaded, setLoaded] = useState(false);
  const [notes, setNotes] = useState([]);
  const [cats, setCats] = useState(["Jobb","Privat","Handling","Ideer","Rangeringer og moro"]);
  const [active, setActive] = useState(null);
  const [isNew, setIsNew] = useState(false);
  const [filterCat, setFilterCat] = useState("Alle");
  const [search, setSearch] = useState("");
  const [showCatEdit, setShowCatEdit] = useState(false);
  const [newCat, setNewCat] = useState("");
  const [showImport, setShowImport] = useState(false);
  const [importMsg, setImportMsg] = useState("");
  const [selectMode, setSelectMode] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [showBulkCat, setShowBulkCat] = useState(false);

  useEffect(()=>{
    try{
      const n=localStorage.getItem("lister:notes");
      const c=localStorage.getItem("lister:categories");
      if(n)setNotes(JSON.parse(n));
      if(c)setCats(JSON.parse(c));
    }catch(_){}
    setLoaded(true);
  },[]);

  function saveN(v){setNotes(v);try{localStorage.setItem("lister:notes",JSON.stringify(v));}catch(_){}}
  function saveC(v){setCats(v);try{localStorage.setItem("lister:categories",JSON.stringify(v));}catch(_){}}

  function toggleSelect(id) { setSelectedIds(prev => prev.includes(id) ? prev.filter(x=>x!==id) : [...prev, id]); }
  function applyBulkCat(cat) {
    saveN(notes.map(n => selectedIds.includes(n.id) ? {...n, category: cat} : n));
    setSelectedIds([]); setSelectMode(false); setShowBulkCat(false);
  }

  function handleSave(note){
    const updated=isNew?[...notes,{...note,id:"n"+Date.now(),createdAt:Date.now()}]:notes.map(n=>n.id===note.id?note:n);
    saveN(updated); setActive(null);
  }

  async function handleImport(e){
    const file=e.target.files[0]; if(!file)return;
    setImportMsg("Importerer...");
    try{
      if(file.name.endsWith(".zip")){
        if(!window.JSZip){setImportMsg("Last opp enkelt JSON-fil i stedet");return;}
        const zip=await window.JSZip.loadAsync(file);
        const imp=[]; const proms=[];
        zip.forEach((path,entry)=>{
          if(path.includes("Keep/")&&path.endsWith(".json"))
            proms.push(entry.async("string").then(t=>{try{imp.push(keepToNote(JSON.parse(t)));}catch(_){}}));
        });
        await Promise.all(proms);
        if(!imp.length){setImportMsg("Ingen notater funnet");return;}
        const cl=cats.includes("Keep-import")?cats:[...cats,"Keep-import"];
        saveC(cl); saveN([...notes,...imp]);
        setImportMsg("✓ Importerte "+imp.length+" notater!");
      } else {
        const txt=await file.text(); const data=JSON.parse(txt);
        const arr=Array.isArray(data)?data:[data];
        const imp=arr.map(keepToNote);
        const cl=cats.includes("Keep-import")?cats:[...cats,"Keep-import"];
        saveC(cl); saveN([...notes,...imp]);
        setImportMsg("✓ Importerte "+imp.length+" notater!");
      }
    }catch(_){setImportMsg("Noe gikk galt, prøv igjen");}
  }

  const isDark = th.bg === "#0d1117";
  const LISTER_COLORS = getListerColors(isDark);
  const colors = {
    bg: th.bg, surface: th.surface, surface2: th.surface2, border: th.border,
    text: th.text, muted: th.textMuted, faint: th.textFaint,
    green: th.green, blue: th.blue, blueDim: th.blueDim, blueBorder: th.blueBorder,
    orange: th.orange, overlay: th.overlay,
  };

  const allF = notes.filter(n=>{
    const cm=filterCat==="Alle"||n.category===filterCat;
    const sm=!search||n.title?.toLowerCase().includes(search.toLowerCase())||noteText(n).toLowerCase().includes(search.toLowerCase());
    return cm&&sm;
  }).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));

  const pinned=allF.filter(n=>n.pinned);
  const unpinned=allF.filter(n=>!n.pinned);

  const inputSt={width:"100%",background:th.bg,border:`1px solid ${th.border}`,borderRadius:10,padding:"10px 12px",color:th.text,fontSize:14,boxSizing:"border-box",outline:"none",fontFamily:"inherit"};

  if(active){
    return <LNote note={active} onSave={handleSave} onClose={()=>setActive(null)}
      onDelete={isNew?null:()=>{saveN(notes.filter(n=>n.id!==active.id));setActive(null);}}
      categories={cats} colors={colors} lColors={LISTER_COLORS}/>;
  }

  if(!loaded) return <div style={{background:th.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{color:th.textMuted}}>Laster...</div></div>;

  return (
    <div style={{background:th.bg,minHeight:"100vh",color:th.text,paddingBottom:80}}>
      <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={onBack} style={{background:th.surface2,border:`1px solid ${th.border}`,borderRadius:10,padding:"8px 14px",color:th.textMuted,fontSize:13,fontWeight:600,cursor:"pointer"}}>← Tilbake</button>
        <span style={{fontSize:20,fontWeight:800,color:th.text}}>Lister 📋</span>
        <div style={{display:"flex",gap:8}}>
          {selectMode
            ? <>
                <button onClick={()=>setShowBulkCat(true)} disabled={selectedIds.length===0}
                  style={{padding:"6px 12px",borderRadius:10,border:`1px solid ${th.blueBorder}`,background:selectedIds.length>0?th.blueDim:"transparent",color:selectedIds.length>0?th.blue:th.textFaint,fontSize:12,fontWeight:700,cursor:"pointer"}}>
                  Flytt ({selectedIds.length})
                </button>
                <button onClick={()=>{setSelectMode(false);setSelectedIds([]);}}
                  style={{background:"transparent",border:"none",color:th.textMuted,cursor:"pointer",fontSize:14,fontWeight:700}}>Avbryt</button>
              </>
            : <>
                <button onClick={()=>{setSelectMode(true);setSelectedIds([]);}} style={{background:"transparent",border:"none",color:th.textMuted,cursor:"pointer",fontSize:18}} title="Velg flere">☑️</button>
                <button onClick={()=>{setShowImport(true);setImportMsg("");}} style={{background:"transparent",border:"none",color:th.textMuted,cursor:"pointer",fontSize:18}} title="Importer fra Keep">⬆️</button>
                <button onClick={()=>setShowCatEdit(true)} style={{background:"transparent",border:"none",color:th.textMuted,cursor:"pointer",fontSize:18}}>⚙️</button>
              </>
          }
        </div>
      </div>

      <div style={{padding:"12px 20px 0"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Søk i notater..." style={inputSt}/>
      </div>

      <div style={{display:"flex",flexWrap:"wrap",gap:6,padding:"10px 20px 0"}}>
        {["Alle",...cats].map(c=>(
          <button key={c} onClick={()=>setFilterCat(c)}
            style={{padding:"6px 12px",borderRadius:20,border:`1px solid ${filterCat===c?th.blueBorder:th.border}`,background:filterCat===c?th.blueDim:"transparent",color:filterCat===c?th.blue:th.textMuted,fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
            {c}
          </button>
        ))}
      </div>

      <div style={{padding:"12px 20px 0"}}>
        {allF.length===0&&(
          <div style={{textAlign:"center",padding:"40px 20px",color:th.textMuted}}>
            <div style={{fontSize:32,marginBottom:10}}>📋</div>
            <div>{search?"Ingen notater matcher søket":"Ingen notater ennå"}</div>
          </div>
        )}
        {pinned.length>0&&<>
          <div style={{fontSize:11,fontWeight:700,color:th.textFaint,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>📌 Festet</div>
          {pinned.map(n=><LCard key={n.id} note={n} colors={colors} lColors={LISTER_COLORS} selectMode={selectMode} selected={selectedIds.includes(n.id)} onOpen={()=>{if(selectMode)toggleSelect(n.id);else{setActive(n);setIsNew(false);}}}/>)}
        </>}
        {pinned.length>0&&unpinned.length>0&&<div style={{fontSize:11,fontWeight:700,color:th.textFaint,textTransform:"uppercase",letterSpacing:1,marginBottom:8,marginTop:4}}>Andre</div>}
        {unpinned.map(n=><LCard key={n.id} note={n} colors={colors} lColors={LISTER_COLORS} selectMode={selectMode} selected={selectedIds.includes(n.id)} onOpen={()=>{if(selectMode)toggleSelect(n.id);else{setActive(n);setIsNew(false);}}}/>)}
      </div>

      <button onClick={()=>{
        setActive({id:null,title:"",text:"",color:"standard",category:filterCat!=="Alle"?filterCat:"",pinned:false});
        setIsNew(true);
      }} style={{position:"fixed",bottom:28,right:24,width:56,height:56,borderRadius:28,background:th.blue,border:"none",color:"#fff",fontSize:28,cursor:"pointer",boxShadow:"0 4px 16px rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:50}}>+</button>

      {showCatEdit&&(
        <div style={{position:"fixed",inset:0,background:th.overlay,zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowCatEdit(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:th.surface,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,padding:"24px 20px 44px",borderTop:`1px solid ${th.border}`,maxHeight:"70vh",overflowY:"auto"}}>
            <div style={{fontWeight:700,fontSize:17,marginBottom:16,color:th.text}}>Kategorier</div>
            {cats.map((c,i)=>(
              <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"center"}}>
                <input value={c} onChange={e=>{const a=[...cats];a[i]=e.target.value;saveC(a);}} style={{...inputSt,flex:1}}/>
                <button onClick={()=>saveC(cats.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:18}}>×</button>
              </div>
            ))}
            <div style={{display:"flex",gap:8,marginTop:8}}>
              <input value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Ny kategori..." style={{...inputSt,flex:1}}
                onKeyDown={e=>{if(e.key==="Enter"&&newCat.trim()){saveC([...cats,newCat.trim()]);setNewCat("");}}}/>
              <button onClick={()=>{if(newCat.trim()){saveC([...cats,newCat.trim()]);setNewCat("");}}}
                style={{padding:"10px 16px",borderRadius:10,border:`1px solid ${th.blueBorder}`,background:th.blueDim,color:th.blue,fontWeight:700,cursor:"pointer"}}>+</button>
            </div>
          </div>
        </div>
      )}

      {showBulkCat&&(
        <div style={{position:"fixed",inset:0,background:th.overlay,zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setShowBulkCat(false)}>
          <div onClick={e=>e.stopPropagation()} style={{background:th.surface,borderRadius:"20px 20px 0 0",width:"100%",maxWidth:480,padding:"24px 20px 44px",borderTop:`1px solid ${th.border}`}}>

function SettingsModal({ t, darkMode, onToggleDark, onClose }) {
  const [importStatus, setImportStatus] = useState(null); // null | "ok" | "feil"

  function exportData() {
    const data = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k) data[k] = localStorage.getItem(k);
    }
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    const date = new Date().toISOString().slice(0, 10);
    a.download = `lifehub-backup-${date}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function importData(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
      try {
        const data = JSON.parse(evt.target.result);
        Object.entries(data).forEach(([k, v]) => localStorage.setItem(k, v));
        setImportStatus("ok");
        setTimeout(() => { setImportStatus(null); onClose(); window.location.reload(); }, 1500);
      } catch (_) {
        setImportStatus("feil");
        setTimeout(() => setImportStatus(null), 2500);
      }
    };
    reader.readAsText(file);
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "28px 24px 44px", borderTop: `1px solid ${t.border}` }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24 }}>
          <span style={{ fontWeight: 800, fontSize: 18, color: t.text }}>Innstillinger</span>
          <button onClick={onClose} style={{ background: t.surface2, border: "none", borderRadius: 20, width: 32, height: 32, cursor: "pointer", color: t.textMuted, fontSize: 18, display: "flex", alignItems: "center", justifyContent: "center" }}>×</button>
        </div>

        {/* Mørk/lys */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 0", borderBottom: `1px solid ${t.border}` }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: 15, color: t.text }}>Modus</div>
            <div style={{ fontSize: 12, color: t.textMuted, marginTop: 2 }}>{darkMode ? "Mørk modus" : "Lys modus"}</div>
          </div>
          <button onClick={onToggleDark} style={{ width: 52, height: 28, borderRadius: 14, border: "none", cursor: "pointer", background: darkMode ? t.orange : t.border, position: "relative", transition: "background 0.2s" }}>
            <div style={{ position: "absolute", top: 3, left: darkMode ? 26 : 3, width: 22, height: 22, borderRadius: 11, background: "#fff", transition: "left 0.2s", boxShadow: "0 1px 3px rgba(0,0,0,0.3)" }} />
          </button>

        {/* Eksport */}
        <div style={{ padding: "14px 0", borderBottom: `1px solid ${t.border}` }}>

          <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 10 }}>Last ned alle data som en JSON-fil</div>
          <button onClick={exportData}
            style={{ padding: "10px 18px", borderRadius: 10, border: `1px solid ${t.border}`, background: t.surface2, color: t.text, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
            ⬇️ Eksporter data

// ── Glad i dag app ─────────────────────────────────────────────────────────────
// Storage: gladidag:entries  { "YYYY-MM-DD": "tekst" }
//          gladidag:settings { startHour, startMin, endHour, endMin, noEnd, excludeWords[] }

const GLADIDAG_STOPWORDS = new Set([
  "og","med","på","til","av","jeg","meg","som","er","en","et","ei","det","den","de",
  "han","hun","vi","de","at","fra","i","ikke","men","så","om","for","har","hadde",
  "var","ble","kan","vil","skal","sin","sitt","sine","min","mitt","mine","din","ditt",
  "dine","seg","etter","over","under","ut","inn","opp","ned","her","der","når","da",
  "nå","også","bare","litt","veldig","ganske","noe","noen","alle","hva","hvem","hvor",
  "hvordan","etter","inn","ble","blitt","at","å","om","slik","oss","dere","dem","seg",
]);

const NORSKE_MÅNEDER = ["Januar","Februar","Mars","April","Mai","Juni","Juli","August","September","Oktober","November","Desember"];
const NORSKE_MÅNEDER_KORT = ["Jan","Feb","Mar","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Des"];

function toDateKey(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function yesterdayKey() {
  const d = new Date(); d.setDate(d.getDate() - 1); return toDateKey(d);
}

function parseTimeStr(h, m) {
  return h * 60 + m;
}

function shouldPulse(entries, settings) {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();
  const today = todayKey();
  const yesterday = yesterdayKey();
  const todayFilled = !!entries[today];
  const yesterdayFilled = !!entries[yesterday];

  // Always pulse if yesterday missing
  if (!yesterdayFilled) return true;

  // Pulse for today after start time
  if (!todayFilled) {
    const startMin = parseTimeStr(settings.startHour ?? 22, settings.startMin ?? 30);
    const afterStart = nowMin >= startMin;
    if (!afterStart) return false;
    if (settings.noEnd) return true;
    if (settings.endHour != null) {
      const endMin = parseTimeStr(settings.endHour, settings.endMin ?? 0);
      return nowMin < endMin;
    }
    return true;
  }
  return false;
}

function GladIDagCalendar({ t, entries, onSelectDate, year, month }) {
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const todayStr = todayKey();
  // Adjust so week starts Monday
  const startOffset = (firstDay + 6) % 7;
  const cells = [];
  for (let i = 0; i < startOffset; i++) cells.push(null);
  for (let d = 1; d <= daysInMonth; d++) cells.push(d);

  const isDark = t.bg === "#0d1117";

  return (
    <div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 2, marginBottom: 4 }}>
        {["Ma","Ti","On","To","Fr","Lø","Sø"].map(d => (
          <div key={d} style={{ textAlign: "center", fontSize: 11, fontWeight: 700, color: t.textFaint, padding: "4px 0" }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
        {cells.map((day, i) => {
          if (!day) return <div key={`e${i}`} />;
          const key = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const hasFuture = key > todayStr;
          const hasEntry = !!entries[key];
          const isToday = key === todayStr;
          return (
            <button key={key} onClick={() => !hasFuture && onSelectDate(key)}
              style={{
                aspectRatio: "1",
                borderRadius: 8,
                border: isToday ? `2px solid ${t.green}` : `1px solid ${hasEntry ? t.green : t.border}`,
                background: hasEntry ? (isDark ? "#0a2e1a" : "#f0fdf4") : hasFuture ? "transparent" : t.surface,
                cursor: hasFuture ? "default" : "pointer",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center",
                gap: 2,
                opacity: hasFuture ? 0.3 : 1,
              }}>
              <span style={{ fontSize: 13, fontWeight: isToday ? 800 : 500, color: isToday ? t.green : hasEntry ? t.green : t.text }}>{day}</span>
              {hasEntry && <div style={{ width: 4, height: 4, borderRadius: 2, background: t.green }} />}
            </button>
          );
        })}
      </div>
    </div>
  );
}

function GladIDagStats({ t, entries, allSettings, onShowSettings }) {
  const isDark = t.bg === "#0d1117";
  const [filterYear, setFilterYear] = useState("alle");
  const [filterMonth, setFilterMonth] = useState("alle");
  const excludeWords = allSettings.excludeWords || [];
  const removedBuiltin = allSettings.removedBuiltin || [];

  const allKeys = Object.keys(entries).sort();
  const years = [...new Set(allKeys.map(k => k.slice(0,4)))].sort();

  const filteredEntries = allKeys.filter(k => {
    if (filterYear !== "alle" && !k.startsWith(filterYear)) return false;
    if (filterMonth !== "alle" && k.slice(5,7) !== filterMonth) return false;
    return true;
  });

  // Effective stopwords = built-in minus ones the user has re-enabled
  const effectiveStopwords = new Set([...GLADIDAG_STOPWORDS].filter(w => !removedBuiltin.includes(w)));

  // Word frequency
  const freq = {};
  filteredEntries.forEach(dateKey => {
    const text = entries[dateKey] || "";
    const words = text.toLowerCase()
      .replace(/[.,!?;:()\[\]«»"'<>🥰]/g, " ")
      .split(/\s+/)
      .filter(w => w.length > 2 && !effectiveStopwords.has(w) && !excludeWords.includes(w));
    words.forEach(w => { freq[w] = (freq[w] || 0) + 1; });
  });

  const sorted = Object.entries(freq).sort((a,b) => b[1]-a[1]).slice(0, 40);
  const totalEntries = filteredEntries.length;

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.text, fontSize: 13, outline: "none", fontFamily: "inherit" };

  return (
    <div style={{ paddingBottom: 80 }}>
      {/* Filters */}
      <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap", alignItems: "center" }}>
        {years.length > 1 && (
          <select value={filterYear} onChange={e => setFilterYear(e.target.value)} style={inputSt}>
            <option value="alle">Alle år</option>
            {years.map(y => <option key={y} value={y}>{y}</option>)}
          </select>
        )}
        <select value={filterMonth} onChange={e => setFilterMonth(e.target.value)} style={inputSt}>
          <option value="alle">Alle måneder</option>
          {NORSKE_MÅNEDER.map((m,i) => (
            <option key={i} value={String(i+1).padStart(2,"0")}>{m}</option>
          ))}
        </select>
        <div style={{ fontSize: 12, color: t.textMuted }}>{totalEntries} oppføringer</div>
      </div>

      {/* Word cloud */}
      {sorted.length === 0
        ? <div style={{ color: t.textMuted, fontSize: 14, textAlign: "center", padding: "32px 0" }}>Ingen data å vise ennå</div>
        : (
        <div style={{ marginBottom: 24 }}>
          <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 12 }}>Ord og navn som går igjen</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {sorted.map(([word, count]) => {
              const maxCount = sorted[0][1];
              const size = 11 + Math.round((count / maxCount) * 10);
              const alpha = 0.4 + (count / maxCount) * 0.6;
              return (
                <div key={word} style={{
                  background: isDark ? `rgba(34,197,94,${alpha * 0.18})` : `rgba(22,163,74,${alpha * 0.12})`,
                  border: `1px solid rgba(34,197,94,${alpha * 0.5})`,
                  borderRadius: 20, padding: "4px 10px",
                  fontSize: size, fontWeight: count >= 3 ? 700 : 500,
                  color: isDark ? `rgba(134,239,172,${0.6 + alpha*0.4})` : `rgba(22,163,74,${0.7 + alpha*0.3})`,
                }}>
                  {word} <span style={{ fontSize: size - 2, opacity: 0.7 }}>×{count}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* Link to settings for word management */}
      <button onClick={onShowSettings}
        style={{ width: "100%", padding: "12px 16px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.surface, color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span>⚙️ Administrer ekskluderte ord{excludeWords.length > 0 ? ` (${excludeWords.length} egne)` : ""}{removedBuiltin.length > 0 ? `, ${removedBuiltin.length} gjeninnført` : ""}</span>
        <span style={{ fontSize: 16 }}>›</span>
      </button>
    </div>
  );
}

function GladIDagSettings({ t, settings, onSave, onClose }) {
  const [sh, setSh] = useState(settings.startHour ?? 22);
  const [sm, setSm] = useState(settings.startMin ?? 30);
  const [noEnd, setNoEnd] = useState(settings.noEnd ?? true);
  const [eh, setEh] = useState(settings.endHour ?? 23);
  const [em, setEm] = useState(settings.endMin ?? 0);
  const [excludeInput, setExcludeInput] = useState("");
  const [showBuiltin, setShowBuiltin] = useState(false);
  const excludeWords = settings.excludeWords || [];
  const removedBuiltin = settings.removedBuiltin || [];

  function save(overrides = {}) {
    onSave({ ...settings, startHour: sh, startMin: sm, noEnd, endHour: noEnd ? null : eh, endMin: noEnd ? null : em, ...overrides });
  }
  function saveAndClose() { save(); onClose(); }

  function addExclude() {
    const w = excludeInput.trim().toLowerCase();
    if (!w || excludeWords.includes(w)) { setExcludeInput(""); return; }
    onSave({ ...settings, startHour: sh, startMin: sm, noEnd, endHour: noEnd ? null : eh, endMin: noEnd ? null : em, excludeWords: [...excludeWords, w] });
    setExcludeInput("");
  }
  function removeExclude(w) {
    onSave({ ...settings, startHour: sh, startMin: sm, noEnd, endHour: noEnd ? null : eh, endMin: noEnd ? null : em, excludeWords: excludeWords.filter(x => x !== w) });
  }
  function removeBuiltin(w) {
    onSave({ ...settings, startHour: sh, startMin: sm, noEnd, endHour: noEnd ? null : eh, endMin: noEnd ? null : em, removedBuiltin: [...removedBuiltin, w] });
  }
  function restoreBuiltin(w) {
    onSave({ ...settings, startHour: sh, startMin: sm, noEnd, endHour: noEnd ? null : eh, endMin: noEnd ? null : em, removedBuiltin: removedBuiltin.filter(x => x !== w) });
  }

  const builtinList = [...GLADIDAG_STOPWORDS].sort();

          <div style={sectionSt}>
