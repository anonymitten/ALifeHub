      <div style={{ margin: "12px 20px 0", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "10px 14px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 5, fontSize: 12, color: t.textMuted }}>
          <span>{totalVurdert} / {totalItems} vurdert</span>
          <span style={{ color: "#c084fc", fontWeight: 700 }}>{Math.round(totalVurdert/totalItems*100)}%</span>
        </div>
        <div style={{ height: 5, background: t.surface2, borderRadius: 3 }}>
          <div style={{ height: 5, borderRadius: 3, background: "#c084fc", width: `${totalVurdert/totalItems*100}%` }} />
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 8, padding: "12px 20px 0" }}>
        {[["liste","📋 Liste"],["profil","✨ Profil"]].map(([id,lbl]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ padding: "8px 18px", borderRadius: 20, border: `1px solid ${tab===id ? "#c084fc" : t.border}`,
              background: tab===id ? "#c084fc20" : "transparent", color: tab===id ? "#c084fc" : t.textMuted,
              fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
            {lbl}
          </button>
        ))}
      </div>

      {tab === "liste" && (
        <div>
          {/* Sticky emoji legend */}
          <div style={{ position: "sticky", top: 0, zIndex: 20, background: t.bg, borderBottom: `1px solid ${t.border}`, padding: "8px 20px", display: "flex", gap: 10, overflowX: "auto" }}>
            {KINK_STATUS_KEYS.map(sk => {
              const s = KINK_STATUS[sk];
              return (
                <div key={sk} style={{ display: "flex", alignItems: "center", gap: 4, flexShrink: 0 }}>
                  <span style={{ fontSize: 14 }}>{s.emoji}</span>
                  <span style={{ fontSize: 11, color: s.color || t.textFaint, whiteSpace: "nowrap", fontWeight: 600 }}>{s.label}</span>
                </div>
              );
            })}
          </div>

          {/* Filter */}
          <div style={{ display: "flex", gap: 6, padding: "10px 20px 0", overflowX: "auto" }}>
            {filterOpts.map(([k,l]) => (
              <button key={k} onClick={() => setFilter(k)}
                style={{ padding: "6px 12px", borderRadius: 20, border: `1px solid ${filter===k ? "#c084fc" : t.border}`,
                  background: filter===k ? "#c084fc20" : "transparent", color: filter===k ? "#c084fc" : t.textMuted,
                  fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
                {l}
              </button>
            ))}
          </div>

          {/* Category tabs */}
          <div style={{ display: "flex", gap: 6, padding: "8px 20px 0", overflowX: "auto" }}>
            {KINK_KATEGORIER.map(k => {
              const katItems = k.items;
              const vurdert = katItems.filter(i => vurderinger[i.id]).length;
              return (
                <button key={k.id} onClick={() => setActiveCat(k.id)}
                  style={{ padding: "6px 12px", borderRadius: 20, border: `1px solid ${activeCat===k.id ? "#f472b6" : t.border}`,
                    background: activeCat===k.id ? "#f472b615" : "transparent", color: activeCat===k.id ? "#f472b6" : t.textMuted,
                    fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
                  {k.navn} <span style={{ opacity: 0.6 }}>({vurdert}/{katItems.length})</span>
                </button>
              );
            })}
          </div>

          <div style={{ padding: "12px 20px 0" }}>
            {KINK_KATEGORIER.filter(k => k.id === activeCat).map(kat => (
              <KinkKategori key={kat.id} kat={kat} vurderinger={vurderinger} notater={notater}
                onSetStatus={setStatus} onSetNotat={setNotat}
                openNotater={openNotater} onToggleNotat={toggleNotat}
                filter={filter} t={t} />
            ))}
          </div>
        </div>
      )}

      {tab === "profil" && <KinkProfil vurderinger={vurderinger} t={t} />}
    </div>
  );
}


// ── Hemmelig: Sex-bucketlist ───────────────────────────────────────────────────
// Storage: hemmelig:bucketlist

function blLoad() {
  try { const r = localStorage.getItem("hemmelig:bucketlist"); return r ? JSON.parse(r) : { vil: [], vilIkke: [] }; } catch(_) { return { vil: [], vilIkke: [] }; }
}
function blSave(data) {
  try { localStorage.setItem("hemmelig:bucketlist", JSON.stringify(data)); } catch(_) {}
}
function blBlankVil() {
  return { id: "bl" + Date.now(), navn: "", prioritet: 3, gjort: false, gjortDato: "", notat: "" };
}
function blBlankVilIkke() {
  return { id: "bln" + Date.now(), navn: "", forklaring: "" };
}

function BucketlistApp({ t, onBack }) {
  const [data, setData] = useState({ vil: [], vilIkke: [] });
  const [loaded, setLoaded] = useState(false);
  const [tab, setTab] = useState("vil");
  const [editItem, setEditItem] = useState(null);
  const [editType, setEditType] = useState(null);
  const [showAddVil, setShowAddVil] = useState(false);
  const [showAddVilIkke, setShowAddVilIkke] = useState(false);
  const [newVil, setNewVil] = useState(blBlankVil());
  const [newVilIkke, setNewVilIkke] = useState(blBlankVilIkke());

  useEffect(() => { setData(blLoad()); setLoaded(true); }, []);
  function save(updated) { setData(updated); blSave(updated); }

  function addVil() {
    if (!newVil.navn.trim()) return;
    save({ ...data, vil: [...data.vil, { ...newVil, id: "bl" + Date.now() }] });
    setNewVil(blBlankVil()); setShowAddVil(false);
  }
  function addVilIkke() {
    if (!newVilIkke.navn.trim()) return;
    save({ ...data, vilIkke: [...data.vilIkke, { ...newVilIkke, id: "bln" + Date.now() }] });
    setNewVilIkke(blBlankVilIkke()); setShowAddVilIkke(false);
  }
  function toggleGjort(id) {
    const now = new Date().toISOString().split("T")[0];
    save({ ...data, vil: data.vil.map(i => i.id===id ? { ...i, gjort: !i.gjort, gjortDato: !i.gjort ? now : "" } : i) });
  }
  function deleteVil(id) {
    if (!confirm("Slette?")) return;
    save({ ...data, vil: data.vil.filter(i => i.id !== id) });
    setEditItem(null);
  }
  function deleteVilIkke(id) {
    if (!confirm("Slette?")) return;
    save({ ...data, vilIkke: data.vilIkke.filter(i => i.id !== id) });
    setEditItem(null);
  }
  function saveEdit() {
    if (editType === "vil") save({ ...data, vil: data.vil.map(i => i.id===editItem.id ? editItem : i) });
    else save({ ...data, vilIkke: data.vilIkke.map(i => i.id===editItem.id ? editItem : i) });
    setEditItem(null); setEditType(null);
  }

  const vilSorted = [...data.vil].sort((a,b) => {
    if (a.gjort !== b.gjort) return a.gjort ? 1 : -1;
    return b.prioritet - a.prioritet;
  });
  const gjortCount = data.vil.filter(i => i.gjort).length;

  const inputSt = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "9px 12px", color: t.text, fontSize: 14, boxSizing: "border-box" };
  const secSt = { background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: 16, marginBottom: 12 };

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;

  // Edit modal
  if (editItem) {
    const isVil = editType === "vil";
    return (
      <div style={{ background: t.bg, minHeight: "100vh", paddingBottom: 60 }}>
        <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${t.border}`, position: "sticky", top: 0, background: t.bg, zIndex: 10 }}>
          <button onClick={() => setEditItem(null)} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Avbryt</button>
          <span style={{ fontWeight: 800, fontSize: 15, color: isVil ? "#22c55e" : "#ef4444" }}>{isVil ? "✅ Rediger" : "🚫 Rediger"}</span>
          <button onClick={saveEdit} style={{ background: "#c084fc", border: "none", borderRadius: 10, padding: "8px 16px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Lagre</button>
        </div>
        <div style={{ padding: 16 }}>
          <div style={secSt}>
            <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 6 }}>Navn</div>
            <input value={editItem.navn} onChange={e => setEditItem(p => ({ ...p, navn: e.target.value }))} style={inputSt} />
          </div>
          {isVil && (
            <div style={secSt}>
              <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 8 }}>Prioritet</div>
              <div style={{ display: "flex", gap: 8 }}>
                {[1,2,3,4,5].map(n => (
                  <button key={n} onClick={() => setEditItem(p => ({ ...p, prioritet: n }))}
                    style={{ flex: 1, height: 36, borderRadius: 10, border: `1px solid ${editItem.prioritet===n ? "#22c55e" : t.border}`,
                      background: editItem.prioritet===n ? "#22c55e20" : "transparent",
                      color: editItem.prioritet===n ? "#22c55e" : t.textMuted, fontSize: 14, fontWeight: 700, cursor: "pointer" }}>
                    {n}
                  </button>
                ))}
              </div>
            </div>
          )}
          <div style={secSt}>
            <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 6 }}>{isVil ? "Notat" : "Forklaring"}</div>
            <textarea value={isVil ? (editItem.notat||"") : (editItem.forklaring||"")}
              onChange={e => setEditItem(p => ({ ...p, [isVil ? "notat" : "forklaring"]: e.target.value }))}
              style={{ ...inputSt, minHeight: 70, resize: "vertical" }} />
          </div>
          <button onClick={() => isVil ? deleteVil(editItem.id) : deleteVilIkke(editItem.id)}
            style={{ width: "100%", padding: 12, borderRadius: 12, border: "1px solid #ef4444", background: "transparent", color: "#ef4444", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
            Slett
          </button>
        </div>
      </div>
    );
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontWeight: 800, fontSize: 18, color: "#22c55e" }}>✅ Sex-bucketlist</span>
        <button onClick={() => tab === "vil" ? setShowAddVil(true) : setShowAddVilIkke(true)}
          style={{ background: tab === "vil" ? "#22c55e" : "#ef4444", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ny</button>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 8, padding: "12px 20px 0" }}>
        <button onClick={() => setTab("vil")}
          style={{ flex: 1, padding: "9px", borderRadius: 20, border: `1px solid ${tab==="vil" ? "#22c55e" : t.border}`,
            background: tab==="vil" ? "#22c55e20" : "transparent", color: tab==="vil" ? "#22c55e" : t.textMuted,
            fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          ✅ Vil prøve ({gjortCount}/{data.vil.length})
        </button>
        <button onClick={() => setTab("vilIkke")}
          style={{ flex: 1, padding: "9px", borderRadius: 20, border: `1px solid ${tab==="vilIkke" ? "#ef4444" : t.border}`,
            background: tab==="vilIkke" ? "#ef444420" : "transparent", color: tab==="vilIkke" ? "#ef4444" : t.textMuted,
            fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
          🚫 Vil ikke ({data.vilIkke.length})
        </button>
      </div>

      {/* Add form — Vil prøve */}
      {showAddVil && (
        <div style={{ margin: "12px 20px 0", background: t.surface, border: `1px solid #22c55e40`, borderRadius: 14, padding: 16 }}>
          <input value={newVil.navn} onChange={e => setNewVil(p => ({ ...p, navn: e.target.value }))}
            placeholder="Hva vil du prøve?"
            style={{ ...inputSt, marginBottom: 10 }} />
          <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
            {[1,2,3,4,5].map(n => (
              <button key={n} onClick={() => setNewVil(p => ({ ...p, prioritet: n }))}
                style={{ flex: 1, height: 34, borderRadius: 8, border: `1px solid ${newVil.prioritet===n ? "#22c55e" : t.border}`,
                  background: newVil.prioritet===n ? "#22c55e20" : "transparent",
                  color: newVil.prioritet===n ? "#22c55e" : t.textMuted, fontSize: 13, cursor: "pointer" }}>
                {n}
              </button>
            ))}
          </div>
          <textarea value={newVil.notat} onChange={e => setNewVil(p => ({ ...p, notat: e.target.value }))}
            placeholder="Notat (valgfritt)..."
            style={{ ...inputSt, minHeight: 50, resize: "vertical", marginBottom: 10 }} />
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setShowAddVil(false)} style={{ flex: 1, padding: 9, borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer" }}>Avbryt</button>
            <button onClick={addVil} style={{ flex: 2, padding: 9, borderRadius: 10, border: "none", background: "#22c55e", color: "#fff", fontWeight: 700, cursor: "pointer" }}>Legg til</button>
          </div>
        </div>
      )}

      {/* Add form — Vil ikke */}
      {showAddVilIkke && (
        <div style={{ margin: "12px 20px 0", background: t.surface, border: `1px solid #ef444440`, borderRadius: 14, padding: 16 }}>
          <input value={newVilIkke.navn} onChange={e => setNewVilIkke(p => ({ ...p, navn: e.target.value }))}
            placeholder="Hva vil du definitivt ikke?"
            style={{ ...inputSt, marginBottom: 10 }} />
          <textarea value={newVilIkke.forklaring} onChange={e => setNewVilIkke(p => ({ ...p, forklaring: e.target.value }))}
            placeholder="Forklaring (valgfritt)..."
            style={{ ...inputSt, minHeight: 50, resize: "vertical", marginBottom: 10 }} />
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={() => setShowAddVilIkke(false)} style={{ flex: 1, padding: 9, borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer" }}>Avbryt</button>
            <button onClick={addVilIkke} style={{ flex: 2, padding: 9, borderRadius: 10, border: "none", background: "#ef4444", color: "#fff", fontWeight: 700, cursor: "pointer" }}>Legg til</button>
          </div>
        </div>
      )}

      {/* Vil prøve list */}
      {tab === "vil" && (
        <div style={{ padding: "12px 20px 0" }}>
          {vilSorted.length === 0 && <div style={{ textAlign: "center", color: t.textFaint, padding: "40px 0", fontSize: 14 }}>Ingen ting lagt til ennå</div>}
          {vilSorted.map(item => (
            <div key={item.id} style={{ background: t.surface, border: `1px solid ${item.gjort ? "#22c55e40" : t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10,
              opacity: item.gjort ? 0.7 : 1 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                <button onClick={() => toggleGjort(item.id)}
                  style={{ width: 28, height: 28, borderRadius: 14, border: `2px solid ${item.gjort ? "#22c55e" : t.border}`,
                    background: item.gjort ? "#22c55e" : "transparent", color: "#fff", fontSize: 14, cursor: "pointer", flexShrink: 0 }}>
                  {item.gjort ? "✓" : ""}
                </button>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: t.text, textDecoration: item.gjort ? "line-through" : "none" }}>{item.navn}</div>
                  <div style={{ display: "flex", gap: 6, marginTop: 3 }}>
                    <span style={{ fontSize: 11, color: "#22c55e" }}>{"★".repeat(item.prioritet)}{"☆".repeat(5-item.prioritet)}</span>
                    {item.gjort && item.gjortDato && <span style={{ fontSize: 11, color: t.textFaint }}>✓ {item.gjortDato}</span>}
                  </div>
                  {item.notat && <div style={{ fontSize: 12, color: t.textMuted, marginTop: 3 }}>{item.notat}</div>}
                </div>
                <button onClick={() => { setEditItem(item); setEditType("vil"); }}
                  style={{ background: "none", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 16 }}>⚙️</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* Vil ikke list */}
      {tab === "vilIkke" && (
        <div style={{ padding: "12px 20px 0" }}>
          {data.vilIkke.length === 0 && <div style={{ textAlign: "center", color: t.textFaint, padding: "40px 0", fontSize: 14 }}>Ingen grenser lagt til ennå</div>}
          {data.vilIkke.map(item => (
            <div key={item.id} style={{ background: t.surface, border: `1px solid #ef444430`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 18 }}>🚫</span>
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{item.navn}</div>
                  {item.forklaring && <div style={{ fontSize: 12, color: t.textMuted, marginTop: 3 }}>{item.forklaring}</div>}
                </div>
                <button onClick={() => { setEditItem(item); setEditType("vilIkke"); }}
                  style={{ background: "none", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 16 }}>⚙️</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// Tag list editor
function PkTagEditor({ items, onChange, placeholder, color, t }) {
  const [val, setVal] = useState("");
  function add() {
    if (!val.trim()) return;
    onChange([...items, val.trim()]);
    setVal("");
  }
  function remove(i) { onChange(items.filter((_,idx) => idx !== i)); }
  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <input value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => e.key === "Enter" && add()}
          placeholder={placeholder}
          style={{ flex: 1, background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.text, fontSize: 13 }} />
        <button onClick={add}
          style={{ padding: "8px 12px", borderRadius: 10, border: `1px solid ${color}`, background: color + "20", color, fontSize: 14, cursor: "pointer", fontWeight: 700 }}>+</button>
      </div>
      <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
        {items.map((item, i) => (
          <span key={i} style={{ display: "flex", alignItems: "center", gap: 4, background: color + "15", border: `1px solid ${color}40`, borderRadius: 20, padding: "4px 10px", fontSize: 12, color: t.text }}>
            {item}
            <button onClick={() => remove(i)} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 12, padding: 0, lineHeight: 1 }}>✕</button>
          </span>
        ))}
      </div>
    </div>
  );
}

// Gave-liste editor
function PkGaveEditor({ items, onChange, t }) {
  const [val, setVal] = useState("");
  function add() {
    if (!val.trim()) return;
    onChange([...items, { id: "g" + Date.now(), tekst: val.trim() }]);
    setVal("");
  }
  function remove(id) { onChange(items.filter(g => g.id !== id)); }
  return (
    <div>
      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
        <input value={val} onChange={e => setVal(e.target.value)}
          onKeyDown={e => e.key === "Enter" && add()}
          placeholder="Gaveidé..."
          style={{ flex: 1, background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.text, fontSize: 13 }} />
        <button onClick={add}
          style={{ padding: "8px 12px", borderRadius: 10, border: "1px solid #c084fc", background: "#c084fc20", color: "#c084fc", fontSize: 14, cursor: "pointer", fontWeight: 700 }}>+</button>
      </div>
      {items.map(g => (
        <div key={g.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "6px 0", borderBottom: `1px solid ${t.border}` }}>
          <span style={{ flex: 1, fontSize: 13, color: t.text }}>🎁 {g.tekst}</span>
          <button onClick={() => remove(g.id)} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 14 }}>🗑</button>
        </div>
      ))}
    </div>
  );
}

// ── Form ───────────────────────────────────────────────────────────────────────
function PkForm({ entry: init, onSave, onCancel, t }) {
  const [e, setE] = useState(init);
  function upd(f, v) { setE(p => ({ ...p, [f]: v })); }

  const inputSt = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, boxSizing: "border-box" };
  const secSt = { background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, padding: 18, marginBottom: 14 };
  const labelSt = { fontSize: 12, color: t.textMuted, marginBottom: 7, display: "block", fontWeight: 600 };

// ── Hoved-app ──────────────────────────────────────────────────────────────────
function PersonKort({ person, t, onClick }) {
  const rel = PK_RELASJONER.find(r => r.id === person.relasjon);
  const harBursdag = person.bursdag;
  const burstdag = harBursdag ? new Date(person.bursdag + "T12:00:00") : null;
  const iDag = new Date();

  const alder = burstdag ? (() => {
    let a = iDag.getFullYear() - burstdag.getFullYear();
    const mDiff = iDag.getMonth() - burstdag.getMonth();
    if (mDiff < 0 || (mDiff === 0 && iDag.getDate() < burstdag.getDate())) a--;
    return a;
  })() : null;

  const dagerTilBursdag = burstdag ? (() => {
    const neste = new Date(iDag.getFullYear(), burstdag.getMonth(), burstdag.getDate());
    if (neste < iDag) neste.setFullYear(iDag.getFullYear() + 1);
    return Math.ceil((neste - iDag) / (1000*60*60*24));
  })() : null;
  const snartBursdag = dagerTilBursdag !== null && dagerTilBursdag <= 30;

  return (
    <button onClick={onClick}
      style={{ width: "100%", background: t.surface, border: `1px solid ${snartBursdag ? "#f472b640" : t.border}`, borderRadius: 16, padding: "14px 16px", marginBottom: 10, textAlign: "left", cursor: "pointer", display: "flex", alignItems: "center", gap: 14 }}>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontWeight: 700, fontSize: 15, color: t.text }}>{person.navn}</div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginTop: 1 }}>
          <span style={{ fontSize: 12, color: "#c084fc" }}>{rel?.label}</span>
          {alder !== null && <span style={{ fontSize: 12, color: t.textMuted }}>{alder} år</span>}
        </div>
        {snartBursdag && (
          <div style={{ fontSize: 11, color: "#f472b6", marginTop: 3 }}>
            🎂 Bursdag om {dagerTilBursdag === 0 ? "i dag!" : `${dagerTilBursdag} dag${dagerTilBursdag===1?"":"er"}`}
          </div>
        )}
      </div>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 4 }}>
        {(person.grønneFlagg||[]).length > 0 && <span style={{ fontSize: 12 }}>🟢×{person.grønneFlagg.length}</span>}
        {(person.rødeFlagg||[]).length > 0 && <span style={{ fontSize: 12 }}>🔴×{person.rødeFlagg.length}</span>}
      </div>
    </button>
  );
}

function PersonkatalogApp({ t, onBack }) {
  const [liste, setListe] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [sort, setSort] = useState("relasjon");
  const [search, setSearch] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [viewEntry, setViewEntry] = useState(null);

  useEffect(() => { setListe(pkLoad()); setLoaded(true); }, []);
  function save(updated) { setListe(updated); pkSave(updated); }

  function handleSave(entry) {
    const existing = liste.find(e => e.id === entry.id);
    if (existing) save(liste.map(e => e.id===entry.id ? entry : e));
    else save([entry, ...liste]);
    setShowForm(false); setEditEntry(null);
  }
  function handleDelete(id) {
    if (!confirm("Slette denne personen?")) return;
    save(liste.filter(e => e.id !== id));
    setViewEntry(null);
  }

  const filtered = liste.filter(p => !search || p.navn.toLowerCase().includes(search.toLowerCase()));

  const sorted = [...filtered].sort((a, b) => {
    if (sort === "navn") return a.navn.localeCompare(b.navn, "nb");
    const ra = PK_RELASJONER.find(r => r.id === a.relasjon)?.order ?? 99;
    const rb = PK_RELASJONER.find(r => r.id === b.relasjon)?.order ?? 99;
    if (ra !== rb) return ra - rb;
    return a.navn.localeCompare(b.navn, "nb");
  });

  // Group by relasjon when sorting by relasjon
  const grouped = sort === "relasjon"
    ? PK_RELASJONER.map(r => ({ rel: r, persons: sorted.filter(p => p.relasjon === r.id) })).filter(g => g.persons.length > 0)
    : null;

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;
  if (showForm || editEntry) return <PkForm entry={editEntry || pkBlank()} onSave={handleSave} onCancel={() => { setShowForm(false); setEditEntry(null); }} t={t} />;
  if (viewEntry) return <PkDetalj person={viewEntry} onBack={() => setViewEntry(null)} onEdit={p => { setViewEntry(null); setEditEntry(p); }} onDelete={handleDelete} t={t} />;

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontWeight: 800, fontSize: 18, color: "#c084fc" }}>👥 Personkatalog</span>
        <button onClick={() => setShowForm(true)}
          style={{ background: "#c084fc", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ny</button>
      </div>

      <div style={{ padding: "12px 20px 0" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Søk på navn..."
          style={{ width: "100%", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "10px 14px", color: t.text, fontSize: 14, boxSizing: "border-box" }} />
      </div>

      <div style={{ display: "flex", gap: 8, padding: "10px 20px 0" }}>
        {[["relasjon","👥 Relasjon"],["navn","🔤 Navn"]].map(([k,l]) => (
          <button key={k} onClick={() => setSort(k)}
            style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${sort===k ? "#c084fc" : t.border}`,
              background: sort===k ? "#c084fc20" : "transparent", color: sort===k ? "#c084fc" : t.textMuted,
              fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            {l}
          </button>
        ))}
      </div>

      <div style={{ padding: "14px 20px 0" }}>
        {sorted.length === 0 && (
          <div style={{ textAlign: "center", color: t.textFaint, fontSize: 14, padding: "40px 0" }}>
            {search ? "Ingen treff" : "Ingen i katalogen ennå — trykk «+ Ny»"}
          </div>
        )}

        {grouped ? grouped.map(g => (
          <div key={g.rel.id}>
            <div style={{ fontSize: 11, fontWeight: 700, color: t.textMuted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 8, marginTop: 4 }}>
              {g.rel.label} ({g.persons.length})
            </div>
            {g.persons.map(p => <PersonKort key={p.id} person={p} t={t} onClick={() => setViewEntry(p)} />)}
          </div>
        )) : sorted.map(p => <PersonKort key={p.id} person={p} t={t} onClick={() => setViewEntry(p)} />)}
      </div>
    </div>
  );
}


// ── Hemmelig: Julegaveliste ────────────────────────────────────────────────────
// Storage: hemmelig:julegave

const JG_STATUS = ["Idé", "Kjøpt", "Pakket inn", "Gitt"];
const JG_STATUS_COLOR = { "Idé": "#7d8590", "Kjøpt": "#3b82f6", "Pakket inn": "#f97316", "Gitt": "#22c55e" };

function jgLoad() {
  try { const r = localStorage.getItem("hemmelig:julegave"); return r ? JSON.parse(r) : {}; } catch(_) { return {}; }
}
function jgSave(data) {
  try { localStorage.setItem("hemmelig:julegave", JSON.stringify(data)); } catch(_) {} }

function jgCurrentYear() { return new Date().getFullYear(); }

function jgBlankGave(mottaker) {
  return { id: "jg" + Date.now(), mottaker: mottaker || "", gave: "", lenke: "", pris: "", prioritert: false, status: "Idé", notat: "" };
}

// Import from personkatalog
function jgImportFraPersoner(currentData, year) {
  try {
    const raw = localStorage.getItem("hemmelig:personkatalog");
    if (!raw) return currentData;
    const personer = JSON.parse(raw);
    const kandidater = personer.filter(p => p.julegaveImporter && p.julegave);
    if (kandidater.length === 0) return currentData;

    const yearData = { ...(currentData[year] || []) };
    const existing = Array.isArray(currentData[year]) ? currentData[year] : [];
    const newGaver = [...existing];

    kandidater.forEach(p => {
      const finnes = existing.some(g => g.mottaker === p.navn && g.gave === p.julegave);
      if (!finnes) {
        newGaver.push({ ...jgBlankGave(p.navn), gave: p.julegave, id: "jgi" + Date.now() + Math.random() });
      }
    });

    return { ...currentData, [year]: newGaver };
  } catch(_) { return currentData; }
}

  const inputSt = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "9px 12px", color: t.text, fontSize: 14, boxSizing: "border-box" };

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
      onClick={onCancel}>
      <div onClick={e => e.stopPropagation()}
        style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, maxHeight: "88vh", overflowY: "auto", padding: "24px 20px 44px", border: `1px solid ${t.border}` }}>

function JgPersonBlok({ mottaker, gaver, onAddGave, onEditGave, onStatusNext, sortBy, t }) {
  const sorted = [...gaver].sort((a, b) => {
    if (sortBy === "prioritert") return (b.prioritert ? 1 : 0) - (a.prioritert ? 1 : 0);
    return JG_STATUS.indexOf(a.status) - JG_STATUS.indexOf(b.status);
  });
  const allGitt = gaver.length > 0 && gaver.every(g => g.status === "Gitt");

  return (
    <div style={{ background: t.surface, border: `1px solid ${allGitt ? "#22c55e30" : t.border}`, borderRadius: 16, padding: 16, marginBottom: 14 }}>

          <span style={{ fontWeight: 800, fontSize: 16, color: t.text }}>{mottaker}</span>

        </div>
        <button onClick={() => onAddGave(mottaker)}

          + Gave
        </button>

function JulegaveApp({ t, onBack }) {
  const [data, setData] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [year, setYear] = useState(jgCurrentYear());
  const [sortBy, setSortBy] = useState("status");
  const [editGave, setEditGave] = useState(null);
  const [addToMottaker, setAddToMottaker] = useState(null);
  const [newMottaker, setNewMottaker] = useState("");
  const [showAddMottaker, setShowAddMottaker] = useState(false);
  const [importMsg, setImportMsg] = useState("");

  useEffect(() => { setData(jgLoad()); setLoaded(true); }, []);
  function save(updated) { setData(updated); jgSave(updated); }

  const yearGaver = Array.isArray(data[year]) ? data[year] : [];
  const mottakere = [...new Set(yearGaver.map(g => g.mottaker))].sort((a,b) => a.localeCompare(b, "nb"));

  function handleImport() {
    const updated = jgImportFraPersoner(data, year);
    save(updated);
    const antall = (Array.isArray(updated[year]) ? updated[year] : []).length - yearGaver.length;
    setImportMsg(antall > 0 ? `✓ Importerte ${antall} gave${antall===1?"":"r"} fra personkatalogen` : "Ingen nye å importere");
    setTimeout(() => setImportMsg(""), 3000);
  }

  function addMottaker() {
    if (!newMottaker.trim()) return;
    const g = jgBlankGave(newMottaker.trim());
    save({ ...data, [year]: [...yearGaver, g] });
    setNewMottaker(""); setShowAddMottaker(false);
  }

  function addGave(mottaker) {
    const g = jgBlankGave(mottaker);
    save({ ...data, [year]: [...yearGaver, g] });
    setEditGave(g);
  }

  function saveGave(g) {
    save({ ...data, [year]: yearGaver.map(x => x.id===g.id ? g : x) });
    setEditGave(null); setAddToMottaker(null);
  }

  function deleteGave(id) {
    if (!confirm("Slette gaven?")) return;
    save({ ...data, [year]: yearGaver.filter(g => g.id !== id) });
    setEditGave(null);
  }

  function statusNext(id) {
    save({ ...data, [year]: yearGaver.map(g => {
      if (g.id !== id) return g;
      const idx = JG_STATUS.indexOf(g.status);
      return { ...g, status: JG_STATUS[(idx+1) % JG_STATUS.length] };
    })});
  }

  const years = [...new Set([jgCurrentYear(), jgCurrentYear()-1, ...Object.keys(data).map(Number)])].sort((a,b)=>b-a);
  const totalt = yearGaver.length;
  const gitt = yearGaver.filter(g => g.status === "Gitt").length;
  const kjøpt = yearGaver.filter(g => g.status === "Kjøpt" || g.status === "Pakket inn" || g.status === "Gitt").length;

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontWeight: 800, fontSize: 18, color: "#c084fc" }}>🎄 Julegaveliste</span>
        <button onClick={() => setShowAddMottaker(true)}
          style={{ background: "#c084fc", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Person</button>
      </div>

      {/* År-velger */}
      <div style={{ display: "flex", gap: 8, padding: "12px 20px 0", overflowX: "auto" }}>
        {years.map(y => (
          <button key={y} onClick={() => setYear(y)}
            style={{ padding: "7px 16px", borderRadius: 20, border: `1px solid ${year===y ? "#c084fc" : t.border}`,
              background: year===y ? "#c084fc20" : "transparent", color: year===y ? "#c084fc" : t.textMuted,
              fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
            {y}{y === jgCurrentYear() ? " 🎄" : ""}
          </button>
        ))}
      </div>

      {/* Fremgang */}
      {totalt > 0 && (
        <div style={{ margin: "12px 20px 0", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "12px 16px" }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, color: t.textMuted, marginBottom: 6 }}>
            <span>Kjøpt: {kjøpt}/{totalt}</span>
            <span>Gitt: {gitt}/{totalt}</span>
          </div>
          <div style={{ height: 6, background: t.surface2, borderRadius: 3, overflow: "hidden" }}>
            <div style={{ height: 6, background: "#22c55e", width: `${totalt ? (gitt/totalt*100) : 0}%`, borderRadius: 3 }} />
          </div>
        </div>
      )}

      {/* Import + sortering */}
      <div style={{ display: "flex", gap: 8, padding: "10px 20px 0", alignItems: "center" }}>
        <button onClick={handleImport}
          style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
          📥 Importer fra katalog
        </button>
        <div style={{ flex: 1 }} />
        {[["status","📋 Status"],["prioritert","⭐ Prioritert"]].map(([k,l]) => (
          <button key={k} onClick={() => setSortBy(k)}
            style={{ padding: "7px 12px", borderRadius: 20, border: `1px solid ${sortBy===k ? "#c084fc" : t.border}`,
              background: sortBy===k ? "#c084fc20" : "transparent", color: sortBy===k ? "#c084fc" : t.textMuted,
              fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            {l}
          </button>
        ))}
      </div>
      {importMsg && <div style={{ margin: "6px 20px 0", fontSize: 13, color: "#22c55e", fontWeight: 600 }}>{importMsg}</div>}

      {/* Legg til mottaker */}
      {showAddMottaker && (
        <div style={{ margin: "10px 20px 0", background: t.surface, border: `1px solid #c084fc40`, borderRadius: 14, padding: 14 }}>
          <div style={{ fontSize: 13, color: t.textMuted, marginBottom: 8 }}>Hvem skal motta gave?</div>
          <div style={{ display: "flex", gap: 8 }}>
            <input value={newMottaker} onChange={e => setNewMottaker(e.target.value)}
              onKeyDown={e => e.key === "Enter" && addMottaker()}
              placeholder="Navn..." autoFocus
              style={{ flex: 1, background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "9px 12px", color: t.text, fontSize: 14 }} />
            <button onClick={() => setShowAddMottaker(false)} style={{ padding: "9px 12px", borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer" }}>Avbryt</button>
            <button onClick={addMottaker} style={{ padding: "9px 14px", borderRadius: 10, border: "none", background: "#c084fc", color: "#fff", fontWeight: 700, cursor: "pointer" }}>Legg til</button>
          </div>
        </div>
      )}

      <div style={{ padding: "14px 20px 0" }}>
        {mottakere.length === 0 && (
          <div style={{ textAlign: "center", color: t.textFaint, fontSize: 14, padding: "40px 0" }}>
            Ingen mottakere lagt til ennå — trykk «+ Person» eller importer fra katalog
          </div>
        )}
        {mottakere.map(m => (
          <JgPersonBlok key={m} mottaker={m} gaver={yearGaver.filter(g => g.mottaker === m)}
            onAddGave={addGave} onEditGave={setEditGave} onStatusNext={statusNext} sortBy={sortBy} t={t} />
        ))}
      </div>

      {editGave && (
        <JgGaveForm gave={editGave} onSave={saveGave} onDelete={deleteGave} onCancel={() => setEditGave(null)} t={t} />
      )}
    </div>
  );
}

function loadSexlyst() {
  try { const r = localStorage.getItem("hemmelig:sexlyst"); return r ? JSON.parse(r) : []; } catch(_) { return []; }

function saveSexlyst(data) {
  try { localStorage.setItem("hemmelig:sexlyst", JSON.stringify(data)); } catch(_) {}
}

function SexlystChart({ entries, t }) {
  if (entries.length < 2) return null;
  const sorted = [...entries].sort((a, b) => a.dato.localeCompare(b.dato)).slice(-30);
  const w = 340, h = 120, pad = { l: 24, r: 12, t: 10, b: 20 };
  const cw = w - pad.l - pad.r;
  const ch = h - pad.t - pad.b;
  const n = sorted.length;
  function px(i) { return pad.l + (i / (n - 1)) * cw; }
  function py(v) { return pad.t + ch - ((v - 1) / 4) * ch; }
  const lystPts = sorted.map((e, i) => `${px(i)},${py(e.sexlyst)}`).join(" ");
  const sovnPts = sorted.map((e, i) => `${px(i)},${py(e.sovn)}`).join(" ");
  return (
    <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 16 }}>
      <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, marginBottom: 10, textTransform: "uppercase", letterSpacing: 0.5 }}>Siste 30 dager</div>
      <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ display: "block" }}>
        {[1,2,3,4,5].map(v => (
          <line key={v} x1={pad.l} y1={py(v)} x2={w - pad.r} y2={py(v)}
            stroke={t.border} strokeWidth="0.5" />
        ))}
        {[1,3,5].map(v => (
          <text key={v} x={pad.l - 4} y={py(v) + 4} textAnchor="end" fontSize="9" fill={t.textFaint}>{v}</text>
        ))}
        <polyline fill="none" stroke={t.purple} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" points={lystPts} />
        <polyline fill="none" stroke="#3b82f6" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" strokeDasharray="4 3" points={sovnPts} />
        {sorted.filter(e => e.trening).map((e, i) => {
          const idx = sorted.indexOf(e);
          return <circle key={i} cx={px(idx)} cy={py(e.sexlyst)} r="4" fill={t.purple} />;
        })}
      </svg>
      <div style={{ display: "flex", gap: 16, marginTop: 6 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <div style={{ width: 20, height: 3, background: t.purple, borderRadius: 2 }} />
          <span style={{ fontSize: 11, color: t.textMuted }}>Sexlyst</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <div style={{ width: 20, height: 2, borderTop: "2px dashed #3b82f6" }} />
          <span style={{ fontSize: 11, color: t.textMuted }}>Søvn</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <div style={{ width: 8, height: 8, background: t.purple, borderRadius: "50%" }} />
          <span style={{ fontSize: 11, color: t.textMuted }}>Trent</span>
        </div>
      </div>
    </div>
  );
}

// ── Hemmelig: STI-testhistorikk ────────────────────────────────────────────────
// Storage: hemmelig:stitester
function loadSTI() {
  try { const r = localStorage.getItem("hemmelig:stitester"); return r ? JSON.parse(r) : []; } catch(_) { return []; }
}
function saveSTI(data) {
  try { localStorage.setItem("hemmelig:stitester", JSON.stringify(data)); } catch(_) {}
}

const STI_TYPER = ["HIV", "Klamydia", "Gonorré", "Syfilis", "Herpes", "HPV", "Hepatitt B", "Hepatitt C", "Mykoplasma", "Full panel"];

function STIModal({ entry, onSave, onClose, t }) {
  const today = new Date().toISOString().slice(0, 10);
  const [dato, setDato] = useState(entry ? entry.dato : today);
  const [typer, setTyper] = useState(entry ? entry.typer : []);
  const [resultat, setResultat] = useState(entry ? entry.resultat : "negativ");
  const [klinikk, setKlinikk] = useState(entry ? entry.klinikk : "");
  const [notat, setNotat] = useState(entry ? entry.notat : "");

  function toggleType(type) {
    setTyper(prev => prev.includes(type) ? prev.filter(t => t !== type) : [...prev, type]);
  }

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };
  const lblSt = { fontSize: 13, fontWeight: 700, color: t.textMuted, marginBottom: 6, display: "block", textTransform: "uppercase", letterSpacing: 0.5 };

  function handleSave() {
    if (!dato || typer.length === 0) return;
    onSave({ id: entry ? entry.id : "sti" + Date.now(), dato, typer, resultat, klinikk, notat });
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "24px 20px 44px", maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 20 }}>{entry ? "Rediger test" : "Ny STI-test"}</div>

        <div style={{ marginBottom: 16 }}>
          <span style={lblSt}>Dato</span>
          <input type="date" value={dato} onChange={e => setDato(e.target.value)} style={inputSt} />
        </div>

        <div style={{ marginBottom: 16 }}>
          <span style={lblSt}>Testtyper</span>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {STI_TYPER.map(type => (
              <button key={type} onClick={() => toggleType(type)}
                style={{ padding: "8px 12px", borderRadius: 10, border: `2px solid ${typer.includes(type) ? t.purple : t.border}`,
                  background: typer.includes(type) ? t.purpleDim : t.bg, color: typer.includes(type) ? t.purple : t.textMuted,
                  fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
                {type}
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom: 16 }}>
          <span style={lblSt}>Resultat</span>
          <div style={{ display: "flex", gap: 8 }}>
            {[["negativ","✓ Negativ","#22c55e"], ["positiv","! Positiv","#ef4444"], ["venter","⏳ Venter","#eab308"]].map(([val, lbl, col]) => (
              <button key={val} onClick={() => setResultat(val)}
                style={{ flex: 1, padding: "12px", borderRadius: 10, border: `2px solid ${resultat === val ? col : t.border}`,
                  background: resultat === val ? col + "22" : t.bg, color: resultat === val ? col : t.textMuted,
                  fontWeight: 700, fontSize: 13, cursor: "pointer" }}>
                {lbl}
              </button>
            ))}
          </div>
        </div>

        <div style={{ marginBottom: 16 }}>
          <span style={lblSt}>Klinikk / sted</span>
          <input value={klinikk} onChange={e => setKlinikk(e.target.value)} placeholder="f.eks. Olafiaklinikken" style={inputSt} />
        </div>

        <div style={{ marginBottom: 24 }}>
          <span style={lblSt}>Notat</span>
          <textarea value={notat} onChange={e => setNotat(e.target.value)} rows={3} placeholder="Evt. merknader..." style={{ ...inputSt, resize: "none" }} />
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontWeight: 700, cursor: "pointer" }}>Avbryt</button>
          <button onClick={handleSave} disabled={typer.length === 0} style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: typer.length ? t.purple : t.border, color: "#fff", fontWeight: 700, fontSize: 15, cursor: typer.length ? "pointer" : "default" }}>Lagre</button>
        </div>
      </div>
    </div>
  );
}

function STIApp({ t, onBack }) {
  const [tester, setTester] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [editEntry, setEditEntry] = useState(null);

  useEffect(() => { setTester(loadSTI()); }, []);

  function handleSave(entry) {
    const updated = tester.find(e => e.id === entry.id)
      ? tester.map(e => e.id === entry.id ? entry : e)
      : [entry, ...tester];
    setTester(updated);
    saveSTI(updated);
    setShowModal(false);
    setEditEntry(null);
  }
  function handleDelete(id) {
    const updated = tester.filter(e => e.id !== id);
    setTester(updated);
    saveSTI(updated);
  }

  const sorted = [...tester].sort((a, b) => b.dato.localeCompare(a.dato));
  const sisteNegative = sorted.find(e => e.resultat === "negativ");
  const dagSiden = sisteNegative ? Math.floor((Date.now() - new Date(sisteNegative.dato).getTime()) / 86400000) : null;

  const rCol = { negativ: "#22c55e", positiv: "#ef4444", venter: "#eab308" };

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 80 }}>
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.purple }}>🧪 STI-testhistorikk</span>
        <button onClick={() => { setEditEntry(null); setShowModal(true); }}
          style={{ background: t.purple, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Legg til</button>
      </div>

      <div style={{ padding: "16px 20px 0" }}>
        {sisteNegative && (
          <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "16px", marginBottom: 16, display: "flex", alignItems: "center", gap: 14 }}>
            <div style={{ fontSize: 32 }}>🧬</div>
            <div>
              <div style={{ fontWeight: 700, fontSize: 15, color: "#22c55e" }}>Sist negativ test</div>
              <div style={{ fontSize: 13, color: t.textMuted }}>{new Date(sisteNegative.dato + "T12:00:00").toLocaleDateString("nb-NO", { day: "numeric", month: "long", year: "numeric" })} — {dagSiden} dager siden</div>
            </div>
          </div>
        )}

        {sorted.length === 0 && (
          <div style={{ textAlign: "center", color: t.textMuted, padding: 40 }}>Ingen tester registrert ennå.</div>
        )}

        {sorted.map(e => (
          <button key={e.id} onClick={() => { setEditEntry(e); setShowModal(true); }}
            style={{ width: "100%", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10, textAlign: "left", cursor: "pointer" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <span style={{ fontWeight: 700, fontSize: 14, color: t.text }}>{new Date(e.dato + "T12:00:00").toLocaleDateString("nb-NO", { day: "numeric", month: "long", year: "numeric" })}</span>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 12, fontWeight: 700, color: rCol[e.resultat], background: rCol[e.resultat] + "22", padding: "3px 10px", borderRadius: 20 }}>
                  {e.resultat === "negativ" ? "✓ Negativ" : e.resultat === "positiv" ? "! Positiv" : "⏳ Venter"}
                </span>
                <button onClick={ev => { ev.stopPropagation(); if(window.confirm("Slett denne testen?")) handleDelete(e.id); }}
                  style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14 }}>×</button>
              </div>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: e.klinikk || e.notat ? 8 : 0 }}>
              {e.typer.map(type => (
                <span key={type} style={{ fontSize: 12, color: t.purple, background: t.purpleDim, padding: "3px 8px", borderRadius: 8 }}>{type}</span>
              ))}
            </div>
            {e.klinikk && <div style={{ fontSize: 12, color: t.textMuted }}>📍 {e.klinikk}</div>}
            {e.notat && <div style={{ fontSize: 12, color: t.textFaint, marginTop: 4, fontStyle: "italic" }}>{e.notat}</div>}
          </button>
        ))}
      </div>

      {showModal && (
        <STIModal entry={editEntry} onSave={handleSave} onClose={() => { setShowModal(false); setEditEntry(null); }} t={t} />
      )}
    </div>
  );
}

function loadVelvare() {
  try { const r = localStorage.getItem("hemmelig:velvare"); return r ? JSON.parse(r) : []; } catch(_) { return []; }
}
function saveVelvare(data) {
  try { localStorage.setItem("hemmelig:velvare", JSON.stringify(data)); } catch(_) {}
}

const VELVARE_FELTER = [
  { key: "humor",      label: "😊 Humør",         desc: "Generell stemning" },
  { key: "selvtillit", label: "💪 Selvtillit",     desc: "Trygghet på deg selv" },
  { key: "stress",     label: "😰 Stress",          desc: "Høy verdi = mye stress" },
  { key: "angst",      label: "😟 Angst",           desc: "Høy verdi = mye angst" },
  { key: "sosialt",    label: "🤝 Sosial energi",  desc: "Lyst/kapasitet til å være sosial" },
  { key: "adhd",       label: "🌀 ADHD-symptomer", desc: "Høy verdi = vanskelig dag" },
];

function VelvareModal({ entry, onSave, onClose, t }) {

  const defaults = Object.fromEntries(VELVARE_FELTER.map(f => [f.key, 3]));
  const [dato, setDato] = useState(entry ? entry.dato : today);
  const [verdier, setVerdier] = useState(entry ? { ...defaults, ...entry.verdier } : defaults);
  const [notat, setNotat] = useState(entry ? entry.notat : "");

  function setVerdi(key, val) { setVerdier(prev => ({ ...prev, [key]: val })); }
  function handleSave() {
    if (!dato) return;
    onSave({ id: entry ? entry.id : "vv" + Date.now(), dato, verdier, notat });
  }

  const scaleColors = ["#ef4444","#f97316","#eab308","#22c55e","#c084fc"];
  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };

  return (

        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 20 }}>Daglig check-in</div>
        <div style={{ marginBottom: 20 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: t.textMuted, display: "block", marginBottom: 6 }}>Dato</span>
          <input type="date" value={dato} onChange={e => setDato(e.target.value)} style={inputSt} />
        </div>
        {VELVARE_FELTER.map(f => (
          <div key={f.key} style={{ marginBottom: 18 }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
              <span style={{ fontSize: 14, fontWeight: 700, color: t.text }}>{f.label}</span>
              <span style={{ fontSize: 12, color: t.textFaint }}>{f.desc}</span>
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              {[1,2,3,4,5].map(n => (
                <button key={n} onClick={() => setVerdi(f.key, n)}
                  style={{ flex: 1, height: 42, borderRadius: 10, border: `2px solid ${verdier[f.key] === n ? scaleColors[n-1] : t.border}`,
                    background: verdier[f.key] === n ? scaleColors[n-1] + "33" : t.bg,
                    color: verdier[f.key] === n ? scaleColors[n-1] : t.textMuted,
                    fontSize: 15, fontWeight: 800, cursor: "pointer" }}>{n}</button>
              ))}
            </div>

        ))}
