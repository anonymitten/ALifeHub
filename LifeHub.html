// ── Felles: Drag & drop-sorterbar liste ────────────────────────────────────────
function DragSortList({ items, onReorder, onDelete, renderLabel, accentColor, t }) {
  const dragIdx = useRef(null);
  const [dragging, setDragging] = useState(null);

  function handleDragStart(idx) { dragIdx.current = idx; setDragging(idx); }
  function handleDragOver(e, idx) {
    e.preventDefault();
    if (dragIdx.current === null || dragIdx.current === idx) return;
    const updated = [...items];
    const [moved] = updated.splice(dragIdx.current, 1);
    updated.splice(idx, 0, moved);
    dragIdx.current = idx;
    onReorder(updated);
  }
  function handleDragEnd() { dragIdx.current = null; setDragging(null); }

  const accent = accentColor || t.purple;

  return (
    <div>
      {items.map((item, idx) => (
        <div key={typeof item === "string" ? item + idx : item.id || idx}
          draggable
          onDragStart={() => handleDragStart(idx)}
          onDragOver={e => handleDragOver(e, idx)}
          onDragEnd={handleDragEnd}
          style={{ display: "flex", alignItems: "center", gap: 10,
            background: dragging === idx ? accent + "18" : t.bg,
            border: `1px solid ${dragging === idx ? accent : t.border}`,
            borderRadius: 10, padding: "10px 12px", marginBottom: 8,
            cursor: "grab", transition: "background 0.15s, border-color 0.15s" }}>
          <span style={{ color: t.textFaint, fontSize: 16, flexShrink: 0, userSelect: "none" }}>⠿</span>
          <span style={{ flex: 1, fontSize: 14, color: t.text }}>
            {renderLabel ? renderLabel(item) : (typeof item === "string" ? item : item.navn || item.name || "")}
          </span>
          {onDelete && (
            <button onClick={() => onDelete(idx)}
              style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 16, padding: "0 2px", flexShrink: 0 }}>×</button>
          )}
        </div>
      ))}
    </div>
  );
}

function getStatusColors(theme) {
  const dark = theme.bg === "#0d1117";
  return {
    overdue: { bg: dark ? "#3d1a1a" : "#fef2f2", border: dark ? "#c0392b" : "#fca5a5", text: "#ef4444" },
    soon:    { bg: dark ? "#2d2a14" : "#fffbeb", border: dark ? "#b8860b" : "#fcd34d", text: dark ? "#f0c040" : "#b45309" },
    ok:      { bg: dark ? "#1a2d1a" : "#f0fdf4", border: dark ? "#2d6a2d" : "#86efac", text: dark ? "#6bcb6b" : "#16a34a" },
  };
}

const CATEGORY_ORDER = ["Kjøkken", "Bad", "Klær", "Stue/Gang", "Soverom", "Generelt"];



async function shareToTasks({ title, notes, due }) {
  const text = [notes, due ? "Frist: " + due : null].filter(Boolean).join("\n");
  if (navigator.share) {
    try {
      await navigator.share({ title: title || "", text: text || "" });
    } catch (e) {
      if (e.name !== "AbortError") {
        // Fallback: copy to clipboard
        await navigator.clipboard.writeText([title, text].filter(Boolean).join("\n"));
        alert("Kopiert til utklippstavlen!");
      }
    }
  } else {
    // Desktop fallback
    await navigator.clipboard.writeText([title, text].filter(Boolean).join("\n"));
    alert("Kopiert til utklippstavlen!");
  }
}

function getDaysUntilDue(lastDoneTs, intervalDays) {
  if (!lastDoneTs) return 0;
  const daysSince = (Date.now() - lastDoneTs) / (1000 * 60 * 60 * 24);
  return Math.ceil(intervalDays - daysSince);
}
function getStatus(lastDoneTs, intervalDays) {
  const d = getDaysUntilDue(lastDoneTs, intervalDays);
  if (!lastDoneTs || d <= 0) return "overdue";
  if (d <= 1) return "soon";
  return "ok";
}
function formatLastDone(ts) {
  if (!ts) return "Aldri gjort";
  const diff = Math.floor((Date.now() - ts) / (1000 * 60 * 60 * 24));
  if (diff === 0) return "I dag";
  if (diff === 1) return "I går";
  return `${diff} dager siden`;
}
function formatDueIn(lastDoneTs, intervalDays) {
  const d = getDaysUntilDue(lastDoneTs, intervalDays);
  if (!lastDoneTs || d <= 0) return "Forfalt";
  if (d === 1) return "I morgen";
  return `Om ${d} dager`;
}

function HusoppgaverApp({ t, onBack }) {
  const [tasks, setTasks] = useState(DEFAULT_TASKS);
  const [completions, setCompletions] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [justDone, setJustDone] = useState(null);
  const [addMode, setAddMode] = useState(false);
  const [newTask, setNewTask] = useState({ name: "", intervalDays: 7, category: "Generelt", icon: "✅" });
  const [activeCategory, setActiveCategory] = useState("Alle");
  const [editTask, setEditTask] = useState(null);

  useEffect(() => {
    async function load() {
      try {
        const compRes = JSON.parse(localStorage.getItem("husoppgaver:completions") ?? "null");
        if (compRes) setCompletions(compRes);
        const taskRes = JSON.parse(localStorage.getItem("husoppgaver:tasks") ?? "null");
        if (taskRes) setTasks(taskRes);
      } catch (_) {}
      setLoaded(true);
    }
    load();
  }, []);


  async function saveCompletions(updated) {
    setCompletions(updated);
    try { localStorage.setItem("husoppgaver:completions", JSON.stringify(updated)); } catch (_) {}
  }
  async function saveTasks(updated) {
    setTasks(updated);
    try { localStorage.setItem("husoppgaver:tasks", JSON.stringify(updated)); } catch (_) {}
  }
  function markDone(id) {
    saveCompletions({ ...completions, [id]: Date.now() });
    setJustDone(id);
    setTimeout(() => setJustDone(null), 2000);
  }
  function resetTask(id) {
    const u = { ...completions }; delete u[id]; saveCompletions(u);
  }
  function addNewTask() {
    if (!newTask.name.trim()) return;
    saveTasks([...tasks, { ...newTask, id: "custom_" + Date.now(), intervalDays: Number(newTask.intervalDays) }]);
    setNewTask({ name: "", intervalDays: 7, category: "Generelt", icon: "✅" });
    setAddMode(false);
  }
  function deleteTask(id) {
    saveTasks(tasks.filter(t => t.id !== id));
    const u = { ...completions }; delete u[id]; saveCompletions(u);
  }
  function saveEdit() {
    saveTasks(tasks.map(t => t.id === editTask.id ? { ...editTask, intervalDays: Number(editTask.intervalDays) } : t));
    setEditTask(null);
  }

  const allCategories = ["Alle", ...CATEGORY_ORDER.filter(c => tasks.some(t => t.category === c))];
  const filtered = activeCategory === "Alle" ? tasks : tasks.filter(t => t.category === activeCategory);
  const sorted = [...filtered].sort((a, b) => {
    const ord = { overdue: 0, soon: 1, ok: 2 };
    const sa = getStatus(completions[a.id], a.intervalDays);
    const sb = getStatus(completions[b.id], b.intervalDays);
    if (ord[sa] !== ord[sb]) return ord[sa] - ord[sb];
    return getDaysUntilDue(completions[a.id], a.intervalDays) - getDaysUntilDue(completions[b.id], b.intervalDays);
  });

  const overdueCount = tasks.filter(t => getStatus(completions[t.id], t.intervalDays) === "overdue").length;
  const soonCount    = tasks.filter(t => getStatus(completions[t.id], t.intervalDays) === "soon").length;
  const okCount      = tasks.filter(t => getStatus(completions[t.id], t.intervalDays) === "ok").length;

  const inputStyle = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, boxSizing: "border-box" };

  if (!loaded) return (
    <div style={{ background: t.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ color: t.textMuted }}>Laster...</div>
    </div>
  );

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 60 }}>
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>

        <span style={{ fontSize: 20, fontWeight: 800, color: t.text }}>Husoppgaver</span>
        <div style={{ width: 70 }} />
      </div>

      <div style={{ display: "flex", gap: 8, padding: "14px 20px 0", flexWrap: "wrap" }}>
        {overdueCount > 0 && <div style={{ background: getStatusColors(t).overdue.bg, border: `1px solid ${getStatusColors(t).overdue.border}`, borderRadius: 20, padding: "5px 13px", fontSize: 12, fontWeight: 600, color: getStatusColors(t).overdue.text }}>{overdueCount} forfalt</div>}
        {soonCount > 0    && <div style={{ background: getStatusColors(t).soon.bg, border: `1px solid ${getStatusColors(t).soon.border}`, borderRadius: 20, padding: "5px 13px", fontSize: 12, fontWeight: 600, color: getStatusColors(t).soon.text }}>{soonCount} snart</div>}
        {okCount > 0      && <div style={{ background: getStatusColors(t).ok.bg, border: `1px solid ${getStatusColors(t).ok.border}`, borderRadius: 20, padding: "5px 13px", fontSize: 12, fontWeight: 600, color: getStatusColors(t).ok.text }}>{okCount} i orden</div>}

          <button key={cat} onClick={() => setActiveCategory(cat)}

            {cat}

        ))}
      </div>

      <div style={{ padding: "12px 20px 0" }}>
        {sorted.map(task => {
          const lastTs = completions[task.id];
          const status = getStatus(lastTs, task.intervalDays);
          const STATUS_COLORS = getStatusColors(t);
          const colors = STATUS_COLORS[status];
          const isDone = justDone === task.id;
          return (
            <div key={task.id} style={{ background: isDone ? t.greenDim : colors.bg, border: `1px solid ${isDone ? t.green : colors.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10, transition: "all 0.3s" }}>

                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 15, color: isDone ? t.green : t.text }}>
                    {task.name}{isDone && <span style={{ marginLeft: 8, fontSize: 13, color: t.green }}>✓ Gjort!</span>}
                  </div>
                  <div style={{ display: "flex", gap: 10, marginTop: 4, flexWrap: "wrap" }}>
                    <span style={{ fontSize: 12, color: t.textMuted }}>{formatLastDone(lastTs)}</span>
                    <span style={{ fontSize: 12, color: colors.text, fontWeight: 600 }}>{formatDueIn(lastTs, task.intervalDays)}</span>
                    <span style={{ fontSize: 11, color: t.textFaint }}>Hvert {task.intervalDays}. dag</span>

                </div>

            </div>
          );
        })}

      <div style={{ padding: "8px 20px 0" }}>

              <div style={{ flex: 1 }}>
                <label style={{ fontSize: 12, color: t.textMuted, display: "block", marginBottom: 5 }}>Intervall (dager)</label>
                <input type="number" value={editTask.intervalDays} onChange={e => setEditTask(p => ({ ...p, intervalDays: e.target.value }))} style={inputStyle} />
              </div>
            </div>
            <div style={{ marginBottom: 12 }}>
              <label style={{ fontSize: 12, color: t.textMuted, display: "block", marginBottom: 5 }}>Kategori</label>
              <select value={editTask.category} onChange={e => setEditTask(p => ({ ...p, category: e.target.value }))} style={selectStyle}>
                {CATEGORY_ORDER.map(c => <option key={c}>{c}</option>)}
              </select>
            </div>
            <div style={{ marginBottom: 12, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <button onClick={() => { if (window.confirm("Slette denne oppgaven?")) { deleteTask(editTask.id); setEditTask(null); } }} style={{ background: "transparent", border: "none", color: "#c0392b", cursor: "pointer", fontSize: 13 }}>🗑️ Slett</button>
              <button onClick={() => { resetTask(editTask.id); setEditTask(null); }} style={{ background: "transparent", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 13 }}>Nullstill dato</button>
            </div>
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setEditTask(null)} style={{ flex: 1, padding: "11px", borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer", fontSize: 14 }}>Avbryt</button>
              <button onClick={saveEdit} style={{ flex: 1, padding: "11px", borderRadius: 10, border: "none", background: t.blueDim, border: `1px solid ${t.blueBorder}`, color: t.blue, fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Lagre</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Jobb app ───────────────────────────────────────────────────────────────────

const PRIORITY_CONFIG = {
  høy:    { label: "Høy",    color: "#ef4444", dim: "#2d1010", border: "#7f1d1d" },
  middels:{ label: "Middels",color: "#f97316", dim: "#2d1a08", border: "#7c2d12" },
  lav:    { label: "Lav",    color: "#22c55e", dim: "#0d2010", border: "#14532d" },
};

const TASK_STATUS_CONFIG = {
  "ikke påbegynt": { label: "Ikke påbegynt", color: "#7d8590", dot: "#7d8590" },
  "underveis":     { label: "Underveis",      color: "#f97316", dot: "#f97316" },
  "ferdig":        { label: "Ferdig",         color: "#22c55e", dot: "#22c55e" },
};

const DEFAULT_DAILY = [
  { id: "daily_lift",     name: "Sjekk LIFT",        done: false },
  { id: "daily_ferie",    name: "Sjekk Ferieskjema", done: false },
  { id: "daily_epost",    name: "Sjekk e-post",      done: false },
];

function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
}

function JobbApp({ t, onBack }) {
  // ── state ──
  const [tab, setTab] = useState("daglig"); // "daglig" | "prosjekter"
  const [loaded, setLoaded] = useState(false);

  // Daily
  const [dailyItems, setDailyItems] = useState(DEFAULT_DAILY);
  const [addDailyMode, setAddDailyMode] = useState(false);
  const [newDailyName, setNewDailyName] = useState("");
  const [dailyLastReset, setDailyLastReset] = useState("");

  // Projects
  const [projects, setProjects] = useState([]);
  const [activeProjectId, setActiveProjectId] = useState(null);
  const [addProjectMode, setAddProjectMode] = useState(false);
  const [newProjectName, setNewProjectName] = useState("");

  // Tasks within project
  const [addTaskMode, setAddTaskMode] = useState(false);
  const [newTask, setNewTask] = useState({ name: "", status: "ikke påbegynt", priority: "middels", deadline: "", contacts: [], customFields: [] });
  const [expandedTaskId, setExpandedTaskId] = useState(null);
  const [editingTask, setEditingTask] = useState(null);
  const [sortMode, setSortMode] = useState("manuell"); // "manuell" | "frist" | "prioritet"
  const [dragId, setDragId] = useState(null);
  const [dragOverId, setDragOverId] = useState(null);

  // ── load ──
  useEffect(() => {
    async function load() {
      try {
        const dr = JSON.parse(localStorage.getItem("jobb:daily") ?? "null");
        const lr = localStorage.getItem("jobb:dailyReset");
        const pr = JSON.parse(localStorage.getItem("jobb:projects") ?? "null");
        const today = todayKey();

        if (lr && lr === today && dr) {
          setDailyItems(dr);
          setDailyLastReset(today);
        } else {
          // new day — reset all done flags, keep custom items
          if (dr) {
            const items = dr.map(i => ({ ...i, done: false }));
            setDailyItems(items);
            localStorage.setItem("jobb:daily", JSON.stringify(items));
          }
          localStorage.setItem("jobb:dailyReset", today);
          setDailyLastReset(today);
        }
        if (pr) setProjects(pr);
      } catch (_) {}
      setLoaded(true);
    }
    load();
  }, []);

  // ── daily helpers ──
  async function saveDailyItems(items) {
    setDailyItems(items);
    try { localStorage.setItem("jobb:daily", JSON.stringify(items)); } catch (_) {}
  }
  function toggleDaily(id) {
    const updated = dailyItems.map(i => i.id === id ? { ...i, done: !i.done } : i);
    saveDailyItems(updated);
  }
  function addDailyItem() {
    if (!newDailyName.trim()) return;
    const item = { id: "daily_custom_" + Date.now(), name: newDailyName.trim(), done: false };
    saveDailyItems([...dailyItems, item]);
    setNewDailyName("");
    setAddDailyMode(false);
  }
  function deleteDailyItem(id) {
    saveDailyItems(dailyItems.filter(i => i.id !== id));
  }

  // ── project helpers ──
  async function saveProjects(updated) {
    setProjects(updated);
    try { localStorage.setItem("jobb:projects", JSON.stringify(updated)); } catch (_) {}
  }
  function addProject() {
    if (!newProjectName.trim()) return;
    const proj = { id: "proj_" + Date.now(), name: newProjectName.trim(), tasks: [] };
    saveProjects([...projects, proj]);
    setNewProjectName("");
    setAddProjectMode(false);
    setActiveProjectId(proj.id);
  }
  function deleteProject(id) {
    saveProjects(projects.filter(p => p.id !== id));
    if (activeProjectId === id) setActiveProjectId(null);
  }
  function updateProjectTasks(projectId, tasks) {
    saveProjects(projects.map(p => p.id === projectId ? { ...p, tasks } : p));
  }

  // ── task helpers ──
  function addTask() {
    if (!newTask.name.trim() || !activeProjectId) return;
    const task = { ...newTask, id: "task_" + Date.now(), order: Date.now() };
    const proj = projects.find(p => p.id === activeProjectId);
    updateProjectTasks(activeProjectId, [...(proj.tasks || []), task]);
    setNewTask({ name: "", status: "ikke påbegynt", priority: "middels", deadline: "", contacts: [], customFields: [] });
    setAddTaskMode(false);
  }
  function updateTask(taskId, updates) {
    const proj = projects.find(p => p.id === activeProjectId);
    updateProjectTasks(activeProjectId, proj.tasks.map(t => t.id === taskId ? { ...t, ...updates } : t));
  }
  function deleteTask(taskId) {
    const proj = projects.find(p => p.id === activeProjectId);
    updateProjectTasks(activeProjectId, proj.tasks.filter(t => t.id !== taskId));
  }
  function cycleStatus(task) {
    const order = ["ikke påbegynt", "underveis", "ferdig"];
    const next = order[(order.indexOf(task.status) + 1) % order.length];
    updateTask(task.id, { status: next });
  }

  // ── sort/drag ──
  const activeProject = projects.find(p => p.id === activeProjectId);
  function getSortedTasks(tasks) {
    if (!tasks) return [];
    const priorityOrd = { høy: 0, middels: 1, lav: 2 };
    if (sortMode === "frist") return [...tasks].sort((a, b) => {
      if (!a.deadline && !b.deadline) return 0;
      if (!a.deadline) return 1;
      if (!b.deadline) return -1;
      return a.deadline.localeCompare(b.deadline);
    });
    if (sortMode === "prioritet") return [...tasks].sort((a, b) => (priorityOrd[a.priority]||1) - (priorityOrd[b.priority]||1));
    return [...tasks].sort((a, b) => (a.order||0) - (b.order||0));
  }

  function handleDragStart(id) { setDragId(id); }
  function handleDragOver(e, id) { e.preventDefault(); setDragOverId(id); }
  function handleDrop(targetId) {
    if (!dragId || dragId === targetId || !activeProject) return;
    const tasks = [...activeProject.tasks];
    const fromIdx = tasks.findIndex(t => t.id === dragId);
    const toIdx = tasks.findIndex(t => t.id === targetId);
    const [moved] = tasks.splice(fromIdx, 1);
    tasks.splice(toIdx, 0, moved);
    // reassign order
    const reordered = tasks.map((t, i) => ({ ...t, order: i }));
    updateProjectTasks(activeProjectId, reordered);
    setDragId(null);
    setDragOverId(null);
    setSortMode("manuell");
  }

  // ── colors ──
  const blue = t.blue;
  const blueDim = t.blueDim;
  const blueBorder = t.blueBorder;
  const orange = t.orange;

  const inputStyle = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, boxSizing: "border-box", outline: "none" };
  const selectStyle = { ...inputStyle, cursor: "pointer" };

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: t.textMuted }}>Laster...</div></div>;

  // sorted daily: done at bottom
  const sortedDaily = [...dailyItems].sort((a, b) => (a.done === b.done ? 0 : a.done ? 1 : -1));
  const doneCount = dailyItems.filter(i => i.done).length;

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 60 }}>
      {/* Header */}
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          ← Tilbake
        </button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.text }}>Jobb 💼</span>
        <div style={{ width: 70 }} />
      </div>

      {/* Tab bar */}
      <div style={{ display: "flex", flexWrap: "wrap", gap: 8, padding: "16px 20px 0" }}>
        {["daglig", "prosjekter"].map(tabId => (
          <button key={tabId} onClick={() => setTab(tabId)}
            style={{ flex: 1, padding: "10px", borderRadius: 12, border: `1px solid ${tab === tabId ? blueBorder : t.border}`, background: tab === tabId ? blueDim : "transparent", color: tab === tabId ? blue : t.textMuted, fontSize: 13, fontWeight: 700, cursor: "pointer", textTransform: "capitalize" }}>
            {tabId === "daglig" ? `Daglig sjekk ${doneCount > 0 ? `(${doneCount}/${dailyItems.length})` : ""}` : "Prosjekter"}
          </button>
        ))}
      </div>

      {/* ── DAGLIG TAB ── */}
      {tab === "daglig" && (
        <div style={{ padding: "14px 20px 0" }}>
          <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 12 }}>
            Nullstilles automatisk ved midnatt. {doneCount === dailyItems.length && dailyItems.length > 0 && <span style={{ color: t.green, fontWeight: 600 }}>Alt gjort i dag! ✓</span>}
          </div>

          {sortedDaily.map(item => (
            <div key={item.id}
              style={{ background: item.done ? t.greenDim : t.surface, border: `1px solid ${item.done ? t.green + "55" : t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 8, display: "flex", alignItems: "center", gap: 12, opacity: item.done ? 0.7 : 1, transition: "all 0.2s" }}>
              <button onClick={() => toggleDaily(item.id)}
                style={{ width: 24, height: 24, borderRadius: 12, border: `2px solid ${item.done ? t.green : t.border}`, background: item.done ? t.green : "transparent", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, color: "#fff", fontSize: 13, fontWeight: 900 }}>
                {item.done ? "✓" : ""}
              </button>
              <span style={{ flex: 1, fontSize: 15, fontWeight: 600, color: item.done ? t.textMuted : t.text, textDecoration: item.done ? "line-through" : "none" }}>
                {item.name}
              </span>
              <button onClick={() => deleteDailyItem(item.id)}
                style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 16, padding: "2px 4px" }}>×</button>
            </div>
          ))}

          {addDailyMode ? (
            <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 8 }}>
              <input value={newDailyName} onChange={e => setNewDailyName(e.target.value)}
                onKeyDown={e => { if (e.key === "Enter") addDailyItem(); if (e.key === "Escape") setAddDailyMode(false); }}
                placeholder="Navn på sjekkpunkt..." style={{ ...inputStyle, marginBottom: 10 }} />
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setAddDailyMode(false)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer", fontSize: 13 }}>Avbryt</button>
                <button onClick={addDailyItem} style={{ flex: 1, padding: "9px", borderRadius: 10, border: "none", background: blueDim, color: blue, fontWeight: 700, cursor: "pointer", fontSize: 13, border: `1px solid ${blueBorder}` }}>Legg til</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setAddDailyMode(true)} style={{ width: "100%", padding: "13px", borderRadius: 14, border: `1px dashed ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 4 }}>
              + Legg til sjekkpunkt
            </button>
          )}
        </div>
      )}

      {/* ── PROSJEKTER TAB ── */}
      {tab === "prosjekter" && (
        <div style={{ padding: "14px 20px 0" }}>
          {/* Project selector */}
          <div style={{ display: "flex", gap: 8, overflowX: "auto", scrollbarWidth: "none", marginBottom: 14, paddingBottom: 2 }}>
            {projects.map(proj => (
              <button key={proj.id} onClick={() => setActiveProjectId(proj.id)}
                style={{ padding: "7px 14px", borderRadius: 20, border: "1px solid", borderColor: activeProjectId === proj.id ? blueBorder : t.border, background: activeProjectId === proj.id ? blueDim : "transparent", color: activeProjectId === proj.id ? blue : t.textMuted, fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
                {proj.name}
                <span style={{ marginLeft: 6, fontSize: 11, opacity: 0.7 }}>{proj.tasks?.length || 0}</span>
              </button>
            ))}
            <button onClick={() => setAddProjectMode(true)}
              style={{ padding: "7px 14px", borderRadius: 20, border: `1px dashed ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
              + Nytt prosjekt
            </button>
          </div>

          {/* No project selected */}
          {!activeProjectId && (
            <div style={{ textAlign: "center", padding: "48px 20px", color: t.textMuted }}>
              <div style={{ fontSize: 36, marginBottom: 12 }}>📁</div>
              <div style={{ fontSize: 15, fontWeight: 600, marginBottom: 6 }}>Ingen prosjekt valgt</div>
              <div style={{ fontSize: 13 }}>Velg et prosjekt over, eller opprett et nytt</div>
            </div>
          )}

          {/* Active project */}
          {activeProject && (
            <div>
              {/* Project header */}
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                <div style={{ fontSize: 17, fontWeight: 800, color: t.text }}>{activeProject.name}</div>
                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                  {/* Sort controls */}
                  <div style={{ display: "flex", gap: 4, background: t.surface2, borderRadius: 10, padding: "3px" }}>
                    {["manuell", "frist", "prioritet"].map(mode => (
                      <button key={mode} onClick={() => setSortMode(mode)}
                        style={{ padding: "4px 9px", borderRadius: 8, border: "none", background: sortMode === mode ? blueDim : "transparent", color: sortMode === mode ? blue : t.textMuted, fontSize: 11, fontWeight: 600, cursor: "pointer" }}>
                        {mode === "manuell" ? "↕" : mode === "frist" ? "📅" : "⚡"}
                      </button>
                    ))}
                  </div>
                  <button onClick={() => deleteProject(activeProjectId)}
                    style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 14, padding: "4px 6px" }}>🗑️</button>
                </div>
              </div>

              {/* Task list */}
              {getSortedTasks(activeProject.tasks).map(task => {
                const isExpanded = expandedTaskId === task.id;
                const isEditing = editingTask?.id === task.id;
                const pc = PRIORITY_CONFIG[task.priority] || PRIORITY_CONFIG.middels;
                const sc = TASK_STATUS_CONFIG[task.status] || TASK_STATUS_CONFIG["ikke påbegynt"];
                const isDragging = dragId === task.id;
                const isDragOver = dragOverId === task.id;

                return (
                  <div key={task.id}
                    draggable={sortMode === "manuell"}
                    onDragStart={() => handleDragStart(task.id)}
                    onDragOver={e => handleDragOver(e, task.id)}
                    onDrop={() => handleDrop(task.id)}
                    onDragEnd={() => { setDragId(null); setDragOverId(null); }}
                    style={{ background: isDragOver ? blueDim : t.surface, border: `1px solid ${isDragOver ? blueBorder : t.border}`, borderRadius: 14, marginBottom: 8, opacity: isDragging ? 0.4 : 1, transition: "all 0.15s" }}>

                    {/* Task row */}
                    <div style={{ padding: "12px 14px", display: "flex", alignItems: "center", gap: 10 }}>
                      {sortMode === "manuell" && (
                        <span style={{ color: t.textFaint, fontSize: 14, cursor: "grab", flexShrink: 0, userSelect: "none" }}>⠿</span>
                      )}

                      {/* Status cycle button */}
                      <button onClick={() => cycleStatus(task)}
                        title={sc.label}
                        style={{ width: 22, height: 22, borderRadius: 11, border: `2px solid ${sc.dot}`, background: task.status === "ferdig" ? sc.dot : "transparent", cursor: "pointer", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
                        {task.status === "ferdig" && <span style={{ color: "#fff", fontSize: 11, fontWeight: 900 }}>✓</span>}
                        {task.status === "underveis" && <span style={{ width: 8, height: 8, borderRadius: 4, background: sc.dot, display: "block" }} />}
                      </button>

                      {/* Name + meta */}
                      <div style={{ flex: 1, minWidth: 0, cursor: "pointer" }} onClick={() => setExpandedTaskId(isExpanded ? null : task.id)}>
                        <div style={{ fontWeight: 600, fontSize: 14, color: task.status === "ferdig" ? t.textMuted : t.text, textDecoration: task.status === "ferdig" ? "line-through" : "none" }}>
                          {task.name}
                        </div>
                        <div style={{ display: "flex", gap: 8, marginTop: 3, flexWrap: "wrap", alignItems: "center" }}>
                          <span style={{ fontSize: 11, color: pc.color, fontWeight: 700 }}>{pc.label}</span>
                          <span style={{ fontSize: 11, color: sc.color }}>{sc.label}</span>
                          {task.deadline && <span style={{ fontSize: 11, color: t.textMuted }}>📅 {task.deadline}</span>}
                          {task.contacts?.length > 0 && <span style={{ fontSize: 11, color: t.textMuted }}>👤 {task.contacts.map(c => c.name).join(", ")}</span>}
                        </div>
                      </div>

                      <button onClick={() => setExpandedTaskId(isExpanded ? null : task.id)}
                        style={{ background: "transparent", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 14, padding: "2px 4px", transform: isExpanded ? "rotate(180deg)" : "none", transition: "transform 0.2s" }}>
                        ▾
                      </button>
                    </div>

                    {/* Expanded detail */}
                    {isExpanded && !isEditing && (
                      <TaskDetail task={task} t={t} inputStyle={inputStyle}
                        onEdit={() => setEditingTask({ ...task })}
                        onDelete={() => { deleteTask(task.id); setExpandedTaskId(null); }}
                        pc={pc} sc={sc} />
                    )}

                    {/* Edit mode */}
                    {isExpanded && isEditing && (
                      <TaskEditForm task={editingTask} t={t} inputStyle={inputStyle} selectStyle={selectStyle}
                        onChange={setEditingTask}
                        onSave={() => { updateTask(editingTask.id, editingTask); setEditingTask(null); }}
                        onCancel={() => setEditingTask(null)} />
                    )}
                  </div>
                );
              })}

              {/* Add task */}
              {addTaskMode ? (
                <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "16px" }}>
                  <div style={{ fontWeight: 700, fontSize: 15, marginBottom: 14, color: t.text }}>Ny oppgave</div>
                  <div style={{ marginBottom: 10 }}>
                    <label style={{ fontSize: 12, color: t.textMuted, display: "block", marginBottom: 4 }}>Navn *</label>
                    <input value={newTask.name} onChange={e => setNewTask(p => ({ ...p, name: e.target.value }))}
                      placeholder="Hva skal gjøres?" style={inputStyle} />
                  </div>
                  <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
                    <div style={{ flex: 1 }}>
                      <label style={{ fontSize: 12, color: t.textMuted, display: "block", marginBottom: 4 }}>Prioritet</label>
                      <select value={newTask.priority} onChange={e => setNewTask(p => ({ ...p, priority: e.target.value }))} style={selectStyle}>
                        <option value="høy">Høy</option>
                        <option value="middels">Middels</option>
                        <option value="lav">Lav</option>
                      </select>
                    </div>
                    <div style={{ flex: 1 }}>
                      <label style={{ fontSize: 12, color: t.textMuted, display: "block", marginBottom: 4 }}>Frist</label>
                      <input type="date" value={newTask.deadline} onChange={e => setNewTask(p => ({ ...p, deadline: e.target.value }))} style={inputStyle} />
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 10, marginTop: 4 }}>
                    <button onClick={() => { setAddTaskMode(false); setNewTask({ name: "", status: "ikke påbegynt", priority: "middels", deadline: "", contacts: [], customFields: [] }); }}
                      style={{ flex: 1, padding: "10px", borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer", fontSize: 13 }}>Avbryt</button>
                    <button onClick={addTask}
                      style={{ flex: 1, padding: "10px", borderRadius: 10, border: `1px solid ${blueBorder}`, background: blueDim, color: blue, fontWeight: 700, cursor: "pointer", fontSize: 13 }}>Legg til</button>
                  </div>
                </div>
              ) : (
                <button onClick={() => setAddTaskMode(true)}
                  style={{ width: "100%", padding: "13px", borderRadius: 14, border: `1px dashed ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 4 }}>
                  + Legg til oppgave
                </button>
              )}
            </div>
          )}
        </div>
      )}

      {/* Add project modal */}
      {addProjectMode && (
        <div style={{ position: "fixed", inset: 0, background: t.overlay, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }}>
          <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 18, padding: 24, width: "100%", maxWidth: 360 }}>

// ── Økonomi constants ─────────────────────────────────────────────────────────
const FREQ_LABELS = {
  månedlig: "Månedlig",
  annenhver: "Annenhver måned",
  ukentlig: "Ukentlig",
  kvartalsvis: "Kvartalsvis",
  halvårlig: "Halvårlig",
  årlig: "Årlig",
};

function nok(n) {
  return new Intl.NumberFormat("nb-NO", { style: "currency", currency: "NOK", maximumFractionDigits: 0 }).format(n || 0);
}

// Next payday: the 12th of current or next month, adjusted back if weekend
function nextPayday(from = new Date()) {
  const candidate = (month, year) => {
    const d = new Date(year, month, 12);
    const dow = d.getDay();
    if (dow === 0) d.setDate(11); // Sunday → Friday (but go back 2)
    if (dow === 0) d.setDate(10);
    // recalc
    const d2 = new Date(year, month, 12);
    const w = d2.getDay();
    if (w === 6) d2.setDate(11); // Saturday → Friday
    if (w === 0) d2.setDate(10); // Sunday → Friday
    return d2;
  };
  const now = new Date(from);
  now.setHours(0, 0, 0, 0);
  const thisMonth = candidate(from.getMonth(), from.getFullYear());
  if (thisMonth >= now) return thisMonth;
  const next = new Date(from.getFullYear(), from.getMonth() + 1, 1);
  return candidate(next.getMonth(), next.getFullYear());
}

function formatDate(dateStr) {
  if (!dateStr) return "";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("nb-NO", { day: "numeric", month: "short", year: "numeric" });
}

function monthKey(date = new Date()) {
  return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
}

function monthLabel(key) {
  const [y, m] = key.split("-");
  const d = new Date(parseInt(y), parseInt(m) - 1, 1);
  return d.toLocaleDateString("nb-NO", { month: "long", year: "numeric" });
}

// Monthly equivalent of a recurring expense
function toMonthlyCost(amount, freq) {
  switch (freq) {
    case "ukentlig":    return amount * 52 / 12;
    case "månedlig":    return amount;
    case "annenhver":   return amount / 2;
    case "kvartalsvis": return amount / 3;
    case "halvårlig":   return amount / 6;
    case "årlig":       return amount / 12;
    default:            return amount;
  }
}

function ØkonomiApp({ t, onBack }) {
  const [tab, setTab] = useState("oversikt");
  const [loaded, setLoaded] = useState(false);

  const [settings, setSettings] = useState({ lønn: "" });
  const [faste, setFaste] = useState([]);
  const [ventende, setVentende] = useState([]);
  const [transaksjoner, setTransaksjoner] = useState({}); // { "YYYY-MM": [{id, label, beløp, type:"inntekt"|"utgift", kilde:"manuell"|"fast"|"ventende"}] }
  const [aktivMåned, setAktivMåned] = useState(monthKey());

  // Modals
  const [showAddFast, setShowAddFast] = useState(false);
  const [editFast, setEditFast] = useState(null);
  const [newFast, setNewFast] = useState({ name: "", amount: "", freq: "månedlig", category: "", dueDay: "" });

  const [showAddVentende, setShowAddVentende] = useState(false);
  const [editVentende, setEditVentende] = useState(null);
  const [newVentende, setNewVentende] = useState({ name: "", amount: "", dueDate: "", note: "" });

  const [showAddTrans, setShowAddTrans] = useState(false);
  const [newTrans, setNewTrans] = useState({ label: "", beløp: "", type: "utgift" });

  const [showLønnEdit, setShowLønnEdit] = useState(false);
  const [lønnInput, setLønnInput] = useState("");

  // ── load ──
  useEffect(() => {
    async function load() {
      try {
        const sr = localStorage.getItem("okonomi:settings");
        const fr = localStorage.getItem("okonomi:faste");
        const vr = localStorage.getItem("okonomi:ventende");
        const tr = localStorage.getItem("okonomi:transaksjoner");
        if (sr) setSettings(JSON.parse(sr));
        if (fr) setFaste(JSON.parse(fr));
        if (vr) setVentende(JSON.parse(vr));
        if (tr) setTransaksjoner(JSON.parse(tr));
      } catch (_) {}
      setLoaded(true);
    }
    load();
  }, []);

  async function saveSettings(s) { setSettings(s); try { localStorage.setItem("okonomi:settings", JSON.stringify(s)); } catch (_) {} }
  async function saveFaste(f)    { setFaste(f);    try { localStorage.setItem("okonomi:faste", JSON.stringify(f)); } catch (_) {} }
  async function saveVentende(v) { setVentende(v); try { localStorage.setItem("okonomi:ventende", JSON.stringify(v)); } catch (_) {} }
  async function saveTrans(tr)   { setTransaksjoner(tr); try { localStorage.setItem("okonomi:transaksjoner", JSON.stringify(tr)); } catch (_) {} }

  // ── derived numbers ──
  const månedligFast = faste.reduce((sum, f) => sum + toMonthlyCost(parseFloat(f.amount) || 0, f.freq), 0);
  const lønn = parseFloat(settings.lønn) || 0;
  const budsjettert = lønn - månedligFast;

  // Check if a fixed expense falls in a given month key
  function fasteInnIMåned(mk) {
    const [y, m] = mk.split("-").map(Number);
    return faste.filter(f => {
      switch (f.freq) {
        case "månedlig": return true;
        case "ukentlig": return true;
        case "annenhver": return m % 2 === 1; // Jan, Mar, Mai, Jul, Sep, Nov
        case "kvartalsvis": {
          // find first month of the year this would hit, then every 3
          const startMonth = 1; // Jan
          return (m - startMonth) % 3 === 0;
        }
        case "halvårlig": return m % 6 === 1 || m % 6 === 0; // Jan+Jul or Feb+Aug etc — use creation month if available
        case "årlig": {
          if (!f.dueDay) return m === 1; // default January
          return true; // show in all months for simplicity, user can remove
        }
        default: return true;
      }
    });
  }

  // Auto-lines for active month (lønn + faste) — skjulte lagres i transaksjoner med kilde "auto-skjult"
  const skjulteAutoIds = new Set(
    (transaksjoner[aktivMåned] || []).filter(t => t.kilde === "auto-skjult").map(t => t.autoId)
  );

  function autoLinjer(mk) {
    const lines = [];
    if (lønn > 0) lines.push({ autoId: "lønn", label: "Lønn", beløp: lønn, type: "inntekt" });
    fasteInnIMåned(mk).forEach(f => {
      const beløp = f.freq === "ukentlig" ? Math.round(parseFloat(f.amount) * 52 / 12) : parseFloat(f.amount);
      lines.push({ autoId: "fast_" + f.id, label: f.name, beløp, type: "utgift" });
    });
    return lines.filter(l => !skjulteAutoIds.has(l.autoId));
  }

  function skjulAutoLinje(autoId) {
    const trans = { ...transaksjoner };
    const existing = trans[aktivMåned] || [];
    trans[aktivMåned] = [...existing, { id: "auto-skjult-" + Date.now(), kilde: "auto-skjult", autoId }];
    saveTrans(trans);
  }

  function visAutoLinje(autoId) {
    const trans = { ...transaksjoner };
    trans[aktivMåned] = (trans[aktivMåned] || []).filter(t => !(t.kilde === "auto-skjult" && t.autoId === autoId));
    saveTrans(trans);
  }

  const synligeAuto = autoLinjer(aktivMåned);
  const månedTrans = (transaksjoner[aktivMåned] || []).filter(t => t.kilde !== "auto-skjult");
  const alleLinjer = [...synligeAuto, ...månedTrans];
  const faktiskInntekt = alleLinjer.filter(t => t.type === "inntekt").reduce((s, t) => s + (parseFloat(t.beløp) || 0), 0);
  const faktiskUtgift  = alleLinjer.filter(t => t.type === "utgift").reduce((s, t) => s + (parseFloat(t.beløp) || 0), 0);
  const faktiskIgjen   = faktiskInntekt - faktiskUtgift;

  const payday = nextPayday();
  const daysToPayday = Math.ceil((payday - new Date().setHours(0,0,0,0)) / (1000*60*60*24));

  // ── faste helpers ──
  function addFast() {
    if (!newFast.name.trim() || !newFast.amount) return;
    const item = { ...newFast, id: "fast_" + Date.now(), amount: parseFloat(newFast.amount) };
    saveFaste([...faste, item]);
    setNewFast({ name: "", amount: "", freq: "månedlig", category: "", dueDay: "" });
    setShowAddFast(false);
  }
  function saveFastEdit() {
    saveFaste(faste.map(f => f.id === editFast.id ? { ...editFast, amount: parseFloat(editFast.amount) } : f));
    setEditFast(null);
  }
  function deleteFast(id) { saveFaste(faste.filter(f => f.id !== id)); }

  // ── ventende helpers ──
  function addVentende() {
    if (!newVentende.name.trim() || !newVentende.amount) return;
    const item = { ...newVentende, id: "vent_" + Date.now(), amount: parseFloat(newVentende.amount), paid: false };
    saveVentende([...ventende, item]);
    setNewVentende({ name: "", amount: "", dueDate: "", note: "" });
    setShowAddVentende(false);
  }
  function saveVentendeEdit() {
    saveVentende(ventende.map(v => v.id === editVentende.id ? { ...editVentende, amount: parseFloat(editVentende.amount) } : v));
    setEditVentende(null);
  }
  function deleteVentende(id) { saveVentende(ventende.filter(v => v.id !== id)); }
  function markVentendePaid(item) {
    // Move to regnskap as utgift for active month
    const trans = { ...(transaksjoner) };
    const mk = aktivMåned;
    const existing = trans[mk] || [];
    const entry = { id: "trans_" + Date.now(), label: item.name, beløp: item.amount, type: "utgift", kilde: "ventende" };
    trans[mk] = [...existing, entry];
    saveTrans(trans);
    saveVentende(ventende.filter(v => v.id !== item.id));
  }

  // ── transaksjoner helpers ──
  function addTrans() {
    if (!newTrans.label.trim() || !newTrans.beløp) return;
    const trans = { ...transaksjoner };
    const existing = trans[aktivMåned] || [];
    trans[aktivMåned] = [...existing, { id: "trans_" + Date.now(), label: newTrans.label, beløp: parseFloat(newTrans.beløp), type: newTrans.type, kilde: "manuell" }];
    saveTrans(trans);
    setNewTrans({ label: "", beløp: "", type: "utgift" });
    setShowAddTrans(false);
  }
  function deleteTrans(id) {
    const trans = { ...transaksjoner };
    trans[aktivMåned] = (trans[aktivMåned] || []).filter(t => t.id !== id);
    saveTrans(trans);
  }

  // ── month nav ──
  const allMonths = (() => {
    const now = new Date();
    const months = [];
    for (let i = -2; i <= 3; i++) {
      const d = new Date(now.getFullYear(), now.getMonth() + i, 1);
      months.push(monthKey(d));
    }
    return months;
  })();

  const inputStyle = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, boxSizing: "border-box", outline: "none", fontFamily: "inherit" };
  const selectStyle = { ...inputStyle, cursor: "pointer" };
  const blue = t.blue; const blueDim = t.blueDim; const blueBorder = t.blueBorder;

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}><div style={{ color: t.textMuted }}>Laster...</div></div>;

  const sortedVentende = [...ventende].sort((a, b) => {
    if (!a.dueDate && !b.dueDate) return 0;
    if (!a.dueDate) return 1;
    if (!b.dueDate) return -1;
    return a.dueDate.localeCompare(b.dueDate);
  });

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 70 }}>
      {/* Header */}
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.text }}>Økonomi 💰</span>
        <div style={{ width: 70 }} />
      </div>

      {/* Tab bar */}
      <div style={{ display: "flex", gap: 6, padding: "14px 20px 0" }}>
        {[["oversikt","📊"],["faste","🔁"],["ventende","⏳"],["regnskap","📋"]].map(([id, icon]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ flex: 1, padding: "9px 4px", borderRadius: 12, border: `1px solid ${tab === id ? blueBorder : t.border}`, background: tab === id ? blueDim : "transparent", color: tab === id ? blue : t.textMuted, fontSize: 11, fontWeight: 700, cursor: "pointer" }}>
            {icon}<br/><span style={{ fontSize: 10 }}>{id.charAt(0).toUpperCase() + id.slice(1)}</span>
          </button>

            </div>
          )}

          {/* Auto-linjer (lønn + faste) */}
          {synligeAuto.length > 0 && (
            <div style={{ marginBottom: 6 }}>
              <div style={{ fontSize: 10, color: t.textFaint, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, paddingLeft: 2 }}>Automatisk</div>
              {synligeAuto.map(tx => (
                <div key={tx.autoId} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "12px 14px", marginBottom: 7, display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 4, background: tx.type === "inntekt" ? t.green : "#ef4444", flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{tx.label}</div>
                    <div style={{ fontSize: 11, color: t.textFaint }}>Auto</div>
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: tx.type === "inntekt" ? t.green : "#ef4444", whiteSpace: "nowrap" }}>
                    {tx.type === "inntekt" ? "+" : "−"}{nok(tx.beløp)}
                  </div>
                  <button onClick={() => skjulAutoLinje(tx.autoId)} title="Fjern denne måneden" style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 15, padding: "2px 4px" }}>×</button>
                </div>
              ))}
              {skjulteAutoIds.size > 0 && (
                <button onClick={() => {
                  const trans = { ...transaksjoner };
                  trans[aktivMåned] = (trans[aktivMåned] || []).filter(t => t.kilde !== "auto-skjult");
                  saveTrans(trans);
                }} style={{ background: "transparent", border: "none", color: t.textMuted, fontSize: 12, cursor: "pointer", padding: "0 2px", marginBottom: 6 }}>
                  ↩ Vis {skjulteAutoIds.size} skjult{skjulteAutoIds.size > 1 ? "e" : ""}
                </button>
              )}
            </div>
          )}

          {/* Manuelle linjer */}
          {månedTrans.length > 0 && (
            <div style={{ marginBottom: 6 }}>
              {synligeAuto.length > 0 && <div style={{ fontSize: 10, color: t.textFaint, textTransform: "uppercase", letterSpacing: 1, marginBottom: 6, paddingLeft: 2 }}>Manuelt</div>}
              {månedTrans.map(tx => (
                <div key={tx.id} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "12px 14px", marginBottom: 7, display: "flex", alignItems: "center", gap: 10 }}>
                  <div style={{ width: 8, height: 8, borderRadius: 4, background: tx.type === "inntekt" ? t.green : "#ef4444", flexShrink: 0 }} />
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{tx.label}</div>
                    {tx.kilde === "ventende" && <div style={{ fontSize: 11, color: t.textFaint }}>Fra ventende</div>}
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 800, color: tx.type === "inntekt" ? t.green : "#ef4444", whiteSpace: "nowrap" }}>
                    {tx.type === "inntekt" ? "+" : "−"}{nok(tx.beløp)}
                  </div>
                  <button onClick={() => deleteTrans(tx.id)} style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 15, padding: "2px 4px" }}>×</button>
                </div>
              ))}
            </div>
          )}

          {showAddTrans ? (
            <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginTop: 4 }}>
              <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 12, color: t.text }}>Ny linje</div>
              <div style={{ marginBottom: 10 }}>
                <label style={{ fontSize: 11, color: t.textMuted, display: "block", marginBottom: 4 }}>Beskrivelse</label>
                <input value={newTrans.label} onChange={e => setNewTrans(p => ({ ...p, label: e.target.value }))} placeholder="F.eks. Lønn, Mathandel…" style={inputStyle} />
              </div>
              <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 11, color: t.textMuted, display: "block", marginBottom: 4 }}>Beløp (kr)</label>
                  <input type="number" value={newTrans.beløp} onChange={e => setNewTrans(p => ({ ...p, beløp: e.target.value }))} placeholder="0" style={inputStyle} />
                </div>
                <div style={{ flex: 1 }}>
                  <label style={{ fontSize: 11, color: t.textMuted, display: "block", marginBottom: 4 }}>Type</label>
                  <select value={newTrans.type} onChange={e => setNewTrans(p => ({ ...p, type: e.target.value }))} style={selectStyle}>
                    <option value="inntekt">Inntekt</option>
                    <option value="utgift">Utgift</option>
                  </select>
                </div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button onClick={() => setShowAddTrans(false)} style={{ flex: 1, padding: "9px", borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer", fontSize: 13 }}>Avbryt</button>
                <button onClick={addTrans} style={{ flex: 1, padding: "9px", borderRadius: 10, border: `1px solid ${blueBorder}`, background: blueDim, color: blue, fontWeight: 700, cursor: "pointer", fontSize: 13 }}>Legg til</button>
              </div>
            </div>
          ) : (
            <button onClick={() => setShowAddTrans(true)} style={{ width: "100%", padding: "13px", borderRadius: 14, border: `1px dashed ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer", marginTop: 4 }}>
              + Legg til linje
            </button>
          )}
        </div>
      )}

      {/* Lønn edit modal */}
      {showLønnEdit && (
        <div style={{ position: "fixed", inset: 0, background: t.overlay, display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }}>
          <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 18, padding: 24, width: "100%", maxWidth: 340 }}>
            <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 16, color: t.text }}>Månedslønn</div>
            <label style={{ fontSize: 12, color: t.textMuted, display: "block", marginBottom: 6 }}>Netto månedslønn (kr)</label>
            <input type="number" value={lønnInput} onChange={e => setLønnInput(e.target.value)}
              placeholder="F.eks. 35000" style={{ ...inputStyle, fontSize: 18, fontWeight: 700, marginBottom: 16 }}
              onKeyDown={e => { if (e.key === "Enter") { saveSettings({ ...settings, lønn: lønnInput }); setShowLønnEdit(false); }}} />
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setShowLønnEdit(false)} style={{ flex: 1, padding: "11px", borderRadius: 10, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, cursor: "pointer", fontSize: 14 }}>Avbryt</button>
              <button onClick={() => { saveSettings({ ...settings, lønn: lønnInput }); setShowLønnEdit(false); }}
                style={{ flex: 1, padding: "11px", borderRadius: 10, border: `1px solid ${blueBorder}`, background: blueDim, color: blue, fontWeight: 700, cursor: "pointer", fontSize: 14 }}>Lagre</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

  [1009,"Walking Wake",9,false,null],[1010,"Iron Leaves",9,false,null],[1011,"Dipplin",9,true,"HOME"],
  [1012,"Poltchageist",9,false,null],[1013,"Sinistcha",9,false,null],[1014,"Okidogi",9,false,null],
  [1015,"Munkidori",9,false,null],[1016,"Fezandipiti",9,false,null],[1018,"Archaludon",9,false,null],
  [1019,"Hydrapple",9,false,null],[1020,"Gouging Fire",9,false,null],[1021,"Raging Bolt",9,false,null],
  [1022,"Iron Boulder",9,false,null],[1023,"Iron Crown",9,false,null],[1025,"Pecharunt",9,false,null],
];

// Build lookup: dexNum -> base object
function buildShinyBase() {
  const map = {};
  SHINY_BASE.forEach(([num, name, gen, hasShiny, source]) => {
    map[num] = { num, name, gen, hasShiny, source: source || null };
  });
  return map;
}

const SHINY_BASE_MAP = buildShinyBase();
const GEN_RANGES = [
  [1,1,151],[2,152,251],[3,252,385],[4,386,493],[5,494,649],
  [6,650,721],[7,722,807],[8,810,904],[9,905,1025],[10,808,809]
];
// gen 10 = Special (Meltan/Melmetal)
const GEN_LABELS = ["Gen 1","Gen 2","Gen 3","Gen 4","Gen 5","Gen 6","Gen 7","Gen 8","Gen 9","Special"];
const GEN_TAB_IDS = ["1","2","3","4","5","6","7","8","9","special"];

function ShinyTrackerApp({ t, onBack, embedded }) {
  const isDark = t.bg === "#0d1117";
  const [userData, setUserData] = useState({}); // { [num]: { inHome, hunting, source, hasShiny } }
  const [loaded, setLoaded] = useState(false);
  const [genTab, setGenTab] = useState("alle");
  const [filter, setFilter] = useState("alle");
  const [search, setSearch] = useState("");
  // Transfer timer state
  const [timerStart, setTimerStart] = useState(null);    // ms timestamp
  const [timerInterval, setTimerInterval] = useState(6 * 24 * 60 * 60 * 1000); // 6 days default
  const [now, setNow] = useState(Date.now());
  const [showTimerSettings, setShowTimerSettings] = useState(false);
  const [settingDays, setSettingDays] = useState("6");
  const [settingHours, setSettingHours] = useState("0");
  const [settingMins, setSettingMins] = useState("0");

  useEffect(() => {
    try {
      const raw = localStorage.getItem("gaming:shiny");
      if (raw) {
        const parsed = JSON.parse(raw);
        // Split timer meta from pokemon data
        if (parsed.__timer) {
          setTimerStart(parsed.__timer.startedAt || null);
          setTimerInterval(parsed.__timer.intervalMs || 6 * 24 * 60 * 60 * 1000);
          const iv = parsed.__timer.intervalMs || 6 * 24 * 60 * 60 * 1000;
          const totalMins = Math.round(iv / 60000);
          const d = Math.floor(totalMins / 1440);
          const h = Math.floor((totalMins % 1440) / 60);
          const m = totalMins % 60;
          setSettingDays(String(d));
          setSettingHours(String(h));
          setSettingMins(String(m));
        }
        setUserData(parsed);
      }
    } catch (_) {}
    setLoaded(false);
    setTimeout(() => setLoaded(true), 0);
  }, []);

  // Tick every second when timer is active
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);

  function save(data) {
    setUserData(data);
    try { localStorage.setItem("gaming:shiny", JSON.stringify(data)); } catch (_) {}
  }

  function saveTimer(startedAt, intervalMs) {
    const next = { ...userData, __timer: { startedAt, intervalMs } };
    setTimerStart(startedAt);
    setTimerInterval(intervalMs);
    save(next);
  }

  function startTransferTimer() {
    saveTimer(Date.now(), timerInterval);
  }

  function resetTimer() {
    saveTimer(null, timerInterval);
  }

  function applyTimerSettings() {
    const d = parseInt(settingDays) || 0;
    const h = parseInt(settingHours) || 0;
    const m = parseInt(settingMins) || 0;
    const ms = ((d * 24 * 60) + (h * 60) + m) * 60000;
    const iv = ms > 0 ? ms : 6 * 24 * 60 * 60 * 1000;
    const next = { ...userData, __timer: { startedAt: timerStart, intervalMs: iv } };
    setTimerInterval(iv);
    save(next);
    setShowTimerSettings(false);
  }

  // Timer calculations
  const timerElapsed = timerStart ? (now - timerStart) : null;
  const timerDone = timerStart ? (timerElapsed >= timerInterval) : false;
  const timerRemaining = timerStart && !timerDone ? (timerInterval - timerElapsed) : 0;

  function fmtRemaining(ms) {
    const totalSecs = Math.max(0, Math.floor(ms / 1000));
    const d = Math.floor(totalSecs / 86400);
    const h = Math.floor((totalSecs % 86400) / 3600);
    const m = Math.floor((totalSecs % 3600) / 60);
    const s = totalSecs % 60;
    if (d > 0) return d + "d " + h + "t " + m + "m";
    if (h > 0) return h + "t " + m + "m " + s + "s";
    return m + "m " + s + "s";
  }

  function toggleInHome(num) {
    const cur = userOverride(num);
    save({ ...userData, [num]: { ...cur, inHome: !cur.inHome } });
  }
  function toggleHunting(num) {
    const cur = userOverride(num);
    save({ ...userData, [num]: { ...cur, hunting: !cur.hunting } });
  }
  function toggleHasShiny(num) {
    const cur = userOverride(num);
    const base = SHINY_BASE_MAP[num];
    const newVal = !cur.hasShiny;
    save({ ...userData, [num]: { ...cur, hasShiny: newVal, inHome: newVal ? cur.inHome : false, hunting: newVal ? cur.hunting : false } });
  }
  function toggleGO(num) {
    const cur = userOverride(num);
    const isGO = cur.source === "GO" || cur.source === "begge";
    // Cycle: null/HOME -> GO, GO -> null, begge -> null
    const newSource = isGO ? null : "GO";
    save({ ...userData, [num]: { ...cur, source: newSource } });
  }
  function setSource(num, src) {
    const cur = userOverride(num);
    save({ ...userData, [num]: { ...cur, source: src } });
  }

  function baseInHome(base) {
    return base && base.hasShiny && (base.source === "HOME" || base.source === "begge");
  }

  function userOverride(num) {
    const base = SHINY_BASE_MAP[num];
    const ud = userData[num] || {};
    const defaultInHome = baseInHome(base);
    return {
      hasShiny: ud.hasShiny !== undefined ? ud.hasShiny : (base ? base.hasShiny : false),
      inHome: ud.inHome !== undefined ? ud.inHome : defaultInHome,
      hunting: ud.hunting || false,
      source: ud.source !== undefined ? ud.source : (base ? base.source : null),
    };
  }

  function getEffective(num) {
    const base = SHINY_BASE_MAP[num];
    const ud = userData[num] || {};
    const defaultInHome = baseInHome(base);
    return {
      ...base,
      hasShiny: ud.hasShiny !== undefined ? ud.hasShiny : base.hasShiny,
      inHome: ud.inHome !== undefined ? ud.inHome : defaultInHome,
      hunting: ud.hunting || false,
      source: ud.source !== undefined ? ud.source : base.source,
    };
  }

  // Stats
  const allPokemon = SHINY_BASE.map(([num]) => getEffective(num));
  const haveShiny = allPokemon.filter(p => p.hasShiny);
  const inHome = haveShiny.filter(p => p.inHome);
  const hunting = allPokemon.filter(p => p.hunting && !p.hasShiny);
  const progress = haveShiny.length > 0 ? Math.round((inHome.length / haveShiny.length) * 100) : 0;

  // GO tab: shinies with GO source (or begge) not yet in HOME
  const goNums = SHINY_BASE.map(([num]) => num);
  const inGOList = goNums
    .map(num => getEffective(num))
    .filter(p => p.hasShiny && (p.source === "GO" || p.source === "begge") && !p.inHome);

  // Filter list
  const allNums = SHINY_BASE.map(([num]) => num);
  const filtered = allNums
    .map(num => getEffective(num))
    .filter(p => {
      // Gen filter
      if (genTab !== "alle") {
        const g = genTab === "special" ? 10 : parseInt(genTab);
        if (p.gen !== g) return false;
      }
      // Status filter
      if (filter === "go") return p.hasShiny && (p.source === "GO" || p.source === "begge") && !p.inHome;
      if (filter === "har") return p.hasShiny;
      if (filter === "mangler") return !p.hasShiny;
      if (filter === "trenger_home") return p.hasShiny && !p.inHome;
      if (filter === "jakter") return p.hunting;
      return true;
    })
    .filter(p => {
      if (!search.trim()) return true;
      return p.name.toLowerCase().includes(search.toLowerCase()) ||
             String(p.num).includes(search);
    });

  const purple = "#a855f7";
  const purpleDim = isDark ? "#2d1b69" : "#f3e8ff";
  const purpleBorder = isDark ? "#6d28d9" : "#c4b5fd";

  const sourceColors = {
    "GO": { color: "#3b82f6", bg: isDark ? "#0c1a3d" : "#eff6ff", border: isDark ? "#1e3a6e" : "#93c5fd" },
    "HOME": { color: "#22c55e", bg: isDark ? "#0a2e1a" : "#f0fdf4", border: isDark ? "#166534" : "#86efac" },
    "begge": { color: "#f97316", bg: isDark ? "#431407" : "#fff7ed", border: isDark ? "#7c2d12" : "#fdba74" },
  };

  const filterOpts = [
    ["alle","Alle"],["har","Har ✨"],["mangler","Mangler"],["trenger_home","Trenger HOME"],["jakter","Jakter 🎯"],["go","📍 I GO (" + inGOList.length + ")"],
  ];

  if (!loaded) return (
    <div style={{ background: t.bg, minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <div style={{ color: t.textMuted }}>Laster...</div>
    </div>
  );

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 80 }}>
      {/* Header (hidden when embedded in GamingApp tabs) */}
      {!embedded && (
        <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
          <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Gaming</button>
          <span style={{ fontSize: 20, fontWeight: 800, color: t.text }}>✨ Shiny Tracker</span>
          <div style={{ width: 70 }} />
        </div>
      )}

      {/* Stats bar */}
      <div style={{ margin: "16px 20px 0", background: t.surface, border: "1px solid " + t.border, borderRadius: 16, padding: "14px 16px" }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 10 }}>
          {/* Har shiny */}
          <div style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 900, color: purple }}>{haveShiny.length}</div>
            <div style={{ fontSize: 11, color: t.textMuted }}>Har shiny</div>
          </div>
          {/* I HOME — with transfer button below */}
          <div style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 900, color: t.green, animation: timerDone ? "shinyBlink 1s ease-in-out infinite" : "none" }}>{inHome.length}</div>
            <div style={{ fontSize: 11, color: t.textMuted }}>I HOME</div>
            {/* Transfer timer button */}
            <div style={{ marginTop: 6 }}>
              {!timerStart ? (
                <button onClick={startTransferTimer}
                  style={{ fontSize: 10, fontWeight: 700, padding: "4px 8px", borderRadius: 8, border: "1px solid " + t.green + "80", background: t.greenDim, color: t.green, cursor: "pointer", whiteSpace: "nowrap" }}>
                  🔄 Overfør nå
                </button>
              ) : timerDone ? (
                <button onClick={startTransferTimer}
                  style={{ fontSize: 10, fontWeight: 700, padding: "4px 8px", borderRadius: 8, border: "1px solid " + t.green, background: t.greenDim, color: t.green, cursor: "pointer", whiteSpace: "nowrap", animation: "shinyBlink 1s ease-in-out infinite" }}>
                  🔄 Klar igjen!
                </button>
              ) : (
                <button onClick={resetTimer}
                  style={{ fontSize: 10, fontWeight: 700, padding: "4px 8px", borderRadius: 8, border: "1px solid " + t.border, background: "transparent", color: t.textMuted, cursor: "pointer", whiteSpace: "nowrap" }}>
                  ⏱ {fmtRemaining(timerRemaining)}
                </button>
              )}
            </div>
          </div>
          {/* Jakter */}
          <div style={{ flex: 1, textAlign: "center" }}>
            <div style={{ fontSize: 22, fontWeight: 900, color: t.orange }}>{hunting.length}</div>
            <div style={{ fontSize: 11, color: t.textMuted }}>Jakter</div>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{ marginTop: 10 }}>
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: t.textMuted, marginBottom: 4 }}>
            <span>Overflyttet til HOME</span>
            <span style={{ fontWeight: 700, color: t.green }}>{progress}% ({inHome.length}/{haveShiny.length})</span>
          </div>
          <div style={{ background: t.bg, borderRadius: 99, height: 8, overflow: "hidden" }}>
            <div style={{ width: progress + "%", height: "100%", background: "linear-gradient(90deg, " + t.green + ", #16a34a)", borderRadius: 99, transition: "width 0.3s" }} />
          </div>
        </div>
      </div>

      {/* Search */}
      <div style={{ padding: "12px 20px 0" }}>
        <input
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Søk etter navn eller #..."
          style={{ width: "100%", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "10px 14px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", boxSizing: "border-box" }}
        />
      </div>

      {/* Filter chips */}
      <div style={{ display: "flex", gap: 6, padding: "10px 20px 0", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        {filterOpts.map(([id, label]) => (
          <button key={id} onClick={() => setFilter(id)}
            style={{ padding: "6px 12px", borderRadius: 20, border: `1px solid ${filter === id ? purpleBorder : t.border}`, background: filter === id ? purpleDim : "transparent", color: filter === id ? purple : t.textMuted, fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
            {label}
          </button>
        ))}
      </div>

      {/* Gen tabs */}
      <div style={{ display: "flex", gap: 5, padding: "10px 20px 0", overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        {[["alle","Alle"], ...GEN_LABELS.map((l,i) => [GEN_TAB_IDS[i], l])].map(([id, label]) => {
          const isSpecial = id === "special";
          const active = genTab === id;
          const specialColor = isDark ? "#a855f7" : "#9333ea";
          const specialDim = isDark ? "#2d1b69" : "#f3e8ff";
          const specialBorder = isDark ? "#6d28d9" : "#c4b5fd";
          const activeColor = isSpecial ? specialColor : t.blue;
          const activeDim = isSpecial ? specialDim : t.blueDim;
          const activeBorder = isSpecial ? specialBorder : t.blueBorder;
          return (
            <button key={id} onClick={() => setGenTab(id)}
              style={{ padding: "6px 11px", borderRadius: 10, border: "1px solid " + (active ? activeBorder : t.border), background: active ? activeDim : "transparent", color: active ? activeColor : t.textMuted, fontSize: 11, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
              {label}
            </button>
          );
        })}
      </div>

      {/* Count */}
      <div style={{ padding: "10px 20px 4px", fontSize: 12, color: t.textFaint }}>
        {filter === "go" ? filtered.length + " gjenstår i GO" : filtered.length + " Pokémon"}
      </div>

      {/* List */}
      <div style={{ padding: "0 20px" }}>
        {filtered.map(p => {
          return (
            <div key={p.num} style={{
              display: "flex", alignItems: "center", gap: 10,
              padding: "10px 12px", marginBottom: 6,
              background: p.hasShiny ? (isDark ? "#161b22" : "#ffffff") : (isDark ? "#0d1117" : "#f9f9f7"),
              border: `1px solid ${p.inHome ? t.green + "60" : p.hasShiny ? t.border : (isDark ? "#21262d30" : "#e0e0e0")}`,
              borderRadius: 12, opacity: p.hasShiny ? 1 : 0.55,
            }}>
              {/* Dex number */}
              <div style={{ fontSize: 11, color: t.textFaint, minWidth: 32, textAlign: "right", fontFamily: "monospace" }}>#{p.num}</div>

              {/* Name + status badges */}
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 14, fontWeight: p.hasShiny ? 700 : 400, color: p.hasShiny ? t.text : t.textMuted }}>
                    {p.hasShiny ? "✨ " : ""}{p.name}
                  </span>
                  {p.hasShiny && !p.inHome && (p.source === "GO" || p.source === "begge") && (
                    <span style={{ fontSize: 10, fontWeight: 700, color: t.blue, background: t.blueDim, border: "1px solid " + t.blueBorder, borderRadius: 6, padding: "1px 5px" }}>📍 GO</span>
                  )}
                  {p.hunting && !p.hasShiny && (
                    <span style={{ fontSize: 10, fontWeight: 700, color: t.orange, background: t.orangeDim, border: "1px solid " + t.orangeBorder, borderRadius: 6, padding: "1px 5px" }}>🎯 Jakt</span>
                  )}
                  {p.hasShiny && p.inHome && (
                    <span style={{ fontSize: 10, fontWeight: 700, color: t.green, background: t.greenDim, border: "1px solid " + t.green + "40", borderRadius: 6, padding: "1px 5px" }}>🏠 HOME</span>
                  )}
                </div>
              </div>

              {/* Actions */}
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                {/* Hunting toggle (only if no shiny yet) */}
                {!p.hasShiny && (
                  <button onClick={() => toggleHunting(p.num)}
                    title="Jakter denne"
                    style={{ background: p.hunting ? t.orangeDim : "transparent", border: `1px solid ${p.hunting ? t.orangeBorder : t.border}`, borderRadius: 8, width: 30, height: 30, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    🎯
                  </button>
                )}
                {/* Has shiny toggle */}
                <button onClick={() => toggleHasShiny(p.num)}
                  title={p.hasShiny ? "Fjern shiny" : "Har shiny"}
                  style={{ background: p.hasShiny ? purpleDim : "transparent", border: `1px solid ${p.hasShiny ? purpleBorder : t.border}`, borderRadius: 8, width: 30, height: 30, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>
                  ✨
                </button>
                {/* GO toggle (only if has shiny and not in HOME) */}
                {p.hasShiny && !p.inHome && (
                  <button onClick={() => toggleGO(p.num)}
                    title={(p.source === "GO" || p.source === "begge") ? "Fjern GO" : "Ligger i GO"}
                    style={{ background: (p.source === "GO" || p.source === "begge") ? t.blueDim : "transparent", border: "1px solid " + ((p.source === "GO" || p.source === "begge") ? t.blueBorder : t.border), borderRadius: 8, width: 30, height: 30, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    📍
                  </button>
                )}
                {/* In HOME toggle (only if has shiny) */}
                {p.hasShiny && (
                  <button onClick={() => toggleInHome(p.num)}
                    title={p.inHome ? "Fjern fra HOME" : "Marker som i HOME"}
                    style={{ background: p.inHome ? t.greenDim : "transparent", border: `1px solid ${p.inHome ? t.green + "80" : t.border}`, borderRadius: 8, width: 30, height: 30, cursor: "pointer", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    🏠
                  </button>
                )}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px", color: t.textMuted }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>{filter === "go" ? "🏠" : "✨"}</div>
            <div>{filter === "go" ? "Alle GO-shinies er overflyttet til HOME! 🎉" : "Ingen Pokémon matcher filteret"}</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Gaming app ────────────────────────────────────────────────────────────────
// Storage keys:
//   gaming:platforms   — liste med plattformer
//   gaming:releases    — kommende spill
//   gaming:backlog     — spill å spille
//   gaming:wishlist    — ønskeliste
//   gaming:favorites   — spilte spill med score
//   gaming:settings    — helhetsvekt osv.
//   gaming:shiny       — brukerdata for shiny tracker (inHome, hunting, source, hasShiny overrides)

const DEFAULT_PLATFORMS = ["PC", "PlayStation 5", "PlayStation 4", "Xbox", "Nintendo Switch", "Mobil"];
const SCORE_CATS = ["Stemning", "Spillbarhet", "Avhengighetsfaktor", "Lyd/Musikk", "Inntrykk/påvirkning"];
const HELHET_CAT = "Helhetsfølelse";

function calcTotal(scores, helhetWeight, nostalgi) {
  const helhet = scores[HELHET_CAT];
  if (nostalgi) {
    // Nostalgipoeng: kun Helhetsfølelse teller
    return helhet != null && helhet !== "" ? Number(helhet) : null;
  }
  const cats = SCORE_CATS.filter(c => scores[c] != null && scores[c] !== "");
  if (cats.length === 0 && !helhet) return null;
  const catSum = cats.reduce((s, c) => s + Number(scores[c]), 0);
  const w = Number(helhetWeight) || 2;
  const totalSum = catSum + (helhet != null && helhet !== "" ? Number(helhet) * w : 0);
  const totalCount = cats.length + (helhet != null && helhet !== "" ? w : 0);
  return totalCount > 0 ? Math.round((totalSum / totalCount) * 10) / 10 : null;
}

function parseReleaseDate(game) {
  if (!game.releaseDate) return null;
  if (game.releaseDate === "unknown") return null;
  if (/^\d{4}$/.test(game.releaseDate)) return new Date(parseInt(game.releaseDate), 11, 31);
  return new Date(game.releaseDate + "T00:00:00");
}

function formatReleaseDate(game) {
  if (!game.releaseDate || game.releaseDate === "unknown") return "Ukjent dato";
  if (/^\d{4}$/.test(game.releaseDate)) return game.releaseDate;
  return new Date(game.releaseDate + "T00:00:00").toLocaleDateString("nb-NO", { day: "numeric", month: "short", year: "numeric" });
}

function daysUntilRelease(game) {
  const d = parseReleaseDate(game);
  if (!d) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((d - now) / (1000*60*60*24));
}

function GamingScoreInput({ scores, onChange, settings, nostalgi, t }) {
  const visibleCats = nostalgi ? [HELHET_CAT] : [...SCORE_CATS, HELHET_CAT];
  return (
    <div>
      {visibleCats.map(cat => (
        <div key={cat} style={{ marginBottom: 10 }}>
          <label style={{ fontSize: 11, color: cat === HELHET_CAT ? t.orange : t.textMuted, display: "block", marginBottom: 4 }}>
            {cat} {cat === HELHET_CAT ? `(vekt ${settings.helhetWeight}x)` : ""}
          </label>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <input type="range" min="1" max="10" step="0.5"
              value={scores[cat] ?? 5}
              onChange={e => onChange({ ...scores, [cat]: e.target.value })}
              style={{ flex: 1, accentColor: cat === HELHET_CAT ? t.orange : t.blue }} />
            <span style={{ fontSize: 14, fontWeight: 700, color: cat === HELHET_CAT ? t.orange : t.text, minWidth: 28 }}>
              {scores[cat] ?? 5}
            </span>
          </div>
        </div>
      ))}
    </div>
  );
}
