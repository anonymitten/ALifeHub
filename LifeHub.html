function Hub() {
  const [darkMode, setDarkMode] = useState(true);
  const [screen, setScreen] = useState("splash");
  const [loaded, setLoaded] = useState(false);
  const t = THEMES[darkMode ? "dark" : "light"];
  const { isBursdag, isTest } = useBursdagStatus();
  const [showBursdag, setShowBursdag] = useState(false);

  function navigateTo(newScreen) {
    history.pushState({ screen: newScreen }, "", "");
    setScreen(newScreen);
  }

  useEffect(() => {
    function onPopState(e) {
      if (e.state && e.state.screen) {
        setScreen(e.state.screen);
      } else {
        setScreen("splash");
        history.pushState({ screen: "splash" }, "", "");
      }
    }
    window.addEventListener("popstate", onPopState);
    history.replaceState({ screen: "splash" }, "", "");
    return () => window.removeEventListener("popstate", onPopState);
  }, []);

  useEffect(() => {
    async function load() {
      try {
        const res = JSON.parse(localStorage.getItem("hub:settings"));
        if (res) {
          if (typeof res.darkMode === "boolean") setDarkMode(res.darkMode);
        }
      } catch (_) {}
      setLoaded(true);
    }
    load();
  }, []);

  async function toggleDark() {
    const next = !darkMode;
    setDarkMode(next);
    try { localStorage.setItem("hub:settings", JSON.stringify({ darkMode: next })); } catch (_) {}
  }

  useEffect(() => {
    if (!loaded) return;
    const today = new Date();
    const key = `hub:bursdag:sett:${today.getFullYear()}-${today.getMonth()+1}-${today.getDate()}`;
    const already = localStorage.getItem(key);
    if ((isBursdag || isTest) && !already) {
      setShowBursdag(true);
      localStorage.setItem(key, "1");
    }
  }, [loaded]);

  if (!loaded) return <div style={{ background: "#0d1117", minHeight: "100vh" }} />;

  if (showBursdag) {
    return <BursdagsOverlay isTest={isTest} onClose={() => setShowBursdag(false)} />;
  }

  if (screen === "app:trening")   return <TreningApp t={t} onBack={() => navigateTo("arbeid")} />;
  if (screen === "app:husarbeid") return <HusoppgaverApp t={t} onBack={() => navigateTo("arbeid")} />;
  if (screen === "app:handleliste") return <HandlelisteApp t={t} onBack={() => navigateTo("arbeid")} />;
  if (screen === "app:jobb")     return <JobbApp t={t} onBack={() => navigateTo("arbeid")} />;
  if (screen === "app:okonomi")  return <ØkonomiApp t={t} onBack={() => navigateTo("arbeid")} />;
  if (screen === "app:gaming")     return <GamingApp t={t} onBack={() => navigateTo("fritid")} />;
  if (screen === "app:lister")     return <ListerApp th={t} onBack={() => navigateTo("fritid")} />;
  if (screen === "app:onskeliste") return <GaverOnskelisteApp t={t} onBack={() => navigateTo("fritid")} />;
  if (screen === "app:drommer")    return <DrommerApp t={t} onBack={() => navigateTo("fritid")} />;
  if (screen === "app:kor")      return <KorApp t={t} onBack={() => navigateTo("fritid")} />;
  if (screen === "app:gladidag") return <GladIDagApp t={t} onBack={() => navigateTo("splash")} />;

  // ── Hemmelig screens ──
  if (screen === "hemmelig") {
    return <HemmeligSplash t={t} onBack={() => navigateTo("splash")} onOpenCat={id => navigateTo("hemmelig:" + id)} onChangePin={() => {}} />;
  }
  if (screen.startsWith("hemmelig:")) {
    const rest = screen.replace("hemmelig:", "");
    // Sub-app within a category: hemmelig:catId:appId
    if (rest.includes(":")) {
      const [catId, appId] = rest.split(":");
      // Actual sub-app implementations go here as they're built
      // Actual implementations
      if (appId === "orgasmekalender") return <OrgasmekalenderApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "bodycount") return <BodyCountApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "onskeliste") return <OnskelisteApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "turnons") return <KinkProfilApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "bucketlist") return <BucketlistApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "favorittvideoer") return <FavorittvideoApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "personkatalog") return <PersonkatalogApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "julegave") return <JulegaveApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "sexlysttracker") return <SexlystApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "stitester") return <STIApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "humorkart") return <VelvareApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "sosialemaal") return <SosialeMaalApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "dagbok") return <DagbokApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
      if (appId === "passord") return <PassordApp t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;

      const APP_META = {
        orgasmekalender: { name: "Orgasmekalender", icon: "📅" },
        bodycount:       { name: "Body count-liste", icon: "🗒️" },
        onskeliste:      { name: "Ønskeliste for ligg", icon: "💭" },
        turnons:         { name: "Turn-ons og -offs", icon: "🌶️" },
        bucketlist:      { name: "Sex-bucketlist", icon: "✅" },
        sexlysttracker:  { name: "Sexlyst-tracker", icon: "📊" },
        stitester:       { name: "STI-testhistorikk", icon: "🧪" },
        humorkart:       { name: "Velværekalender", icon: "📈" },
        sosialemaal:     { name: "Sosiale mål", icon: "🎯" },
        dagbok:          { name: "Dagbok", icon: "📓" },
        personkatalog:   { name: "Personkatalog", icon: "🗂️" },
        julegave:        { name: "Julegavelister", icon: "🎁" },
        passord:         { name: "Passord og pinkoder", icon: "🔑" },
      };
      const meta = APP_META[appId] || { name: appId, icon: "📱" };
      return <HemmeligComingSoon name={meta.name} icon={meta.icon} t={t} onBack={() => navigateTo("hemmelig:" + catId)} />;
    }
    // Category page: hemmelig:catId
    return <HemmeligCategoryPage category={rest} t={t} onBack={() => navigateTo("hemmelig")} onOpenApp={appId => navigateTo("hemmelig:" + rest + ":" + appId)} />;
  }

  if (screen.startsWith("app:")) {
    const appId = screen.replace("app:", "");
    const META = {
      kor:    { name: "Kor og øving", icon: "🎵" },
      gaming: { name: "Gaming",       icon: "🎮" },
      lister: { name: "Lister",       icon: "📋" },
    };
    const meta = META[appId] || { name: appId, icon: "📱" };
    return <ComingSoon name={meta.name} icon={meta.icon} t={t} onBack={() => navigateTo("fritid")} />;
  }

  if (screen === "arbeid" || screen === "fritid") {
    return <CategoryPage category={screen} t={t} onBack={() => navigateTo("splash")} onOpenApp={id => navigateTo("app:" + id)} darkMode={darkMode} onToggleDark={toggleDark} />;
  }

  return <SplashScreen t={t} onSelect={navigateTo} darkMode={darkMode} onToggleDark={toggleDark} />;
}
