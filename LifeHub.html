          <button onClick={handleSave} style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: t.purple, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>Lagre</button>
        </div>
      </div>
    </div>
  );
}

function VelvareKalender({ entries, onSelectDato, t }) {
  const now = new Date();
  const [year, setYear] = useState(now.getFullYear());
  const [month, setMonth] = useState(now.getMonth());

  const datoMap = Object.fromEntries(entries.map(e => [e.dato, e]));

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const startOffset = (firstDay + 6) % 7;

  const avgColor = entry => {
    if (!entry) return null;
    const v = entry.verdier;
    const pos = ((v.humor || 3) + (v.selvtillit || 3) + (v.sosialt || 3)) / 3;
    const neg = ((v.stress || 3) + (v.angst || 3) + (v.adhd || 3)) / 3;
    const score = (pos - neg + 4) / 8;
    const r = Math.round(score < 0.5 ? 239 : 34);
    const g = Math.round(score < 0.5 ? 68 : 197);
    return `rgb(${r},${g},94)`;
  };

  const mndNavn = ["Januar","Februar","Mars","April","Mai","Juni","Juli","August","September","Oktober","November","Desember"];

  return (
    <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, padding: "16px", marginBottom: 16 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <button onClick={() => { if (month === 0) { setMonth(11); setYear(y => y-1); } else setMonth(m => m-1); }}
          style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 8, padding: "6px 12px", color: t.textMuted, cursor: "pointer" }}>‹</button>
        <span style={{ fontWeight: 700, color: t.text }}>{mndNavn[month]} {year}</span>
        <button onClick={() => { if (month === 11) { setMonth(0); setYear(y => y+1); } else setMonth(m => m+1); }}
          style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 8, padding: "6px 12px", color: t.textMuted, cursor: "pointer" }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3, marginBottom: 6 }}>
        {["Ma","Ti","On","To","Fr","Lø","Sø"].map(d => (
          <div key={d} style={{ textAlign: "center", fontSize: 11, color: t.textFaint, fontWeight: 700 }}>{d}</div>
        ))}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 3 }}>
        {Array.from({ length: startOffset }).map((_, i) => <div key={"e"+i} />)}
        {Array.from({ length: daysInMonth }).map((_, i) => {
          const day = i + 1;
          const dateStr = `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;
          const entry = datoMap[dateStr];
          const color = avgColor(entry);
          const isToday = dateStr === new Date().toISOString().slice(0, 10);
          return (
            <button key={day} onClick={() => onSelectDato(dateStr)}
              style={{ aspectRatio: "1", borderRadius: 8, border: isToday ? `2px solid ${t.purple}` : "none",
                background: color || (isToday ? t.purpleDim : t.bg), cursor: "pointer",
                display: "flex", alignItems: "center", justifyContent: "center",
                fontSize: 12, fontWeight: isToday ? 800 : 500, color: color ? "#fff" : (isToday ? t.purple : t.textFaint) }}>
              {day}
            </button>
          );
        })}
      </div>
      <div style={{ display: "flex", gap: 12, marginTop: 10, justifyContent: "center" }}>
        <span style={{ fontSize: 11, color: t.textFaint }}>🟢 God dag</span>
        <span style={{ fontSize: 11, color: t.textFaint }}>🔴 Tung dag</span>
        <span style={{ fontSize: 11, color: t.textFaint }}>⬛ Ikke logget</span>
      </div>
    </div>
  );
}

function VelvareApp({ t, onBack }) {
  const [entries, setEntries] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [tab, setTab] = useState("kalender");

  useEffect(() => { setEntries(loadVelvare()); }, []);

  function handleSave(entry) {
    const updated = entries.find(e => e.id === entry.id)
      ? entries.map(e => e.id === entry.id ? entry : e)
      : [entry, ...entries];
    setEntries(updated);
    saveVelvare(updated);
    setShowModal(false);
    setEditEntry(null);
  }
  function handleDelete(id) {
    const updated = entries.filter(e => e.id !== id);
    setEntries(updated);
    saveVelvare(updated);
  }

  function handleSelectDato(dato) {
    const ex = entries.find(e => e.dato === dato);
    if (ex) { setEditEntry(ex); setShowModal(true); }
    else { setEditEntry({ dato }); setShowModal(true); }
  }

  const sorted = [...entries].sort((a, b) => b.dato.localeCompare(a.dato));
  const today = new Date().toISOString().slice(0, 10);
  const todayEntry = entries.find(e => e.dato === today);

  const last7 = sorted.filter(e => e.dato >= new Date(Date.now() - 7*86400000).toISOString().slice(0,10));
  const avg7 = key => last7.length ? (last7.reduce((s, e) => s + (e.verdier[key] || 3), 0) / last7.length).toFixed(1) : "–";

  const tabSt = active => ({
    flex: 1, padding: "10px", borderRadius: 10, border: "none",
    background: active ? t.purple : "transparent", color: active ? "#fff" : t.textMuted,
    fontWeight: 700, fontSize: 14, cursor: "pointer"
  });

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 80 }}>
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.purple }}>📈 Velværekalender</span>
        <button onClick={() => { setEditEntry(null); setShowModal(true); }}
          style={{ background: t.purple, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ I dag</button>
      </div>

      <div style={{ padding: "16px 20px 0" }}>
        {!todayEntry && (
          <button onClick={() => { setEditEntry(null); setShowModal(true); }}
            style={{ width: "100%", padding: "16px", borderRadius: 14, border: `2px dashed ${t.purple}`, background: t.purpleDim,
              color: t.purple, fontWeight: 700, fontSize: 15, cursor: "pointer", marginBottom: 16 }}>
            📋 Logg hvordan du har det i dag
          </button>
        )}

        <div style={{ display: "flex", background: t.surface, borderRadius: 12, padding: 4, marginBottom: 16 }}>
          <button style={tabSt(tab === "kalender")} onClick={() => setTab("kalender")}>Kalender</button>
          <button style={tabSt(tab === "logg")} onClick={() => setTab("logg")}>Logg</button>
          <button style={tabSt(tab === "stats")} onClick={() => setTab("stats")}>Snitt</button>
        </div>

        {tab === "kalender" && <VelvareKalender entries={entries} onSelectDato={handleSelectDato} t={t} />}

        {tab === "stats" && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            {VELVARE_FELTER.map(f => (
              <div key={f.key} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px" }}>
                <div style={{ fontSize: 20 }}>{f.label.split(" ")[0]}</div>
                <div style={{ fontSize: 22, fontWeight: 900, color: t.purple, marginTop: 6 }}>{avg7(f.key)}</div>
                <div style={{ fontSize: 12, color: t.textMuted, marginTop: 2 }}>{f.label.slice(f.label.indexOf(" ")+1)}</div>
                <div style={{ fontSize: 11, color: t.textFaint }}>snitt siste 7d</div>
              </div>
            ))}
          </div>
        )}

        {tab === "logg" && (
          <div>
            {sorted.length === 0 && <div style={{ textAlign: "center", color: t.textMuted, padding: 40 }}>Ingen innlegg ennå.</div>}
            {sorted.map(e => {
              const v = e.verdier;
              return (
                <button key={e.id} onClick={() => { setEditEntry(e); setShowModal(true); }}
                  style={{ width: "100%", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10, textAlign: "left", cursor: "pointer" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontWeight: 700, color: t.text }}>{new Date(e.dato + "T12:00:00").toLocaleDateString("nb-NO", { weekday: "short", day: "numeric", month: "short" })}</span>
                    <button onClick={ev => { ev.stopPropagation(); if(window.confirm("Slett dette innlegget?")) handleDelete(e.id); }}
                      style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14 }}>×</button>
                  </div>
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                    {VELVARE_FELTER.map(f => (
                      <span key={f.key} style={{ fontSize: 12, color: t.textMuted, background: t.bg, padding: "3px 8px", borderRadius: 8 }}>
                        {f.label.split(" ")[0]} {v[f.key] || "–"}
                      </span>
                    ))}
                  </div>
                  {e.notat && <div style={{ fontSize: 12, color: t.textFaint, marginTop: 8, fontStyle: "italic" }}>{e.notat}</div>}
                </button>
              );
            })}
          </div>
        )}
      </div>

      {showModal && (
        <VelvareModal entry={editEntry} onSave={handleSave} onClose={() => { setShowModal(false); setEditEntry(null); }} t={t} />
      )}
    </div>
  );
}

// ── Hemmelig: Sosiale mål ──────────────────────────────────────────────────────
// Storage: hemmelig:sosialemaal
function loadSosialeMaal() {
  try { const r = localStorage.getItem("hemmelig:sosialemaal"); return r ? JSON.parse(r) : []; } catch(_) { return []; }
}
function saveSosialeMaal(data) {
  try { localStorage.setItem("hemmelig:sosialemaal", JSON.stringify(data)); } catch(_) {}
}

function SosialeMaalModal({ maal, onSave, onClose, t }) {
  const [tekst, setTekst] = useState(maal ? maal.tekst : "");
  const [kategori, setKategori] = useState(maal ? maal.kategori : "ambisjon");
  const [notat, setNotat] = useState(maal ? maal.notat : "");

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };

  function handleSave() {
    if (!tekst.trim()) return;
    onSave({ id: maal ? maal.id : "sm" + Date.now(), tekst: tekst.trim(), kategori, notat, fullfort: maal ? maal.fullfort : false, createdAt: maal ? maal.createdAt : Date.now() });
  }

  const kats = [["ambisjon","🎯 Ambisjon"],["vane","🔄 Vane"],["grense","🛑 Grense"],["onske","💫 Ønske"]];

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "24px 20px 44px" }}>
        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 20 }}>{maal ? "Rediger mål" : "Nytt sosialt mål"}</div>
        <div style={{ marginBottom: 16 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: t.textMuted, display: "block", marginBottom: 6 }}>Mål / vane</span>
          <textarea value={tekst} onChange={e => setTekst(e.target.value)} placeholder="Hva vil du oppnå eller praktisere sosialt?" rows={3}
            style={{ ...inputSt, resize: "none" }} />
        </div>
        <div style={{ marginBottom: 16 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: t.textMuted, display: "block", marginBottom: 8 }}>Type</span>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {kats.map(([val, lbl]) => (
              <button key={val} onClick={() => setKategori(val)}
                style={{ padding: "10px 16px", borderRadius: 10, border: `2px solid ${kategori === val ? t.purple : t.border}`,
                  background: kategori === val ? t.purpleDim : t.bg, color: kategori === val ? t.purple : t.textMuted,
                  fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                {lbl}
              </button>
            ))}
          </div>
        </div>
        <div style={{ marginBottom: 24 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: t.textMuted, display: "block", marginBottom: 6 }}>Notat / kontekst</span>
          <textarea value={notat} onChange={e => setNotat(e.target.value)} placeholder="Bakgrunn, motivasjon..." rows={2}
            style={{ ...inputSt, resize: "none" }} />
        </div>
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontWeight: 700, cursor: "pointer" }}>Avbryt</button>
          <button onClick={handleSave} style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: t.purple, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>Lagre</button>
        </div>
      </div>
    </div>
  );
}

function SosialeMaalApp({ t, onBack }) {
  const [maal, setMaal] = useState([]);
  const [showModal, setShowModal] = useState(false);
  const [editMaal, setEditMaal] = useState(null);
  const [filter, setFilter] = useState("alle");

  useEffect(() => { setMaal(loadSosialeMaal()); }, []);

  function handleSave(m) {
    const updated = maal.find(x => x.id === m.id)
      ? maal.map(x => x.id === m.id ? m : x)
      : [...maal, m];
    setMaal(updated);
    saveSosialeMaal(updated);
    setShowModal(false);
    setEditMaal(null);
  }
  function handleDelete(id) {
    const updated = maal.filter(m => m.id !== id);
    setMaal(updated);
    saveSosialeMaal(updated);
  }
  function toggleFullfort(id) {
    const updated = maal.map(m => m.id === id ? { ...m, fullfort: !m.fullfort } : m);
    setMaal(updated);
    saveSosialeMaal(updated);
  }

  const katMeta = { ambisjon: { label: "🎯 Ambisjoner", color: t.purple }, vane: { label: "🔄 Vaner", color: "#22c55e" }, grense: { label: "🛑 Grenser", color: "#ef4444" }, onske: { label: "💫 Ønsker", color: t.pink } };

  const filtered = filter === "alle" ? maal : filter === "aktive" ? maal.filter(m => !m.fullfort) : maal.filter(m => m.fullfort);
  const grouped = Object.entries(katMeta).map(([key, meta]) => ({ key, meta, items: filtered.filter(m => m.kategori === key) })).filter(g => g.items.length > 0);

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 80 }}>
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.purple }}>🎯 Sosiale mål</span>
        <button onClick={() => { setEditMaal(null); setShowModal(true); }}
          style={{ background: t.purple, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Legg til</button>
      </div>

      <div style={{ padding: "16px 20px 0" }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 16 }}>
          {[["alle","Alle"],["aktive","Aktive"],["fullfort","Fullført"]].map(([val, lbl]) => (
            <button key={val} onClick={() => setFilter(val)}
              style={{ padding: "8px 16px", borderRadius: 20, border: `1px solid ${filter === val ? t.purple : t.border}`,
                background: filter === val ? t.purpleDim : t.bg, color: filter === val ? t.purple : t.textMuted,
                fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
              {lbl}
            </button>
          ))}
        </div>

        {maal.length === 0 && (
          <div style={{ textAlign: "center", color: t.textMuted, padding: 40 }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🤝</div>
            <div>Legg til sosiale ambisjoner, vaner og grenser.</div>
          </div>
        )}

        {grouped.map(({ key, meta, items }) => (
          <div key={key} style={{ marginBottom: 20 }}>
            <div style={{ fontSize: 14, fontWeight: 700, color: meta.color, marginBottom: 10 }}>{meta.label}</div>
            {items.map(m => (
              <div key={m.id} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 8, opacity: m.fullfort ? 0.6 : 1 }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 10 }}>
                  <button onClick={() => toggleFullfort(m.id)}
                    style={{ width: 24, height: 24, minWidth: 24, borderRadius: 6, border: `2px solid ${m.fullfort ? meta.color : t.border}`,
                      background: m.fullfort ? meta.color : "transparent", cursor: "pointer", marginTop: 2, color: "#fff", fontSize: 14, display: "flex", alignItems: "center", justifyContent: "center" }}>
                    {m.fullfort ? "✓" : ""}
                  </button>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 14, color: t.text, textDecoration: m.fullfort ? "line-through" : "none", marginBottom: m.notat ? 4 : 0 }}>{m.tekst}</div>
                    {m.notat && <div style={{ fontSize: 12, color: t.textFaint, fontStyle: "italic" }}>{m.notat}</div>}
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    <button onClick={() => { setEditMaal(m); setShowModal(true); }}
                      style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 14 }}>✏️</button>
                    <button onClick={() => { if(window.confirm("Slett dette målet?")) handleDelete(m.id); }}
                      style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 14 }}>×</button>
                  </div>
                </div>
              </div>
            ))}
          </div>
        ))}
      </div>

      {showModal && (
        <SosialeMaalModal maal={editMaal} onSave={handleSave} onClose={() => { setShowModal(false); setEditMaal(null); }} t={t} />
      )}
    </div>
  );
}

// ── Hemmelig: Dagbok ───────────────────────────────────────────────────────────
// Storage: hemmelig:dagbok
function loadDagbok() {
  try { const r = localStorage.getItem("hemmelig:dagbok"); return r ? JSON.parse(r) : []; } catch(_) { return []; }
}
function saveDagbok(data) {
  try { localStorage.setItem("hemmelig:dagbok", JSON.stringify(data)); } catch(_) {}
}

const DAGBOK_KATS = [
  { id: "refleksjon", label: "💭 Refleksjon", color: "#c084fc" },
  { id: "skam",       label: "😔 Skam",        color: "#ef4444" },
  { id: "stolthet",   label: "✨ Stolthet",     color: "#22c55e" },
  { id: "annet",      label: "📝 Annet",        color: "#7d8590" },
];

function DagbokEditor({ entry, onSave, onClose, t }) {
  const today = new Date().toISOString().slice(0, 10);
  const [dato, setDato] = useState(entry ? entry.dato : today);
  const [kategori, setKategori] = useState(entry ? entry.kategori : "refleksjon");
  const [tittel, setTittel] = useState(entry ? entry.tittel : "");
  const [tekst, setTekst] = useState(entry ? entry.tekst : "");

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };

  function handleSave() {
    if (!tekst.trim()) return;
    onSave({ id: entry ? entry.id : "db" + Date.now(), dato, kategori, tittel: tittel.trim(), tekst: tekst.trim(), createdAt: entry ? entry.createdAt : Date.now() });
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${t.border}` }}>
        <button onClick={onClose} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Avbryt</button>
        <span style={{ fontSize: 16, fontWeight: 800, color: t.text }}>📓 {entry ? "Rediger" : "Ny dagbokoppføring"}</span>
        <button onClick={handleSave} style={{ background: t.purple, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Lagre</button>
      </div>
      <div style={{ flex: 1, padding: "16px 20px", overflowY: "auto" }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 14 }}>
          <input type="date" value={dato} onChange={e => setDato(e.target.value)}
            style={{ ...inputSt, flex: 1 }} />
        </div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 14 }}>
          {DAGBOK_KATS.map(k => (
            <button key={k.id} onClick={() => setKategori(k.id)}
              style={{ padding: "8px 14px", borderRadius: 20, border: `2px solid ${kategori === k.id ? k.color : t.border}`,
                background: kategori === k.id ? k.color + "22" : t.bg, color: kategori === k.id ? k.color : t.textMuted,
                fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
              {k.label}
            </button>
          ))}
        </div>
        <input value={tittel} onChange={e => setTittel(e.target.value)} placeholder="Tittel (valgfritt)..."
          style={{ ...inputSt, marginBottom: 12, fontSize: 16, fontWeight: 600 }} />
        <textarea value={tekst} onChange={e => setTekst(e.target.value)} placeholder="Skriv her..."
          style={{ ...inputSt, resize: "none", minHeight: 300, lineHeight: 1.6 }} rows={15} />
      </div>
    </div>
  );
}

function DagbokApp({ t, onBack }) {
  const [entries, setEntries] = useState([]);
  const [editEntry, setEditEntry] = useState(null);
  const [isEditing, setIsEditing] = useState(false);
  const [search, setSearch] = useState("");
  const [filterKat, setFilterKat] = useState("alle");

  useEffect(() => { setEntries(loadDagbok()); }, []);

  function handleSave(entry) {
    const updated = entries.find(e => e.id === entry.id)
      ? entries.map(e => e.id === entry.id ? entry : e)
      : [entry, ...entries];
    setEntries(updated);
    saveDagbok(updated);
    setIsEditing(false);
    setEditEntry(null);
  }
  function handleDelete(id) {
    const updated = entries.filter(e => e.id !== id);
    setEntries(updated);
    saveDagbok(updated);
  }

  if (isEditing) {
    return <DagbokEditor entry={editEntry} onSave={handleSave} onClose={() => { setIsEditing(false); setEditEntry(null); }} t={t} />;
  }

  const sorted = [...entries].sort((a, b) => b.dato.localeCompare(a.dato));
  const filtered = sorted.filter(e => {
    const katOk = filterKat === "alle" || e.kategori === filterKat;
    const searchOk = !search || e.tittel?.toLowerCase().includes(search.toLowerCase()) || e.tekst.toLowerCase().includes(search.toLowerCase());
    return katOk && searchOk;
  });

  const katMeta = Object.fromEntries(DAGBOK_KATS.map(k => [k.id, k]));

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 80 }}>
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.purple }}>📓 Dagbok</span>
        <button onClick={() => { setEditEntry(null); setIsEditing(true); }}
          style={{ background: t.purple, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ny</button>
      </div>

      <div style={{ padding: "16px 20px 0" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Søk i dagboken..."
          style={{ width: "100%", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 14px", color: t.text, fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 12 }} />

        <div style={{ display: "flex", gap: 8, marginBottom: 16, overflowX: "auto", paddingBottom: 4 }}>
          <button onClick={() => setFilterKat("alle")}
            style={{ padding: "8px 14px", borderRadius: 20, border: `1px solid ${filterKat === "alle" ? t.purple : t.border}`,
              background: filterKat === "alle" ? t.purpleDim : t.bg, color: filterKat === "alle" ? t.purple : t.textMuted,
              fontWeight: 600, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>
            Alle ({entries.length})
          </button>
          {DAGBOK_KATS.map(k => (
            <button key={k.id} onClick={() => setFilterKat(k.id)}
              style={{ padding: "8px 14px", borderRadius: 20, border: `1px solid ${filterKat === k.id ? k.color : t.border}`,
                background: filterKat === k.id ? k.color + "22" : t.bg, color: filterKat === k.id ? k.color : t.textMuted,
                fontWeight: 600, fontSize: 13, cursor: "pointer", whiteSpace: "nowrap" }}>
              {k.label} ({entries.filter(e => e.kategori === k.id).length})
            </button>
          ))}
        </div>

        {filtered.length === 0 && (
          <div style={{ textAlign: "center", color: t.textMuted, padding: 40 }}>
            {entries.length === 0 ? (
              <div>
                <div style={{ fontSize: 40, marginBottom: 12 }}>📓</div>
                <div>Start dagboken din.</div>
              </div>
            ) : <div>Ingen treff på søket.</div>}
          </div>
        )}

        {filtered.map(e => {
          const km = katMeta[e.kategori] || DAGBOK_KATS[3];
          return (
            <div key={e.id} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                <div>
                  <span style={{ fontSize: 12, color: km.color, fontWeight: 700, background: km.color + "22", padding: "2px 8px", borderRadius: 20 }}>{km.label}</span>

function PassordKort({ entry, t, onEdit, onDelete }) {
  const [vis, setVis] = useState(false);
  const [kopiert, setKopiert] = useState(false);

  function kopier() {
    const tekst = entry.passord;
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(tekst).then(() => {
        setKopiert(true);
        setTimeout(() => setKopiert(false), 1500);
      }).catch(() => fallbackKopier(tekst));
    } else {
      fallbackKopier(tekst);
    }
  }

  function fallbackKopier(tekst) {
    const el = document.createElement("textarea");
    el.value = tekst;
    el.style.position = "fixed";
    el.style.opacity = "0";
    document.body.appendChild(el);
    el.focus();
    el.select();
    try {
      document.execCommand("copy");
      setKopiert(true);
      setTimeout(() => setKopiert(false), 1500);
    } catch(_) {}
    document.body.removeChild(el);
  }

  const typeIkon = { passord: "🔑", pin: "🔢", kode: "🔐" };

  return (
    <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0, flex: 1 }}>
          <span style={{ fontSize: 18, flexShrink: 0 }}>{typeIkon[entry.type] || "🔑"}</span>
          <span style={{ fontWeight: 700, fontSize: 15, color: t.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{entry.tjeneste}</span>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0, marginLeft: 8 }}>
          <button onClick={kopier}
            style={{ padding: "6px 10px", borderRadius: 8, border: `1px solid ${t.border}`, background: kopiert ? t.purpleDim : t.bg, color: kopiert ? t.purple : t.textMuted, fontSize: 12, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap" }}>
            {kopiert ? "✓" : "Kopier"}
          </button>
          <button onClick={() => setVis(!vis)}
            style={{ padding: "6px 10px", borderRadius: 8, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontSize: 14, cursor: "pointer" }}>
            {vis ? "🙈" : "👁️"}
          </button>
          <button onClick={onEdit}
            style={{ padding: "6px 8px", borderRadius: 8, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontSize: 13, cursor: "pointer" }}>✏️</button>
          <button onClick={onDelete}
            style={{ padding: "6px 8px", borderRadius: 8, border: `1px solid ${t.border}`, background: t.bg, color: "#ef4444", fontSize: 13, cursor: "pointer" }}>×</button>
        </div>
      </div>
      {entry.brukernavn && <div style={{ fontSize: 13, color: t.textMuted, marginBottom: 4 }}>👤 {entry.brukernavn}</div>}
      <div style={{ fontFamily: "monospace", fontSize: 15, color: vis ? t.purple : t.textFaint, letterSpacing: vis ? 1 : 3, marginBottom: entry.notat ? 6 : 0 }}>
        {vis ? entry.passord : "••••••••"}
      </div>
      {entry.notat && <div style={{ fontSize: 12, color: t.textFaint, fontStyle: "italic" }}>{entry.notat}</div>}
    </div>
  );

function PassKort({ entry, t, onEdit, onDelete }) {
  const p = entry.passdata || {};
  const [blink, setBlink] = useState(false);

  const dagerIgjen = p.utlop ? (() => {
    const utlop = new Date(p.utlop + "T12:00:00");
    return Math.ceil((utlop - new Date()) / (1000 * 60 * 60 * 24));
  })() : null;

  const kritisk = dagerIgjen !== null && dagerIgjen < 180;
  const utgatt = dagerIgjen !== null && dagerIgjen <= 0;

  useEffect(() => {
    if (!kritisk) return;
    const id = setInterval(() => setBlink(b => !b), 800);
    return () => clearInterval(id);
  }, [kritisk]);

  function statusTekst() {
    if (dagerIgjen === null) return null;
    if (utgatt) return "Utgått!";
    if (dagerIgjen < 30) return `Utløper om ${dagerIgjen} dag${dagerIgjen === 1 ? "" : "er"}!`;
    if (dagerIgjen < 180) return `${dagerIgjen} dager igjen — fornye snart`;
    const mnd = Math.floor(dagerIgjen / 30);
    return `Gyldig i ca. ${mnd} måneder til`;
  }

  const statusFarge = utgatt ? "#ef4444" : kritisk ? "#ef4444" : "#22c55e";
  const statusBg = utgatt ? "#ef444422" : kritisk ? "#ef444422" : "#22c55e22";

  return (
    <div style={{ background: t.surface, border: `1px solid ${kritisk && blink ? "#ef4444" : t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10, transition: "border-color 0.3s" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 8, minWidth: 0, flex: 1 }}>
          <span style={{ fontSize: 20, flexShrink: 0 }}>🛂</span>
          <div style={{ minWidth: 0 }}>
            <div style={{ fontWeight: 700, fontSize: 15, color: t.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.navn || entry.tjeneste}</div>
            {p.passnummer && <div style={{ fontSize: 12, color: t.textMuted, fontFamily: "monospace" }}>•••••••••</div>}
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, flexShrink: 0, marginLeft: 8 }}>
          <button onClick={onEdit}
            style={{ padding: "6px 8px", borderRadius: 8, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontSize: 13, cursor: "pointer" }}>✏️</button>
          <button onClick={onDelete}
            style={{ padding: "6px 8px", borderRadius: 8, border: `1px solid ${t.border}`, background: t.bg, color: "#ef4444", fontSize: 13, cursor: "pointer" }}>×</button>
        </div>
      </div>

      {p.utlop && (
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ fontSize: 12, color: t.textMuted }}>
            Utløper: {new Date(p.utlop + "T12:00:00").toLocaleDateString("nb-NO", { day: "numeric", month: "long", year: "numeric" })}
          </div>
          <div style={{ fontSize: 12, fontWeight: 700, color: statusFarge, background: statusBg,
            padding: "3px 10px", borderRadius: 20,
            opacity: kritisk && blink ? 0.4 : 1, transition: "opacity 0.3s" }}>
            {statusTekst()}
          </div>
        </div>
      )}
    </div>
  );
}

function PassordImportModal({ onImport, onClose, t }) {
  const [tekst, setTekst] = useState("");
  const [preview, setPreview] = useState([]);
  const [feil, setFeil] = useState("");
  const [ferdig, setFerdig] = useState(null);

  function parseBlokker(raw) {
    const linjer = raw.split("\n").map(l => l.trimEnd());
    const blokker = [];
    let i = 0;
    while (i < linjer.length) {
      while (i < linjer.length && linjer[i].trim() === "") i++;
      if (i >= linjer.length) break;
      const tjeneste = linjer[i]?.trim() || "";
      const brukernavn = linjer[i+1]?.trim() || "";
      const passord = linjer[i+2]?.trim() || "";
      if (tjeneste && passord) blokker.push({ tjeneste, brukernavn, passord });
      i += 3;
    }
    return blokker;
  }

  function handleTekst(val) {
    setTekst(val); setFeil(""); setFerdig(null);
    if (val.trim()) setPreview(parseBlokker(val).slice(0, 3));
    else setPreview([]);
  }
  function handleFil(e) {
    const fil = e.target.files[0]; if (!fil) return;
    const reader = new FileReader();
    reader.onload = ev => handleTekst(ev.target.result);
    reader.readAsText(fil, "utf-8");
  }
  function handleImporter() {
    const blokker = parseBlokker(tekst);
    if (blokker.length === 0) { setFeil("Ingen gyldige oppføringer funnet. Sjekk at du har tjeneste + passord på linje 1 og 3."); return; }
    const nye = blokker.map((b, i) => ({ id: "pw" + Date.now() + i, tjeneste: b.tjeneste, brukernavn: b.brukernavn, passord: b.passord, type: "passord", kategori: "", notat: "", createdAt: Date.now() + i }));
    onImport(nye); setFerdig(nye.length);
  }

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };
  const parsed = tekst.trim() ? parseBlokker(tekst) : [];

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "24px 20px 44px", maxHeight: "90vh", overflowY: "auto" }}>
        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 6 }}>📥 Importer passord</div>
        <div style={{ fontSize: 13, color: t.textMuted, marginBottom: 8, lineHeight: 1.6 }}>Tre linjer per oppføring, én blank linje mellom:</div>
        <div style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 14px", marginBottom: 20, fontFamily: "monospace", fontSize: 13, color: t.textFaint, lineHeight: 1.9 }}>
          <span style={{ color: t.purple }}>Netflix</span><br />
          <span style={{ color: t.textMuted }}>epost@gmail.com</span><br />
          <span style={{ color: t.pink }}>MinPassord123</span><br /><br />
          <span style={{ color: t.purple }}>Spotify</span><br />
          <span style={{ color: t.textMuted }}>brukernavn</span><br />
          <span style={{ color: t.pink }}>AnnetPassord</span>
        </div>
        <div style={{ marginBottom: 14 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: t.textMuted, display: "block", marginBottom: 6 }}>Last opp fil (.txt)</span>
          <input type="file" accept=".txt,text/plain" onChange={handleFil} style={{ ...inputSt, padding: "8px 12px", cursor: "pointer" }} />
        </div>
        <div style={{ textAlign: "center", color: t.textFaint, fontSize: 13, marginBottom: 14 }}>— eller lim inn direkte —</div>
        <textarea value={tekst} onChange={e => handleTekst(e.target.value)}
          placeholder={"Netflix\nepost@gmail.com\nMinPassord123\n\nSpotify\nbrukernavn\nAnnetPassord"}
          rows={8} style={{ ...inputSt, resize: "none", lineHeight: 1.8, fontFamily: "monospace", fontSize: 13 }} />
        {preview.length > 0 && !ferdig && (
          <div style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "12px 14px", marginTop: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, marginBottom: 10 }}>Forhåndsvisning ({parsed.length} oppføringer totalt):</div>
            {preview.map((b, i) => (
              <div key={i} style={{ borderBottom: i < preview.length - 1 ? `1px solid ${t.border}` : "none", paddingBottom: 10, marginBottom: 10 }}>
                <div style={{ fontWeight: 700, fontSize: 14, color: t.text }}>{b.tjeneste}</div>
                {b.brukernavn && <div style={{ fontSize: 12, color: t.textMuted }}>👤 {b.brukernavn}</div>}
                <div style={{ fontSize: 12, color: t.textFaint, fontFamily: "monospace", letterSpacing: 2 }}>••••••••</div>
              </div>
            ))}
            {parsed.length > 3 && <div style={{ fontSize: 12, color: t.textFaint }}>...og {parsed.length - 3} til</div>}
          </div>
        )}
        {feil && <div style={{ color: "#ef4444", fontSize: 13, marginTop: 10, lineHeight: 1.5 }}>{feil}</div>}
        {ferdig !== null && (
          <div style={{ background: "#22c55e22", border: "1px solid #22c55e", borderRadius: 10, padding: "12px 14px", marginTop: 12, color: "#22c55e", fontWeight: 700, fontSize: 14 }}>
            ✓ {ferdig} passord importert!
          </div>
        )}
        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontWeight: 700, cursor: "pointer" }}>
            {ferdig !== null ? "Lukk" : "Avbryt"}
          </button>
          {ferdig === null && (
            <button onClick={handleImporter} disabled={!tekst.trim()}
              style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: tekst.trim() ? t.purple : t.border, color: "#fff", fontWeight: 700, fontSize: 15, cursor: tekst.trim() ? "pointer" : "default" }}>
              Importer {parsed.length > 0 ? parsed.length + " oppføringer" : ""}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function PassordApp({ t, onBack }) {
  const [oppforinger, setOppforinger] = useState([]);
  const [settings, setSettings] = useState({ kategorier: PASSORD_DEFAULT_KATEGORIER });
  const [showModal, setShowModal] = useState(false);
  const [showBankkort, setShowBankkort] = useState(false);
  const [showPass, setShowPass] = useState(false);
  const [showTypeVelger, setShowTypeVelger] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [search, setSearch] = useState("");
  const [visning, setVisning] = useState("kategorier");

  useEffect(() => {
    setOppforinger(loadPassord());
    setSettings(loadPassordSettings());
  }, []);

  function handleImport(nye) {
    const updated = [...oppforinger, ...nye];
    setOppforinger(updated); savePassord(updated); setShowImport(false);
  }
  function handleSave(entry) {
    const updated = oppforinger.find(e => e.id === entry.id)
      ? oppforinger.map(e => e.id === entry.id ? entry : e)
      : [...oppforinger, entry];
    setOppforinger(updated); savePassord(updated);
    setShowModal(false); setShowBankkort(false); setShowPass(false); setEditEntry(null);
  }
  function handleDelete(id) {
    const updated = oppforinger.filter(e => e.id !== id);
    setOppforinger(updated); savePassord(updated);
  }
  function handleSaveSettings(s) {
    setSettings(s); savePassordSettings(s); setShowSettings(false);
  }
  function openEdit(entry) {
    setEditEntry(entry);
    if (entry.type === "bankkort") setShowBankkort(true);
    else if (entry.type === "pass") setShowPass(true);
    else setShowModal(true);
  }
  function handleTypeVelg(type) {
    setShowTypeVelger(false);
    setEditEntry(null);
    if (type === "bankkort") setShowBankkort(true);
    else if (type === "pass") setShowPass(true);
    else setShowModal(true);
  }

  const filtered = oppforinger.filter(e => !search ||
    e.tjeneste.toLowerCase().includes(search.toLowerCase()) ||
    e.brukernavn?.toLowerCase().includes(search.toLowerCase()));
  const sorted = [...filtered].sort((a, b) => a.tjeneste.localeCompare(b.tjeneste, "nb"));

  const gruppert = (() => {
    const grupper = [];
    settings.kategorier.forEach(k => {
      const items = sorted.filter(e => (e.kategori || "") === k);
      if (items.length > 0) grupper.push({ navn: k, items });
    });
    const ukat = sorted.filter(e => !e.kategori || !settings.kategorier.includes(e.kategori));
    if (ukat.length > 0) grupper.push({ navn: "Ukategorisert", items: ukat });
    return grupper;
  })();

  const tabSt = active => ({
    flex: 1, padding: "9px", borderRadius: 9, border: "none",
    background: active ? t.purple : "transparent",
    color: active ? "#fff" : t.textMuted,
    fontWeight: 700, fontSize: 13, cursor: "pointer"
  });

  function renderEntry(entry) {
    if (entry.type === "bankkort") {
      return <BankkortKort key={entry.id} entry={entry} t={t}
        onEdit={() => openEdit(entry)}
        onDelete={() => { if(window.confirm(`Slett "${entry.tjeneste}"?`)) handleDelete(entry.id); }} />;
    }
    if (entry.type === "pass") {
      return <PassKort key={entry.id} entry={entry} t={t}
        onEdit={() => openEdit(entry)}
        onDelete={() => { if(window.confirm(`Slett passet?`)) handleDelete(entry.id); }} />;
    }
    return <PassordKort key={entry.id} entry={entry} t={t}
      onEdit={() => openEdit(entry)}
      onDelete={() => { if(window.confirm(`Slett "${entry.tjeneste}"?`)) handleDelete(entry.id); }} />;
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 80 }}>
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 18, fontWeight: 800, color: t.purple }}>🔑 Passord og pinkoder</span>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => setShowSettings(true)}
            style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, fontSize: 13, cursor: "pointer" }}>⚙️</button>
          <button onClick={() => setShowImport(true)}
            style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>📥</button>
          <button onClick={() => setShowTypeVelger(true)}
            style={{ background: t.purple, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ny</button>
        </div>
      </div>

      <div style={{ padding: "16px 20px 0" }}>
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "10px 14px", marginBottom: 14, display: "flex", gap: 10, alignItems: "flex-start" }}>
          <span style={{ fontSize: 18 }}>🔒</span>
          <span style={{ fontSize: 13, color: t.textMuted, lineHeight: 1.5 }}>Lagres kun lokalt på denne enheten. Del aldri PIN-koden til LifeHub med andre.</span>
        </div>

function FvSettingsModal({ settings, onSave, onClose, t }) {
  const [grupper, setGrupper] = useState(settings.kategorier.map(g => ({
    ...g, kats: [...(g.kats || [])]
  })));
  const [nyGruppe, setNyGruppe] = useState("");
  const [nyKats, setNyKats] = useState({}); // gruppeIdx -> string
  const [expandert, setExpandert] = useState({});
  const dragGruppeIdx = useRef(null);
  const [draggingGruppe, setDraggingGruppe] = useState(null);

  function toggleExpandert(i) { setExpandert(prev => ({ ...prev, [i]: !prev[i] })); }

  function leggTilGruppe() {
    const v = nyGruppe.trim();
    if (!v) return;
    const ny = grupper.length;
    setGrupper([...grupper, { gruppe: v, kats: [] }]);
    setNyGruppe("");
    setExpandert(prev => ({ ...prev, [ny]: true }));
  }
  function slettGruppe(i) {
    setGrupper(grupper.filter((_, idx) => idx !== i));
  }
  function oppdaterGruppenavn(i, navn) {
    setGrupper(grupper.map((g, idx) => idx === i ? { ...g, gruppe: navn } : g));
  }
  function leggTilKat(i) {
    const v = (nyKats[i] || "").trim();
    if (!v) return;
    setGrupper(grupper.map((g, idx) => idx === i ? { ...g, kats: [...g.kats, v] } : g));
    setNyKats(prev => ({ ...prev, [i]: "" }));
  }
  function slettKat(gi, ki) {
    setGrupper(grupper.map((g, idx) => idx === gi ? { ...g, kats: g.kats.filter((_, kidx) => kidx !== ki) } : g));
  }
  function reorderKats(gi, newKats) {
    setGrupper(grupper.map((g, idx) => idx === gi ? { ...g, kats: newKats } : g));
  }

  // Drag for grupper
  function handleGruppeDragStart(i) { dragGruppeIdx.current = i; setDraggingGruppe(i); }
  function handleGruppeDragOver(e, i) {
    e.preventDefault();
    if (dragGruppeIdx.current === null || dragGruppeIdx.current === i) return;
    const updated = [...grupper];
    const [moved] = updated.splice(dragGruppeIdx.current, 1);
    updated.splice(i, 0, moved);
    dragGruppeIdx.current = i;
    // Keep expand state in sync
    setExpandert(prev => {
      const keys = Object.keys(prev);
      const newPrev = {};
      keys.forEach(k => { newPrev[k] = prev[k]; });
      return newPrev;
    });
    setGrupper(updated);
  }
  function handleGruppeDragEnd() { dragGruppeIdx.current = null; setDraggingGruppe(null); }

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "9px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", flex: 1, boxSizing: "border-box" };

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "24px 20px 44px", maxHeight: "92vh", overflowY: "auto" }}>
        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 4 }}>⚙️ Kategorier</div>
        <div style={{ fontSize: 13, color: t.textFaint, marginBottom: 16 }}>Dra i ⠿ for å endre rekkefølge på grupper og underkategorier.</div>

        {grupper.map((g, i) => (
          <div key={i}
            draggable
            onDragStart={() => handleGruppeDragStart(i)}
            onDragOver={e => handleGruppeDragOver(e, i)}
            onDragEnd={handleGruppeDragEnd}
            style={{ background: draggingGruppe === i ? t.pinkDim : t.bg, border: `1px solid ${draggingGruppe === i ? t.pink : t.border}`, borderRadius: 12, marginBottom: 10, overflow: "hidden", transition: "border-color 0.15s" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "10px 12px" }}>
              <span style={{ color: t.textFaint, fontSize: 16, cursor: "grab", userSelect: "none" }}>⠿</span>
              <input value={g.gruppe} onChange={e => oppdaterGruppenavn(i, e.target.value)}
                style={{ flex: 1, background: "transparent", border: "none", color: t.text, fontSize: 14, fontWeight: 700, outline: "none" }} />
              <span style={{ fontSize: 12, color: t.textFaint, background: t.surface, padding: "2px 8px", borderRadius: 20 }}>{g.kats.length}</span>
              <button onClick={() => toggleExpandert(i)}
                style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 13, padding: "2px 6px" }}>
                {expandert[i] ? "▲" : "▼"}
              </button>
              <button onClick={() => slettGruppe(i)}
                style={{ background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 16, padding: "0 2px" }}>×</button>
            </div>
            {expandert[i] && (
              <div style={{ borderTop: `1px solid ${t.border}`, padding: "10px 12px" }}>
                <DragSortList items={g.kats} onReorder={newKats => reorderKats(i, newKats)}
                  onDelete={ki => slettKat(i, ki)} accentColor={t.pink} t={t} />
                <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
                  <input value={nyKats[i] || ""} onChange={e => setNyKats(prev => ({ ...prev, [i]: e.target.value }))}
                    onKeyDown={e => e.key === "Enter" && leggTilKat(i)}
                    placeholder="Ny underkategori..." style={inputSt} />
                  <button onClick={() => leggTilKat(i)}
                    style={{ padding: "9px 14px", borderRadius: 10, border: "none", background: t.pink, color: "#fff", fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>+</button>
                </div>
              </div>
            )}
          </div>
        ))}

        <div style={{ display: "flex", gap: 8, marginTop: 8, marginBottom: 24 }}>
          <input value={nyGruppe} onChange={e => setNyGruppe(e.target.value)}
            onKeyDown={e => e.key === "Enter" && leggTilGruppe()}
            placeholder="Ny gruppe..." style={inputSt} />
          <button onClick={leggTilGruppe}
            style={{ padding: "9px 14px", borderRadius: 10, border: "none", background: t.purple, color: "#fff", fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>+ Gruppe</button>
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontWeight: 700, cursor: "pointer" }}>Avbryt</button>
          <button onClick={() => onSave({ ...settings, kategorier: grupper })}
            style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: t.pink, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>Lagre</button>
        </div>
      </div>
    </div>
  );
}

  const [hovedTab, setHovedTab] = useState("videoer");

  useEffect(() => {
    setVideoer(loadFavorittvideoer());
    setSettings(loadFvSettings());
  }, []);

  function handleSave(video) {
    const updated = videoer.find(v => v.id === video.id)
      ? videoer.map(v => v.id === video.id ? video : v)
      : [video, ...videoer];
    setVideoer(updated); saveFavorittvideoer(updated);
    setShowModal(false); setEditVideo(null);
  }
  function handleDelete(id) {
    const updated = videoer.filter(v => v.id !== id);
    setVideoer(updated); saveFavorittvideoer(updated);
  }
  function handleSaveSettings(s) {
    setSettings(s); saveFvSettings(s); setShowSettings(false);
  }

  function aapneRandom() {
    const medUrl = videoer.filter(v => v.url);
    if (medUrl.length === 0) return;
    const tilfeldig = medUrl[Math.floor(Math.random() * medUrl.length)];
    window.open(tilfeldig.url, "_blank", "noopener,noreferrer");
  }
  const erFavoritt = v => (v.kategorier || []).includes("Favoritt");
  const scoreSort = ["snitt","helhet","intensitet","tenner","komtil"].includes(sort);

  const filtered = videoer.filter(v => !search ||
    v.beskrivelse.toLowerCase().includes(search.toLowerCase()) ||
    fvDomain(v.url).toLowerCase().includes(search.toLowerCase()));

  const sorted = [...filtered].sort((a, b) => {
    if (scoreSort) {
      const aFav = erFavoritt(a), bFav = erFavoritt(b);
      if (aFav !== bFav) return bFav ? 1 : -1;
    }
    if (sort === "helhet") return b.helhet - a.helhet;
    if (sort === "intensitet") return b.intensitet - a.intensitet;
    if (sort === "tenner") return b.tenner - a.tenner;
    if (sort === "snitt") return snittScore(b) - snittScore(a);
    if (sort === "komtil") return (b.komTil||0) - (a.komTil||0);
    return b.createdAt - a.createdAt;
  });

  // Build grouped view: for each gruppe, for each kat in that gruppe, collect matching videos
  const gruppertVisning = (() => {
    const resultat = [];
    settings.kategorier.forEach(g => {
      const undergrupper = (g.kats || []).map(k => ({
        navn: k,
        videoer: sorted.filter(v => (v.kategorier || []).includes(k))
      })).filter(ug => ug.videoer.length > 0);
      if (undergrupper.length > 0) resultat.push({ gruppenavn: g.gruppe, undergrupper });
    });
    // Ukategorisert
    const alleKats = fvAlleKats(settings.kategorier);
    const ukat = sorted.filter(v => !v.kategorier || v.kategorier.length === 0 ||
      !v.kategorier.some(k => alleKats.includes(k)));
    if (ukat.length > 0) resultat.push({
      gruppenavn: "Ukategorisert",
      undergrupper: [{ navn: "Ukategorisert", videoer: ukat }]
    });
    return resultat;
  })();

  const tabSt = active => ({
    flex: 1, padding: "9px", borderRadius: 9, border: "none",
    background: active ? t.pink : "transparent",
    color: active ? "#fff" : t.textMuted,
    fontWeight: 700, fontSize: 13, cursor: "pointer"
  });

  const sortKnapp = (k, lbl) => (
    <button key={k} onClick={() => setSort(k)}
      style={{ padding: "7px 12px", borderRadius: 20, border: `1px solid ${sort === k ? t.pink : t.border}`,
        background: sort === k ? t.pinkDim : "transparent", color: sort === k ? t.pink : t.textMuted,
        fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
      {lbl}
    </button>
  );

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 80 }}>
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 17, fontWeight: 800, color: t.pink }}>🎬 Videoer</span>
        {hovedTab === "videoer" ? (
          <div style={{ display: "flex", gap: 8 }}>
            <button onClick={aapneRandom} title="Åpne tilfeldig video"
              style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, fontSize: 16, cursor: "pointer" }}>🎲</button>
            <button onClick={() => setShowSettings(true)}
              style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, fontSize: 13, cursor: "pointer" }}>⚙️</button>
            <button onClick={() => { setEditVideo(null); setShowModal(true); }}
              style={{ background: t.pink, border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ny</button>
          </div>
        ) : <div style={{ width: 70 }} />}
      </div>

      {/* Hoved-tabs: Videoer / Tutorials */}
      <div style={{ padding: "12px 20px 0" }}>
        <div style={{ display: "flex", background: t.surface, borderRadius: 12, padding: 4, marginBottom: 16 }}>
          <button onClick={() => setHovedTab("videoer")}
            style={{ flex: 1, padding: "10px", borderRadius: 9, border: "none",
              background: hovedTab === "videoer" ? t.pink : "transparent",
              color: hovedTab === "videoer" ? "#fff" : t.textMuted,
              fontWeight: 700, fontSize: 14, cursor: "pointer" }}>🎬 Videoer</button>
          <button onClick={() => setHovedTab("tutorials")}
            style={{ flex: 1, padding: "10px", borderRadius: 9, border: "none",
              background: hovedTab === "tutorials" ? t.blue : "transparent",
              color: hovedTab === "tutorials" ? "#fff" : t.textMuted,
              fontWeight: 700, fontSize: 14, cursor: "pointer" }}>🎓 Tutorials</button>
        </div>
      </div>

      {hovedTab === "tutorials" && (
        <div style={{ padding: "0 20px" }}>
          <TutorialsTab t={t} />
        </div>
      )}

      {hovedTab === "videoer" && (
      <div style={{ padding: "0 20px" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Søk i beskrivelser..."
          style={{ width: "100%", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 14px", color: t.text, fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 12 }} />

        <div style={{ display: "flex", background: t.surface, borderRadius: 12, padding: 4, marginBottom: 12 }}>
          <button style={tabSt(visning === "kategorier")} onClick={() => setVisning("kategorier")}>🗂 Kategorier</button>
          <button style={tabSt(visning === "liste")} onClick={() => setVisning("liste")}>📋 Liste</button>
        </div>

        <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 4, marginBottom: 14 }}>
          {sortKnapp("dato", "🕐 Nyeste")}
          {sortKnapp("snitt", "📊 Snitt")}
          {sortKnapp("helhet", "⭐ Helhet")}
          {sortKnapp("intensitet", "🔥 Intensitet")}
          {sortKnapp("tenner", "💜 Tenner")}
          {sortKnapp("komtil", "💦 Kom til")}
        </div>

        {videoer.length === 0 && (
          <div style={{ textAlign: "center", color: t.textMuted, padding: 40 }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🎬</div>
            <div>Ingen videoer lagt til ennå.</div>
          </div>
        )}

        {visning === "liste" && (() => {
          const favs = sorted.filter(v => erFavoritt(v));
          const resten = sorted.filter(v => !erFavoritt(v));
          return (
            <div>
              {favs.length > 0 && (
                <div style={{ marginBottom: 16 }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: "#f59e0b", marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>
                    <span>★ Favoritter</span>
                    <span style={{ fontSize: 11, color: t.textFaint, background: t.surface, padding: "1px 8px", borderRadius: 20, fontWeight: 400 }}>{favs.length}</span>
                  </div>
                  {favs.map(v => (
                    <FvKort key={v.id} video={v} t={t}
                      onEdit={() => { setEditVideo(v); setShowModal(true); }}
                      onDelete={() => { if(window.confirm("Slett denne videoen?")) handleDelete(v.id); }} />
                  ))}
                  {resten.length > 0 && <div style={{ borderTop: `1px solid ${t.border}`, margin: "4px 0 14px" }} />}
                </div>
              )}
              {resten.map(v => (
                <FvKort key={v.id} video={v} t={t}
                  onEdit={() => { setEditVideo(v); setShowModal(true); }}
                  onDelete={() => { if(window.confirm("Slett denne videoen?")) handleDelete(v.id); }} />
              ))}
            </div>
          );
        })()}

        {visning === "kategorier" && gruppertVisning.map(g => (
          <FvKategoriGruppe key={g.gruppenavn} gruppenavn={g.gruppenavn} undergrupper={g.undergrupper} t={t}
            onEdit={v => { setEditVideo(v); setShowModal(true); }}
            onDelete={id => { if(window.confirm("Slett denne videoen?")) handleDelete(id); }} />
        ))}
      </div>

      )}

      {showModal && (
        <FvModal entry={editVideo} onSave={handleSave} onClose={() => { setShowModal(false); setEditVideo(null); }} t={t} kategorier={settings.kategorier} />
      )}
      {showSettings && (
        <FvSettingsModal settings={settings} onSave={handleSaveSettings} onClose={() => setShowSettings(false)} t={t} />
      )}
    </div>
  );
}

// Storage: hemmelig:tutorials, hemmelig:tutorials:settings

function loadTutorials() {
  try { const r = localStorage.getItem("hemmelig:tutorials"); return r ? JSON.parse(r) : []; } catch(_) { return []; }
}
function saveTutorials(data) {
  try { localStorage.setItem("hemmelig:tutorials", JSON.stringify(data)); } catch(_) {}
}

const TUT_DEFAULT_KATEGORIER = ["Teknikk", "Helse & sikkerhet", "Kommunikasjon", "BDSM / Fetish", "Annet"];

function loadTutSettings() {
  try { const r = localStorage.getItem("hemmelig:tutorials:settings"); return r ? JSON.parse(r) : { kategorier: TUT_DEFAULT_KATEGORIER }; } catch(_) { return { kategorier: TUT_DEFAULT_KATEGORIER }; }
}
function saveTutSettings(data) {
  try { localStorage.setItem("hemmelig:tutorials:settings", JSON.stringify(data)); } catch(_) {}
}

function TutModal({ entry, onSave, onClose, t, kategorier }) {
  const [url, setUrl] = useState(entry ? entry.url : "");
  const [beskrivelse, setBeskrivelse] = useState(entry ? entry.beskrivelse : "");
  const [valgtKats, setValgtKats] = useState(entry ? (entry.kategorier || []) : []);

  function toggleKat(k) {
    setValgtKats(prev => prev.includes(k) ? prev.filter(x => x !== k) : [...prev, k]);
  }

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };
  const lblSt = { fontSize: 13, fontWeight: 700, color: t.textMuted, display: "block", marginBottom: 6, textTransform: "uppercase", letterSpacing: 0.5 };

  function handleSave() {
    if (!beskrivelse.trim()) return;
    onSave({ id: entry ? entry.id : "tut" + Date.now(), url: url.trim(), beskrivelse: beskrivelse.trim(), kategorier: valgtKats, createdAt: entry ? entry.createdAt : Date.now() });
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "24px 20px 44px", maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 20 }}>{entry ? "Rediger tutorial" : "Ny tutorial"}</div>

        <div style={{ marginBottom: 14 }}>
          <span style={lblSt}>Beskrivelse *</span>
          <textarea value={beskrivelse} onChange={e => setBeskrivelse(e.target.value)}
            placeholder="Hva handler denne tutorialen om?" rows={3}
            style={{ ...inputSt, resize: "none", lineHeight: 1.5 }} />
        </div>

        <div style={{ marginBottom: 16 }}>
          <span style={lblSt}>URL (valgfritt)</span>
          <input value={url} onChange={e => setUrl(e.target.value)} placeholder="https://..." style={inputSt} />
          {url && <div style={{ fontSize: 12, color: t.purple, marginTop: 4 }}>🔗 {fvDomain(url)}</div>}
        </div>

        <div style={{ marginBottom: 24 }}>
          <span style={lblSt}>Kategorier</span>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {kategorier.map(k => (
              <button key={k} onClick={() => toggleKat(k)}
                style={{ padding: "8px 14px", borderRadius: 20,
                  border: `2px solid ${valgtKats.includes(k) ? t.blue : t.border}`,
                  background: valgtKats.includes(k) ? t.blue + "22" : t.bg,
                  color: valgtKats.includes(k) ? t.blue : t.textMuted,
                  fontWeight: 600, fontSize: 13, cursor: "pointer" }}>
                {k}
              </button>
            ))}
          </div>
        </div>

        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontWeight: 700, cursor: "pointer" }}>Avbryt</button>
          <button onClick={handleSave} disabled={!beskrivelse.trim()}
            style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: beskrivelse.trim() ? t.blue : t.border, color: "#fff", fontWeight: 700, fontSize: 15, cursor: beskrivelse.trim() ? "pointer" : "default" }}>Lagre</button>
        </div>
      </div>
    </div>
  );
}

function TutKort({ item, t, onEdit, onDelete }) {

      <div style={{ fontSize: 14, fontWeight: 700, color: t.text, lineHeight: 1.5, marginBottom: 8 }}>{item.beskrivelse}</div>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: item.url ? 10 : 0 }}>
        {(item.kategorier || []).map(k => (
          <span key={k} style={{ fontSize: 11, color: t.blue, background: t.blue + "18", padding: "2px 8px", borderRadius: 20 }}>{k}</span>
        ))}
      </div>
      {item.url && <div style={{ fontSize: 12, color: t.textFaint, marginBottom: 10 }}>🔗 {fvDomain(item.url)}</div>}
      <div style={{ display: "flex", gap: 8 }}>
        {item.url && (
          <button onClick={aapne}
            style={{ flex: 1, padding: "10px", borderRadius: 10, border: "none", background: t.blue, color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
            ▶ Åpne
          </button>
        )}
        <button onClick={onEdit}
          style={{ padding: "10px 12px", borderRadius: 10, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, cursor: "pointer" }}>✏️</button>
        <button onClick={onDelete}
          style={{ padding: "10px 12px", borderRadius: 10, border: `1px solid ${t.border}`, background: t.bg, color: "#ef4444", cursor: "pointer" }}>×</button>
      </div>
    </div>
  );
}

function TutKategoriGruppe({ navn, items, t, onEdit, onDelete }) {

  return (
    <div style={{ marginBottom: 12 }}>
      <button onClick={() => setOpen(!open)}

}

        </div>
        <div style={{ display: "flex", gap: 10 }}>

          <button onClick={() => onSave({ ...settings, kategorier })} style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: t.blue, color: "#fff", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>Lagre</button>
        </div>
      </div>
    </div>
  );
}

function TutorialsTab({ t }) {
  const [items, setItems] = useState([]);
  const [settings, setSettings] = useState({ kategorier: TUT_DEFAULT_KATEGORIER });
  const [showModal, setShowModal] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [search, setSearch] = useState("");
  const [visning, setVisning] = useState("kategorier");

  useEffect(() => {
    setItems(loadTutorials());
    setSettings(loadTutSettings());
  }, []);

  function handleSave(item) {
    const updated = items.find(x => x.id === item.id)
      ? items.map(x => x.id === item.id ? item : x)
      : [item, ...items];
    setItems(updated); saveTutorials(updated);
    setShowModal(false); setEditItem(null);
  }
  function handleDelete(id) {
    const updated = items.filter(x => x.id !== id);
    setItems(updated); saveTutorials(updated);
  }

  const filtered = items.filter(x => !search ||
    x.beskrivelse.toLowerCase().includes(search.toLowerCase()));
  const sorted = [...filtered].sort((a, b) => b.createdAt - a.createdAt);

  const gruppert = (() => {
    const grupper = [];
    settings.kategorier.forEach(k => {
      const its = sorted.filter(x => (x.kategorier || []).includes(k));
      if (its.length > 0) grupper.push({ navn: k, items: its });
    });
    const ukat = sorted.filter(x => !x.kategorier || x.kategorier.length === 0 ||
      !x.kategorier.some(k => settings.kategorier.includes(k)));
    if (ukat.length > 0) grupper.push({ navn: "Ukategorisert", items: ukat });
    return grupper;
  })();

  const tabSt = active => ({
    flex: 1, padding: "9px", borderRadius: 9, border: "none",
    background: active ? t.blue : "transparent",
    color: active ? "#fff" : t.textMuted,
    fontWeight: 700, fontSize: 13, cursor: "pointer"
  });

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍 Søk..."
          style={{ flex: 1, background: t.surface, border: `1px solid ${t.border}`, borderRadius: 10, padding: "9px 14px", color: t.text, fontSize: 14, outline: "none", marginRight: 10 }} />
        <button onClick={() => setShowSettings(true)}
          style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "9px 12px", color: t.textMuted, fontSize: 13, cursor: "pointer", marginRight: 8 }}>⚙️</button>
        <button onClick={() => { setEditItem(null); setShowModal(true); }}
          style={{ background: t.blue, border: "none", borderRadius: 10, padding: "9px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>+ Ny</button>
      </div>

      <div style={{ display: "flex", background: t.surface, borderRadius: 12, padding: 4, marginBottom: 14 }}>
        <button style={tabSt(visning === "kategorier")} onClick={() => setVisning("kategorier")}>🗂 Kategorier</button>
        <button style={tabSt(visning === "liste")} onClick={() => setVisning("liste")}>📋 Liste</button>
      </div>

      {items.length === 0 && (
        <div style={{ textAlign: "center", color: t.textMuted, padding: 40 }}>
          <div style={{ fontSize: 40, marginBottom: 12 }}>🎓</div>
          <div>Ingen tutorials lagt til ennå.</div>
        </div>
      )}

      {visning === "liste" && sorted.map(item => (
        <TutKort key={item.id} item={item} t={t}
          onEdit={() => { setEditItem(item); setShowModal(true); }}

    try {
      const ts = sessionStorage.getItem("hemmelig:unlocked");
      if (!ts) return false;
      return (Date.now() - parseInt(ts, 10)) < PIN_TIMEOUT_MS;
    } catch(_) { return false; }

    try { sessionStorage.setItem("hemmelig:unlocked", String(Date.now())); } catch(_) {}

    titleClickRef.current += 1;
    if (titleClickTimerRef.current) clearTimeout(titleClickTimerRef.current);

      titleClickRef.current = 0;
      clearTimeout(titleClickTimerRef.current);

        return;

      setShowPinModal(true);

function useBursdagStatus() {
  const now = new Date();
  const m = now.getMonth() + 1; // 1-indexed
  const d = now.getDate();
  const isBursdag = m === 12 && d === 17;
  const isTest    = m === 7  && d === 19;
  return { isBursdag, isTest };
}

function ConfettiCanvas({ emojis }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    const pieces = Array.from({ length: 60 }, () => ({
      x:    Math.random() * canvas.width,
      y:    Math.random() * -canvas.height,
      vy:   1.5 + Math.random() * 2.5,
      vx:   (Math.random() - 0.5) * 1.5,
      rot:  Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.08,
      emoji: emojis[Math.floor(Math.random() * emojis.length)],
      size: 18 + Math.floor(Math.random() * 16),
    }));

    let raf;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.font = `${p.size}px serif`;
        ctx.fillText(p.emoji, -p.size / 2, p.size / 2);
        ctx.restore();
        p.x   += p.vx;
        p.y   += p.vy;
        p.rot += p.vrot;
        if (p.y > canvas.height + 40) {
          p.y = -40;
          p.x = Math.random() * canvas.width;
        }
      });
      raf = requestAnimationFrame(draw);
    }
    draw();
    return () => cancelAnimationFrame(raf);
  }, []);

  return (
    <canvas ref={canvasRef} style={{
      position: "fixed", inset: 0, zIndex: 9998,
      pointerEvents: "none", width: "100%", height: "100%"
    }} />
  );
}
