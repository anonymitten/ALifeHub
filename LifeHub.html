function OlSettingsModal({ kategorier, t, onSave, onClose }) {
  const [kats, setKats] = useState(kategorier.map(k => ({ ...k })));
  const [newNavn, setNewNavn] = useState("");
  const dragIdx = useRef(null);

  function addKat() {
    if (!newNavn.trim()) return;
    const ny = { id: "kat" + Date.now(), navn: newNavn.trim(), rekkefolgje: kats.length };
    setKats([...kats, ny]);
    setNewNavn("");
  }
  function removeKat(id) {
    if (!confirm("Slette kategorien? Ønsker i den mister kategoritilhørigheten.")) return;
    setKats(kats.filter(k => k.id !== id));
  }
  function renameKat(id, navn) {
    setKats(kats.map(k => k.id === id ? { ...k, navn } : k));
  }
  function handleDragStart(idx) { dragIdx.current = idx; }
  function handleDragOver(idx) {
    if (dragIdx.current === null || dragIdx.current === idx) return;
    const updated = [...kats];
    const [moved] = updated.splice(dragIdx.current, 1);
    updated.splice(idx, 0, moved);
    dragIdx.current = idx;
    setKats(updated.map((k, i) => ({ ...k, rekkefolgje: i })));
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,0.82)", zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
      onClick={e => { if (e.target === e.currentTarget) onClose(); }}>
      <div style={{ background: t.surface, borderRadius: "24px 24px 0 0", padding: "28px 24px 40px", width: "100%", maxWidth: 540, maxHeight: "85vh", overflowY: "auto" }}>
        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 20 }}>Kategorier</div>

        {kats.map((k, idx) => (
          <div key={k.id}
            draggable
            onDragStart={() => handleDragStart(idx)}
            onDragOver={e => { e.preventDefault(); handleDragOver(idx); }}
            style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10, background: t.surface2, borderRadius: 12, padding: "10px 14px", border: `1px solid ${t.border}` }}>
            <span style={{ color: t.textFaint, fontSize: 18, cursor: "grab" }}>⠿</span>
            <input value={k.navn} onChange={e => renameKat(k.id, e.target.value)}
              style={{ flex: 1, background: "transparent", border: "none", color: t.text, fontSize: 14, fontWeight: 600 }} />
            <button onClick={() => removeKat(k.id)}
              style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 16 }}>🗑️</button>
          </div>
        ))}

        <div style={{ display: "flex", gap: 10, marginTop: 16, marginBottom: 24 }}>
          <input value={newNavn} onChange={e => setNewNavn(e.target.value)}
            onKeyDown={e => { if (e.key === "Enter") addKat(); }}
            placeholder="Ny kategori..."
            style={{ flex: 1, background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "11px 14px", color: t.text, fontSize: 14 }} />
          <button onClick={addKat}
            style={{ background: "#f97316", border: "none", borderRadius: 10, padding: "11px 18px", color: "#fff", fontWeight: 700, cursor: "pointer" }}>
            + Legg til
          </button>
        </div>

        <div style={{ display: "flex", gap: 12 }}>
          <button onClick={() => onSave(kats.map((k, i) => ({ ...k, rekkefolgje: i })))}
            style={{ flex: 1, background: "#f97316", border: "none", borderRadius: 12, padding: "14px", color: "#fff", fontWeight: 800, fontSize: 16, cursor: "pointer" }}>
            Lagre kategorier
          </button>
          <button onClick={onClose}
            style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 12, padding: "14px 18px", color: t.textMuted, fontWeight: 700, cursor: "pointer" }}>
            Avbryt
          </button>
        </div>
      </div>
    </div>
  );
}

function GaverOnskelisteApp({ t, onBack }) {
  const accent = "#f97316";
  const [kategorier, setKategorier] = useState([]);
  const [items, setItems] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [showModal, setShowModal] = useState(false);
  const [editItem, setEditItem] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [visKjopt, setVisKjopt] = useState(false);
  const dragItemId = useRef(null);
  const dragOverItemId = useRef(null);

  useEffect(() => {
    setKategorier(olLoadKat().sort((a, b) => a.rekkefolgje - b.rekkefolgje));
    setItems(olLoadItems());
    setLoaded(true);
  }, []);

  function saveKat(data) { setKategorier(data); olSaveKat(data); }
  function saveItems(data) { setItems(data); olSaveItems(data); }

  function handleSaveItem(form) {
    const existing = items.find(i => i.id === form.id);
    if (existing) {
      saveItems(items.map(i => i.id === form.id ? { ...form } : i));
    } else {
      const maxRek = items.filter(i => i.kategoriId === form.kategoriId).reduce((m, i) => Math.max(m, i.rekkefolgje ?? 0), -1);
      saveItems([...items, { ...form, rekkefolgje: maxRek + 1 }]);
    }
    setShowModal(false);
    setEditItem(null);
  }

  function handleDelete(id) {
    saveItems(items.filter(i => i.id !== id));
    setShowModal(false);
    setEditItem(null);
  }

  function handleToggleKjopt(id) {
    saveItems(items.map(i => i.id === id ? { ...i, kjopt: !i.kjopt } : i));
  }

  function handleDragStart(id) { dragItemId.current = id; }
  function handleDragOver(id) { dragOverItemId.current = id; }
  function handleDrop(kategoriId) {
    if (!dragItemId.current || dragItemId.current === dragOverItemId.current) return;
    const updated = [...items];
    const fromIdx = updated.findIndex(i => i.id === dragItemId.current);
    const toIdx = updated.findIndex(i => i.id === dragOverItemId.current);
    if (fromIdx < 0 || toIdx < 0) { dragItemId.current = null; dragOverItemId.current = null; return; }
    const [moved] = updated.splice(fromIdx, 1);
    moved.kategoriId = kategoriId;
    updated.splice(toIdx, 0, moved);
    saveItems(updated.map((item, gi) => ({ ...item, rekkefolgje: gi })));
    dragItemId.current = null;
    dragOverItemId.current = null;
  }

  function handleExport() {
    const sorted = [...kategorier].sort((a, b) => a.rekkefolgje - b.rekkefolgje);
    const utenKatItems = items.filter(i => !i.kjopt && (!i.kategoriId || !kategorier.find(k => k.id === i.kategoriId)));
    let txt = "🎁 Ønskeliste\n" + "=".repeat(30) + "\n\n";
    for (const kat of sorted) {
      const katItems = items.filter(i => i.kategoriId === kat.id && !i.kjopt)
        .sort((a, b) => (a.rekkefolgje ?? 0) - (b.rekkefolgje ?? 0));
      if (katItems.length === 0) continue;
      txt += `📂 ${kat.navn}\n` + "-".repeat(20) + "\n";
      for (const item of katItems) {
        txt += `• ${item.tittel}`;
        if (item.nettsted) txt += ` (${item.nettsted})`;
        if (item.url) txt += `\n  🔗 ${item.url}`;
        if (item.kommentar) txt += `\n  💬 ${item.kommentar}`;
        txt += "\n";
      }
      txt += "\n";
    }
    if (utenKatItems.length > 0) {
      txt += "📂 Diverse\n" + "-".repeat(20) + "\n";
      for (const item of utenKatItems) {
        txt += `• ${item.tittel}`;
        if (item.nettsted) txt += ` (${item.nettsted})`;
        if (item.url) txt += `\n  🔗 ${item.url}`;
        if (item.kommentar) txt += `\n  💬 ${item.kommentar}`;
        txt += "\n";
      }
    }
    const blob = new Blob([txt], { type: "text/plain;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `onskeliste-${new Date().getFullYear()}.txt`;
    a.click();
    URL.revokeObjectURL(url);
  }

  function handleNullstillKjopt() {
    if (!confirm("Flytte alle kjøpte ønsker tilbake til aktive (nytt år)?")) return;
    saveItems(items.map(i => ({ ...i, kjopt: false })));
  }

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;

  const sorted = [...kategorier].sort((a, b) => a.rekkefolgje - b.rekkefolgje);
  const totalAktive = items.filter(i => !i.kjopt).length;
  const totalKjopt = items.filter(i => i.kjopt).length;

  return (
    <div style={{ minHeight: "100vh", background: t.bg, display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ padding: "20px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack}
          style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>
          ← Tilbake
        </button>
        <span style={{ fontSize: 20, fontWeight: 800, color: accent }}>🎁 Ønskeliste</span>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={handleExport} title="Eksporter som tekstfil"
            style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, cursor: "pointer", fontSize: 16 }}>
            📄
          </button>
          <button onClick={() => setShowSettings(true)} title="Kategorier"
            style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, cursor: "pointer", fontSize: 16 }}>
            ⚙️
          </button>
        </div>
      </div>

      {/* Stats-rad */}
      <div style={{ padding: "14px 20px 0", display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
        <span style={{ fontSize: 13, color: t.textMuted }}>{totalAktive} aktive ønsker</span>
        {totalKjopt > 0 && (
          <button onClick={() => setVisKjopt(v => !v)}
            style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 13, color: t.green, fontWeight: 600, padding: 0 }}>
            {visKjopt ? "Skjul kjøpte" : `+ ${totalKjopt} kjøpt`}
          </button>
        )}
        {totalKjopt > 0 && (
          <button onClick={handleNullstillKjopt}
            style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 13, color: t.textFaint, fontWeight: 600, padding: 0 }}>
            🔄 Nullstill kjøpte
          </button>
        )}
        <div style={{ flex: 1 }} />
        <button onClick={() => { setEditItem(olBlankItem("")); setShowModal(true); }}
          style={{ background: accent, border: "none", borderRadius: 12, padding: "10px 18px", color: "#fff", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
          + Nytt ønske
        </button>
      </div>

      {/* Kategorier og items */}
      <div style={{ padding: "20px 20px 100px" }}>
        {sorted.map(kat => {
          const katItems = items
            .filter(i => i.kategoriId === kat.id && (visKjopt || !i.kjopt))
            .sort((a, b) => (a.rekkefolgje ?? 0) - (b.rekkefolgje ?? 0));
          return (
            <div key={kat.id} style={{ marginBottom: 28 }}
              onDragOver={e => e.preventDefault()}
              onDrop={() => { if (dragItemId.current && !dragOverItemId.current) handleDrop(kat.id); }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
                <div style={{ fontSize: 13, fontWeight: 800, color: accent, textTransform: "uppercase", letterSpacing: 1 }}>
                  {kat.navn}
                  <span style={{ fontWeight: 400, color: t.textFaint, marginLeft: 6 }}>
                    ({items.filter(i => i.kategoriId === kat.id && !i.kjopt).length})
                  </span>
                </div>
                <button onClick={() => { setEditItem(olBlankItem(kat.id)); setShowModal(true); }}
                  style={{ background: "transparent", border: "none", color: t.textFaint, cursor: "pointer", fontSize: 14, fontWeight: 600 }}>
                  + Legg til
                </button>
              </div>
              {katItems.length === 0 ? (
                <div style={{ fontSize: 13, color: t.textFaint, padding: "12px 0", textAlign: "center", border: `1px dashed ${t.border}`, borderRadius: 12 }}>
                  Ingen ønsker her ennå
                </div>
              ) : (
                katItems.map(item => (
                  <OlItemRow key={item.id} item={item} t={t}
                    onEdit={i => { setEditItem({ ...i }); setShowModal(true); }}
                    onToggleKjopt={handleToggleKjopt}
                    onDragStart={() => handleDragStart(item.id)}
                    onDragOver={() => handleDragOver(item.id)}
                    onDrop={() => handleDrop(kat.id)}
                  />
                ))
              )}
            </div>
          );
        })}

        {/* Ukategoriserte */}
        {(() => {
          const ukat = items.filter(i => (!i.kategoriId || !kategorier.find(k => k.id === i.kategoriId)) && (visKjopt || !i.kjopt))
            .sort((a, b) => (a.rekkefolgje ?? 0) - (b.rekkefolgje ?? 0));
          if (ukat.length === 0) return null;
          return (
            <div style={{ marginBottom: 28 }}>
              <div style={{ fontSize: 13, fontWeight: 800, color: t.textMuted, textTransform: "uppercase", letterSpacing: 1, marginBottom: 10 }}>
                Uten kategori <span style={{ fontWeight: 400, color: t.textFaint }}>({ukat.filter(i => !i.kjopt).length})</span>
              </div>
              {ukat.map(item => (
                <OlItemRow key={item.id} item={item} t={t}
                  onEdit={i => { setEditItem({ ...i }); setShowModal(true); }}
                  onToggleKjopt={handleToggleKjopt}
                  onDragStart={() => handleDragStart(item.id)}
                  onDragOver={() => handleDragOver(item.id)}
                  onDrop={() => handleDrop("")}
                />
              ))}
            </div>
          );
        })()}

        {items.length === 0 && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: t.textMuted }}>
            <div style={{ fontSize: 48, marginBottom: 12 }}>🎁</div>
            <div style={{ fontSize: 16, fontWeight: 700, marginBottom: 6 }}>Ønskelisten er tom</div>
            <div style={{ fontSize: 13, color: t.textFaint }}>Trykk «+ Nytt ønske» for å legge til</div>
          </div>
        )}
      </div>

      {showModal && editItem && (
        <OlItemModal
          item={editItem}
          kategorier={kategorier}
          t={t}
          onSave={handleSaveItem}
          onDelete={handleDelete}
          onClose={() => { setShowModal(false); setEditItem(null); }}
        />
      )}
      {showSettings && (
        <OlSettingsModal
          kategorier={kategorier}
          t={t}
          onSave={kats => { saveKat(kats); setShowSettings(false); }}
          onClose={() => setShowSettings(false)}
        />
      )}
    </div>
  );
}

// ── Mål & drømmer app (inspotavle) ─────────────────────────────────────────────
// Storage: drommer:kategorier [{ id, name, color }]
//          drommer:lapper     [{ id, catId, title, desc, done, doneDate, order }]

const DROMMER_DEFAULT_KATEGORIER = [
  { id: "reiser",    name: "Reiser",    color: "blå" },
  { id: "personlig", name: "Personlig", color: "grønn" },
  { id: "kreativt",  name: "Kreativt",  color: "lilla" },
];

function DrommerApp({ t, onBack }) {
  const isDark = t.bg === "#0d1117";
  const [loaded, setLoaded] = useState(false);
  const [kategorier, setKategorier] = useState(DROMMER_DEFAULT_KATEGORIER);
  const [lapper, setLapper] = useState([]);
  const [activeTab, setActiveTab] = useState(null); // catId or "oppnadd"
  const [showCatModal, setShowCatModal] = useState(false);
  const [editLapp, setEditLapp] = useState(null); // {catId, id?, title, desc}
  const [newCatName, setNewCatName] = useState("");
  const [newCatColor, setNewCatColor] = useState("blå");

  const colorKeys = ["rød", "gul", "grønn", "blå", "lilla", "standard"];

  useEffect(() => {
    try {
      const k = localStorage.getItem("drommer:kategorier");
      const l = localStorage.getItem("drommer:lapper");
      if (k) setKategorier(JSON.parse(k));
      if (l) setLapper(JSON.parse(l));
    } catch(_) {}
    setLoaded(true);
  }, []);

  useEffect(() => {
    if (loaded && activeTab === null && kategorier.length > 0) setActiveTab(kategorier[0].id);
  }, [loaded, kategorier, activeTab]);

  function saveKategorier(v) { setKategorier(v); try { localStorage.setItem("drommer:kategorier", JSON.stringify(v)); } catch(_){} }
  function saveLapper(v) { setLapper(v); try { localStorage.setItem("drommer:lapper", JSON.stringify(v)); } catch(_){} }

  function addCat() {
    if (!newCatName.trim()) return;
    const nc = { id: "d" + Date.now(), name: newCatName.trim(), color: newCatColor };
    saveKategorier([...kategorier, nc]);
    setNewCatName(""); setNewCatColor("blå");
    setActiveTab(nc.id);
    setShowCatModal(false);
  }
  function removeCat(id) {
    const count = lapper.filter(l => l.catId === id && !l.done).length;
    if (count > 0 && !confirm(`Denne kategorien har ${count} aktive lapper. Slette likevel? (Lappene slettes også)`)) return;
    if (count === 0 && !confirm("Slette denne kategorien?")) return;
    saveKategorier(kategorier.filter(k => k.id !== id));
    saveLapper(lapper.filter(l => l.catId !== id));
    if (activeTab === id) setActiveTab(kategorier.find(k => k.id !== id)?.id || "oppnadd");
  }
  function updateCat(id, patch) {
    saveKategorier(kategorier.map(k => k.id === id ? { ...k, ...patch } : k));
  }

  function saveLappEdit() {
    if (!editLapp || !editLapp.title.trim()) return;
    if (editLapp.id) {
      saveLapper(lapper.map(l => l.id === editLapp.id ? { ...l, title: editLapp.title.trim(), desc: editLapp.desc.trim() } : l));
    } else {
      const maxOrder = Math.max(0, ...lapper.filter(l => l.catId === editLapp.catId).map(l => l.order || 0));
      saveLapper([...lapper, { id: "l" + Date.now(), catId: editLapp.catId, title: editLapp.title.trim(), desc: editLapp.desc.trim(), done: false, order: maxOrder + 1 }]);
    }
    setEditLapp(null);
  }
  function toggleDone(id) {
    saveLapper(lapper.map(l => l.id === id ? { ...l, done: !l.done, doneDate: !l.done ? todayKey() : null } : l));
  }
  function removeLapp(id) {
    saveLapper(lapper.filter(l => l.id !== id));
  }
  function moveLapp(id, dir) {
    const lapp = lapper.find(l => l.id === id);
    if (!lapp) return;
    const siblings = lapper.filter(l => l.catId === lapp.catId && !l.done).sort((a,b) => (a.order||0)-(b.order||0));
    const idx = siblings.findIndex(l => l.id === id);
    const swap = idx + dir;
    if (swap < 0 || swap >= siblings.length) return;
    const a = siblings[idx], b = siblings[swap];
    const ao = a.order, bo = b.order;
    saveLapper(lapper.map(l => l.id === a.id ? { ...l, order: bo } : l.id === b.id ? { ...l, order: ao } : l));
  }

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 12, padding: "12px 14px", color: t.text, fontSize: 15, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;

  const doneCount = lapper.filter(l => l.done).length;
  const isOppnadd = activeTab === "oppnadd";
  const activeCat = kategorier.find(k => k.id === activeTab);
  const catLapper = activeCat
    ? lapper.filter(l => l.catId === activeTab && !l.done).sort((a,b) => (a.order||0)-(b.order||0))
    : [];
  const doneLapper = lapper.filter(l => l.done).sort((a,b) => (b.doneDate||"").localeCompare(a.doneDate||""));

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      {/* Header */}
      <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.text }}>🌟 Mål & drømmer</span>
        <button onClick={() => setShowCatModal(true)} style={{ background: "transparent", border: "none", cursor: "pointer", fontSize: 20, color: t.textMuted }}>⚙️</button>
      </div>

      {/* Category tabs */}
      <div style={{ padding: "0 20px 16px", display: "flex", gap: 8, overflowX: "auto", WebkitOverflowScrolling: "touch" }}>
        {kategorier.map(k => {
          const cs = handleColorStyle(k.color, isDark);
          const active = activeTab === k.id;
          return (
            <button key={k.id} onClick={() => setActiveTab(k.id)}
              style={{ padding: "8px 16px", borderRadius: 20, border: `1.5px solid ${active ? cs.accent : t.border}`,
                background: active ? cs.bg : "transparent", color: active ? cs.accent : t.textMuted,
                fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
              {k.name}
            </button>
          );
        })}
        <button onClick={() => setActiveTab("oppnadd")}
          style={{ padding: "8px 16px", borderRadius: 20, border: `1.5px solid ${isOppnadd ? t.green : t.border}`,
            background: isOppnadd ? t.greenDim : "transparent", color: isOppnadd ? t.green : t.textMuted,
            fontSize: 13, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap", flexShrink: 0 }}>
          ✓ Oppnådd{doneCount > 0 ? ` (${doneCount})` : ""}
        </button>
      </div>

      <div style={{ padding: "0 20px" }}>
        {/* OPPNÅDD TAB */}
        {isOppnadd ? (
          doneLapper.length === 0 ? (
            <div style={{ textAlign: "center", padding: "50px 0", color: t.textMuted }}>
              <div style={{ fontSize: 40, marginBottom: 10 }}>🏆</div>
              <div style={{ fontSize: 14 }}>Ingen oppnådde mål ennå</div>
              <div style={{ fontSize: 12, color: t.textFaint, marginTop: 4 }}>Marker en lapp som oppnådd så dukker den opp her</div>
            </div>
          ) : (
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              {doneLapper.map(l => {
                const cat = kategorier.find(k => k.id === l.catId);
                const cs = handleColorStyle(cat?.color, isDark);
                return (
                  <div key={l.id} style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px", position: "relative" }}>
                    <div style={{ position: "absolute", top: 10, right: 10, width: 20, height: 20, borderRadius: 10, background: t.green, display: "flex", alignItems: "center", justifyContent: "center" }}>
                      <span style={{ color: "#fff", fontSize: 12, fontWeight: 900 }}>✓</span>
                    </div>
                    <div style={{ fontSize: 14, fontWeight: 700, color: t.text, marginBottom: 4, paddingRight: 20, textDecoration: "line-through", opacity: 0.7 }}>{l.title}</div>
                    {l.desc && <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 8 }}>{l.desc}</div>}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginTop: 8 }}>
                      <span style={{ fontSize: 10, fontWeight: 700, color: cs.accent }}>{cat?.name || ""}</span>
                      <span style={{ fontSize: 10, color: t.textFaint }}>{l.doneDate ? new Date(l.doneDate + "T12:00:00").toLocaleDateString("nb-NO", { day: "numeric", month: "short", year: "numeric" }) : ""}</span>
                    </div>
                    <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                      <button onClick={() => toggleDone(l.id)} style={{ flex: 1, padding: "5px", borderRadius: 8, border: `1px solid ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 11, cursor: "pointer" }}>Angre</button>
                      <button onClick={() => removeLapp(l.id)} style={{ padding: "5px 10px", borderRadius: 8, border: `1px solid ${t.border}`, background: "transparent", color: "#ef4444", fontSize: 11, cursor: "pointer" }}>Slett</button>
                    </div>
                  </div>
                );
              })}
            </div>
          )
        ) : (
          /* CATEGORY TAB */
          <div>
            {catLapper.length === 0 ? (
              <div style={{ textAlign: "center", padding: "50px 0", color: t.textMuted }}>
                <div style={{ fontSize: 40, marginBottom: 10 }}>💭</div>
                <div style={{ fontSize: 14 }}>Ingen lapper her ennå</div>
                <div style={{ fontSize: 12, color: t.textFaint, marginTop: 4 }}>Legg til din første drøm nedenfor</div>
              </div>
            ) : (
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
                {catLapper.map((l, idx) => {
                  const cs = handleColorStyle(activeCat?.color, isDark);
                  return (
                    <div key={l.id} style={{ background: cs.bg, border: `1px solid ${cs.border}`, borderRadius: 14, padding: "14px", display: "flex", flexDirection: "column" }}>
                      <div onClick={() => setEditLapp({ id: l.id, catId: l.catId, title: l.title, desc: l.desc || "" })} style={{ cursor: "pointer", flex: 1 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: cs.accent, marginBottom: l.desc ? 4 : 0 }}>{l.title}</div>
                        {l.desc && <div style={{ fontSize: 12, color: t.text, opacity: 0.75, lineHeight: 1.4 }}>{l.desc}</div>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 12 }}>
                        <button onClick={() => toggleDone(l.id)} title="Marker oppnådd"
                          style={{ flex: 1, padding: "6px", borderRadius: 8, border: `1px solid ${cs.accent}`, background: "transparent", color: cs.accent, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>✓ Oppnådd</button>
                        <button onClick={() => moveLapp(l.id, -1)} disabled={idx === 0}
                          style={{ background: "transparent", border: `1px solid ${cs.border}`, borderRadius: 6, width: 26, height: 28, cursor: idx === 0 ? "default" : "pointer", color: cs.accent, opacity: idx === 0 ? 0.3 : 1, fontSize: 11 }}>↑</button>
                        <button onClick={() => moveLapp(l.id, 1)} disabled={idx === catLapper.length - 1}
                          style={{ background: "transparent", border: `1px solid ${cs.border}`, borderRadius: 6, width: 26, height: 28, cursor: idx === catLapper.length - 1 ? "default" : "pointer", color: cs.accent, opacity: idx === catLapper.length - 1 ? 0.3 : 1, fontSize: 11 }}>↓</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
            {activeCat && (
              <button onClick={() => setEditLapp({ catId: activeTab, title: "", desc: "" })}
                style={{ width: "100%", padding: "14px", borderRadius: 14, border: `1.5px dashed ${t.border}`, background: "transparent", color: t.textMuted, fontSize: 14, fontWeight: 600, cursor: "pointer" }}>
                + Ny drøm i {activeCat.name}
              </button>
            )}
          </div>
        )}
      </div>

      {/* Lapp edit modal */}
      {editLapp && (
        <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => setEditLapp(null)}>
          <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "28px 24px 44px", borderTop: `1px solid ${t.border}` }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
              <span style={{ fontWeight: 800, fontSize: 17, color: t.text }}>{editLapp.id ? "Rediger drøm" : "Ny drøm"}</span>
              <button onClick={() => setEditLapp(null)} style={{ background: t.surface2, border: "none", borderRadius: 20, width: 32, height: 32, cursor: "pointer", color: t.textMuted, fontSize: 18 }}>×</button>
            </div>
            <input value={editLapp.title} onChange={e => setEditLapp({ ...editLapp, title: e.target.value })}
              placeholder="Tittel..." style={{ ...inputSt, marginBottom: 10 }} autoFocus />
            <textarea value={editLapp.desc} onChange={e => setEditLapp({ ...editLapp, desc: e.target.value })}
              placeholder="Beskrivelse (valgfritt)..." rows={3} style={{ ...inputSt, resize: "none", marginBottom: 14 }} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={saveLappEdit} disabled={!editLapp.title.trim()}
                style={{ flex: 1, padding: 14, borderRadius: 12, border: "none", background: editLapp.title.trim() ? t.orange : t.surface2, color: editLapp.title.trim() ? "#fff" : t.textFaint, fontSize: 15, fontWeight: 700, cursor: editLapp.title.trim() ? "pointer" : "default" }}>Lagre</button>
              {editLapp.id && (
                <button onClick={() => { removeLapp(editLapp.id); setEditLapp(null); }}
                  style={{ padding: "14px 18px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.surface2, color: "#ef4444", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Slett</button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Category management modal */}
      {showCatModal && (
        <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={() => setShowCatModal(false)}>
          <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, maxHeight: "85vh", display: "flex", flexDirection: "column", borderTop: `1px solid ${t.border}` }}>
            <div style={{ padding: "24px 24px 12px", flexShrink: 0, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontWeight: 800, fontSize: 18, color: t.text }}>Kategorier</span>
              <button onClick={() => setShowCatModal(false)} style={{ background: t.surface2, border: "none", borderRadius: 20, width: 32, height: 32, cursor: "pointer", color: t.textMuted, fontSize: 18 }}>×</button>
            </div>
            <div style={{ overflowY: "auto", flex: 1, padding: "8px 24px 44px" }}>
              {kategorier.map(k => (
                <div key={k.id} style={{ marginBottom: 10, padding: "12px 14px", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 12 }}>
                  <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                    <span style={{ fontSize: 14, fontWeight: 600, color: t.text }}>{k.name}</span>
                    <button onClick={() => removeCat(k.id)} style={{ background: "none", border: "none", color: "#ef4444", fontSize: 13, cursor: "pointer" }}>Slett</button>
                  </div>
                  <div style={{ display: "flex", gap: 6 }}>
                    {colorKeys.map(ck => {
                      const cks = handleColorStyle(ck, isDark);
                      const sel = k.color === ck;
                      return (
                        <button key={ck} onClick={() => updateCat(k.id, { color: ck })}
                          style={{ width: 28, height: 28, borderRadius: 8, background: cks.bg, border: `2px solid ${sel ? cks.accent : "transparent"}`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                          <div style={{ width: 12, height: 12, borderRadius: 4, background: cks.accent }} />
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
              <div style={{ marginTop: 16, padding: "14px", background: t.bg, border: `1px dashed ${t.border}`, borderRadius: 12 }}>
                <input value={newCatName} onChange={e => setNewCatName(e.target.value)} onKeyDown={e => e.key === "Enter" && addCat()}
                  placeholder="Ny kategori..." style={{ ...inputSt, marginBottom: 10 }} />
                <div style={{ display: "flex", gap: 6, marginBottom: 10 }}>
                  {colorKeys.map(ck => {
                    const cks = handleColorStyle(ck, isDark);
                    const sel = newCatColor === ck;
                    return (
                      <button key={ck} onClick={() => setNewCatColor(ck)}
                        style={{ width: 28, height: 28, borderRadius: 8, background: cks.bg, border: `2px solid ${sel ? cks.accent : "transparent"}`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <div style={{ width: 12, height: 12, borderRadius: 4, background: cks.accent }} />
                      </button>
                    );
                  })}
                </div>
                <button onClick={addCat} style={{ width: "100%", padding: 10, borderRadius: 10, border: "none", background: t.orange, color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Legg til kategori</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Kor app ────────────────────────────────────────────────────────────────────
// Storage: kor:verv:{korId}   [{ id, title, items:[{id,text,done}] }]
//          kor:notater:{korId} [{ id, title, body, date }]

const KOR_LIST = [
  { id: "knaus", name: "Knauskoret", logo: "knaus", color: "#e11d48" },
  { id: "tss",   name: "TSS",        logo: "tss",   color: "#0891b2" },
  { id: "piano", name: "Piano",      logo: null,    color: "#7c3aed", emoji: "🎹" },
];

function KorApp({ t, onBack }) {
  const [selected, setSelected] = useState(null); // korId
  const isDark = t.bg === "#0d1117";

  if (selected === "piano") return <PianoView t={t} onBack={() => setSelected(null)} />;
  if (selected) {
    const kor = KOR_LIST.find(k => k.id === selected);
    return <KorDetail t={t} kor={kor} onBack={() => setSelected(null)} />;
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontSize: 20, fontWeight: 800, color: t.text }}>🎵 Kor og øving</span>
        <div style={{ width: 40 }} />
      </div>

      <div style={{ padding: "20px", display: "flex", flexDirection: "column", gap: 16 }}>
        {KOR_LIST.map(kor => (
          <button key={kor.id} onClick={() => setSelected(kor.id)}
            style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 20, padding: "28px 24px", cursor: "pointer",
              display: "flex", flexDirection: "column", alignItems: "center", gap: 16, transition: "border-color 0.15s, transform 0.1s" }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = kor.color; e.currentTarget.style.transform = "scale(1.02)"; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = t.border; e.currentTarget.style.transform = "scale(1)"; }}>
            <div style={{ height: 90, display: "flex", alignItems: "center", justifyContent: "center" }}>
              {kor.logo
                ? <img src={KOR_LOGOS[kor.logo]} alt={kor.name}
                    style={{ maxHeight: 90, maxWidth: 140, objectFit: "contain",
                      filter: isDark ? "invert(1)" : "none" }} />
                : <span style={{ fontSize: 64 }}>{kor.emoji}</span>}
            </div>
            <span style={{ fontSize: 18, fontWeight: 800, color: t.text }}>{kor.name}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

function KorDetail({ t, kor, onBack }) {
  const [tab, setTab] = useState("verv");
  const tabSt = (active) => ({ flex: 1, padding: "10px 4px", border: "none", background: active ? kor.color : "transparent", color: active ? "#fff" : t.textMuted, fontSize: 12, fontWeight: 700, cursor: "pointer", borderRadius: 10 });
  const isDark = t.bg === "#0d1117";

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Kor</button>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          {kor.logo && <img src={KOR_LOGOS[kor.logo]} alt="" style={{ height: 28, filter: isDark ? "invert(1)" : "none" }} />}
          <span style={{ fontSize: 19, fontWeight: 800, color: t.text }}>{kor.name}</span>
        </div>
        <div style={{ width: 40 }} />
      </div>

      <div style={{ padding: "0 20px 16px" }}>
        <div style={{ display: "flex", gap: 6, background: t.surface, borderRadius: 12, padding: 4, border: `1px solid ${t.border}` }}>
          <button onClick={() => setTab("verv")} style={tabSt(tab === "verv")}>✅ Verv</button>
          <button onClick={() => setTab("oving")} style={tabSt(tab === "oving")}>🎼 Øving</button>
          <button onClick={() => setTab("notater")} style={tabSt(tab === "notater")}>📝 Notater</button>
        </div>
      </div>

      <div style={{ padding: "0 20px" }}>
        {tab === "verv" && <KorVerv t={t} kor={kor} />}
        {tab === "oving" && (
          <div style={{ textAlign: "center", padding: "60px 20px", color: t.textMuted }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🎼</div>
            <div style={{ fontSize: 15, fontWeight: 700, color: t.text, marginBottom: 6 }}>Øvingsplan / repertoar</div>
            <div style={{ fontSize: 13, lineHeight: 1.5 }}>Denne kommer senere — vi planlegger den sammen når du er klar.</div>
          </div>
        )}
        {tab === "notater" && <KorNotater t={t} kor={kor} />}
      </div>
    </div>
  );
}

function KorVerv({ t, kor }) {
  // Data model:
  // verv:      [{ id, title }]
  // lister:    { vervId: [{ id, title, items:[{id,text,done}] }] }  (stored together)
  const key = "kor:verv:" + kor.id;
  const isDark = t.bg === "#0d1117";
  const [verv, setVerv] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [collapsedVerv, setCollapsedVerv] = useState({}); // vervId -> bool
  const [collapsedDone, setCollapsedDone] = useState({}); // vervId -> bool (default collapsed)
  const [newItemText, setNewItemText] = useState({}); // listId -> text
  const [addingListFor, setAddingListFor] = useState(null); // vervId
  const [newListTitle, setNewListTitle] = useState("");
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => {
    try {
      const s = localStorage.getItem(key);
      if (s) {
        const parsed = JSON.parse(s);
        // Migrate old flat format (array of lists) -> new format
        if (Array.isArray(parsed)) {
          if (parsed.length > 0 && parsed[0] && parsed[0].items !== undefined) {
            // Old: array of lists. Wrap into a single default verv.
            setVerv([{ id: "v-migrated", title: "Verv", lister: parsed }]);
          } else {
            setVerv(parsed);
          }
        } else if (parsed && parsed.verv) {
          setVerv(parsed.verv);
        }
      }
    } catch(_){}
    setLoaded(true);
  }, [key]);

  function save(v) { setVerv(v); try { localStorage.setItem(key, JSON.stringify(v)); } catch(_){} }

  function addVerv(title) {
    if (!title.trim()) return;
    save([...verv, { id: "v" + Date.now(), title: title.trim(), lister: [] }]);
  }
  function removeVerv(id) { save(verv.filter(v => v.id !== id)); }
  function renameVerv(id, title) { save(verv.map(v => v.id === id ? { ...v, title } : v)); }
  function moveVerv(id, dir) {
    const idx = verv.findIndex(v => v.id === id);
    const swap = idx + dir;
    if (swap < 0 || swap >= verv.length) return;
    const copy = [...verv];
    [copy[idx], copy[swap]] = [copy[swap], copy[idx]];
    save(copy);
  }

  function addList(vervId) {
    if (!newListTitle.trim()) return;
    save(verv.map(v => v.id === vervId ? { ...v, lister: [...(v.lister||[]), { id: "l" + Date.now(), title: newListTitle.trim(), items: [] }] } : v));
    setNewListTitle(""); setAddingListFor(null);
  }
  function removeList(vervId, listId) {
    if (!confirm("Slette denne lista?")) return;
    save(verv.map(v => v.id === vervId ? { ...v, lister: v.lister.filter(l => l.id !== listId) } : v));
  }
  function addItem(vervId, listId) {
    const text = (newItemText[listId] || "").trim();
    if (!text) return;
    save(verv.map(v => v.id === vervId ? { ...v, lister: v.lister.map(l => l.id === listId ? { ...l, items: [...l.items, { id: "i" + Date.now(), text, done: false }] } : l) } : v));
    setNewItemText({ ...newItemText, [listId]: "" });
  }
  function toggleItem(vervId, listId, itemId) {
    save(verv.map(v => v.id === vervId ? { ...v, lister: v.lister.map(l => l.id === listId ? { ...l, items: l.items.map(it => it.id === itemId ? { ...it, done: !it.done } : it) } : l) } : v));
  }
  function removeItem(vervId, listId, itemId) {
    save(verv.map(v => v.id === vervId ? { ...v, lister: v.lister.map(l => l.id === listId ? { ...l, items: l.items.filter(it => it.id !== itemId) } : l) } : v));
  }

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", boxSizing: "border-box" };
  if (!loaded) return null;

  return (
    <div style={{ paddingBottom: 40 }}>
      {/* Manage verv button */}
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 12 }}>
        <button onClick={() => setShowSettings(true)} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "7px 14px", color: t.textMuted, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>⚙️ Rediger verv</button>
      </div>

      {verv.length === 0 && (
        <div style={{ textAlign: "center", padding: "40px 0", color: t.textMuted }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>✅</div>
          <div style={{ fontSize: 14 }}>Ingen verv ennå</div>
          <div style={{ fontSize: 12, color: t.textFaint, marginTop: 4 }}>Trykk "Rediger verv" for å legge til</div>
        </div>
      )}

      {verv.map(v => {
        const vervCollapsed = collapsedVerv[v.id];
        const lister = v.lister || [];
        // gather done items across all lists in this verv
        const allDone = [];
        lister.forEach(l => l.items.filter(it => it.done).forEach(it => allDone.push({ ...it, listId: l.id, listTitle: l.title })));
        const doneCollapsed = collapsedDone[v.id] !== false; // default collapsed
        return (
          <div key={v.id} style={{ marginBottom: 14, background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, overflow: "hidden" }}>
            {/* Verv header */}
            <button onClick={() => setCollapsedVerv({ ...collapsedVerv, [v.id]: !vervCollapsed })}
              style={{ width: "100%", padding: "16px 18px", background: "none", border: "none", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center", color: t.text, borderBottom: vervCollapsed ? "none" : `1px solid ${t.border}` }}>
              <span style={{ fontSize: 16, fontWeight: 800 }}>{v.title}</span>
              <span style={{ fontSize: 13, color: t.textMuted }}>{vervCollapsed ? "▸" : "▾"}</span>
            </button>

            {!vervCollapsed && (
              <div style={{ padding: "14px 16px" }}>
                {/* Sub-lists (excluding done items) */}
                {lister.map(l => {
                  const activeItems = l.items.filter(it => !it.done);
                  return (
                    <div key={l.id} style={{ marginBottom: 14, background: t.bg, border: `1px solid ${t.border}`, borderRadius: 12, padding: "12px 14px" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: kor.color }}>📋 {l.title}</span>
                        <button onClick={() => removeList(v.id, l.id)} style={{ background: "none", border: "none", color: t.textFaint, fontSize: 14, cursor: "pointer" }}>🗑</button>
                      </div>
                      {activeItems.map(it => (
                        <div key={it.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 0" }}>
                          <button onClick={() => toggleItem(v.id, l.id, it.id)}
                            style={{ width: 20, height: 20, borderRadius: 6, border: `2px solid ${t.border}`, background: "transparent", cursor: "pointer", flexShrink: 0, padding: 0 }} />
                          <span style={{ flex: 1, fontSize: 14, color: t.text }}>{it.text}</span>
                          <button onClick={() => removeItem(v.id, l.id, it.id)} style={{ background: "none", border: "none", color: t.textFaint, fontSize: 16, cursor: "pointer", padding: "0 4px" }}>×</button>
                        </div>
                      ))}
                      <div style={{ display: "flex", gap: 6, marginTop: 8 }}>
                        <input value={newItemText[l.id] || ""} onChange={e => setNewItemText({ ...newItemText, [l.id]: e.target.value })}
                          onKeyDown={e => e.key === "Enter" && addItem(v.id, l.id)} placeholder="Legg til punkt..."

        );
      })}

      {showSettings && <KorVervSettings t={t} kor={kor} verv={verv} onAdd={addVerv} onRemove={removeVerv} onRename={renameVerv} onMove={moveVerv} onClose={() => setShowSettings(false)} />}
    </div>
  );
}

// ── Piano view (vertical, 2 octaves, Web Audio) ────────────────────────────────
function PianoView({ t, onBack }) {
  const audioCtxRef = useRef(null);
  const [labels, setLabels] = useState(true);
  const [activeNotes, setActiveNotes] = useState({});

  function getCtx() {
    if (!audioCtxRef.current) {
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    }
    return audioCtxRef.current;
  }

  function playNote(freq, id) {
    const ctx = getCtx();
    if (ctx.state === "suspended") ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "triangle";
    osc.frequency.value = freq;
    // Simple piano-ish envelope
    const now = ctx.currentTime;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(0.35, now + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.15, now + 0.3);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.6);
    // Add a second oscillator an octave up for brightness
    const osc2 = ctx.createOscillator();
    const gain2 = ctx.createGain();
    osc2.type = "sine";
    osc2.frequency.value = freq * 2;
    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(0.12, now + 0.01);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + 1.0);
    osc.connect(gain).connect(ctx.destination);
    osc2.connect(gain2).connect(ctx.destination);
    osc.start(now); osc2.start(now);
    osc.stop(now + 1.7); osc2.stop(now + 1.1);
    setActiveNotes(prev => ({ ...prev, [id]: true }));
    setTimeout(() => setActiveNotes(prev => { const n = { ...prev }; delete n[id]; return n; }), 200);
  }

  // 2 octaves from C4 to B5
  const noteNames = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
  const baseFreq = { C:261.63, "C#":277.18, D:293.66, "D#":311.13, E:329.63, F:349.23, "F#":369.99, G:392.00, "G#":415.30, A:440.00, "A#":466.16, B:493.88 };
  // Build note list across 2 octaves
  const notes = [];
  for (let oct = 4; oct <= 5; oct++) {
    noteNames.forEach(nn => {
      const freq = baseFreq[nn] * Math.pow(2, oct - 4);
      notes.push({ name: nn, octave: oct, freq, isBlack: nn.includes("#"), id: nn + oct });
    });
  }
  const whiteNotes = notes.filter(n => !n.isBlack);
  const isDark = t.bg === "#0d1117";

  // Layout: piano rotated 90° CW means keys stack vertically (top = leftmost = low C).
  // We render white keys as horizontal bars stacked vertically; black keys overlaid.
  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, display: "flex", flexDirection: "column" }}>
      <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Kor</button>
        <span style={{ fontSize: 19, fontWeight: 800, color: t.text }}>🎹 Piano</span>
        <button onClick={() => setLabels(!labels)} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{labels ? "Skjul navn" : "Vis navn"}</button>
      </div>

      <div style={{ flex: 1, position: "relative", padding: "8px 16px 20px", display: "flex" }}>
        {/* White keys column */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", position: "relative", borderRadius: 12, overflow: "hidden", boxShadow: "0 4px 20px rgba(0,0,0,0.3)" }}>
          {whiteNotes.map((note, i) => {
            const active = activeNotes[note.id];
            return (
              <button key={note.id}
                onPointerDown={(e) => { e.preventDefault(); playNote(note.freq, note.id); }}
                style={{ flex: 1, border: "none", borderBottom: `1px solid ${isDark ? "#333" : "#ccc"}`,
                  background: active ? "#fcd34d" : "#fafafa",
                  cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "flex-start",
                  paddingLeft: 18, transition: "background 0.08s", position: "relative",
                  color: "#333", fontSize: 13, fontWeight: 700, touchAction: "none", userSelect: "none" }}>
                {labels && <span style={{ opacity: 0.55 }}>{note.name}{note.octave}</span>}
              </button>
            );
          })}
        </div>

        {/* Black keys overlaid (right side, mirrored) */}
        <div style={{ position: "absolute", top: 8, bottom: 20, right: 16, width: "58%", pointerEvents: "none" }}>
          {(() => {
            const totalWhite = whiteNotes.length;
            const els = [];
            notes.forEach((note) => {
              if (!note.isBlack) return;
              // Find index position: black key sits between two white keys.
              // Count white keys before this black key.
              const whiteBefore = notes.slice(0, notes.indexOf(note)).filter(n => !n.isBlack).length;
              // Position at boundary between whiteBefore-1 and whiteBefore
              const topPct = (whiteBefore / totalWhite) * 100;
              const active = activeNotes[note.id];
              els.push(
                <button key={note.id}
                  onPointerDown={(e) => { e.preventDefault(); playNote(note.freq, note.id); }}
                  style={{ position: "absolute", top: `calc(${topPct}% - 4.5%)`, right: 0, height: "9%", width: "100%",
                    background: active ? "#f59e0b" : "#1a1a1a", border: "none", borderRadius: "6px 0 0 6px",
                    cursor: "pointer", pointerEvents: "auto", display: "flex", alignItems: "center", justifyContent: "flex-start",
                    paddingLeft: 12, color: active ? "#000" : "#888", fontSize: 11, fontWeight: 700,
                    boxShadow: "-2px 0 6px rgba(0,0,0,0.4)", touchAction: "none", userSelect: "none", zIndex: 2 }}>
                  {labels && <span>{note.name}{note.octave}</span>}
                </button>
              );
            });
            return els;
          })()}
        </div>
      </div>

      <div style={{ padding: "0 20px 16px", textAlign: "center", flexShrink: 0 }}>
        <span style={{ fontSize: 11, color: t.textFaint }}>2 oktaver · C4–B5 · Trykk på tangentene</span>
      </div>
    </div>
  );
}

function trGetISODay(d) { const day=d.getDay(); return day===0?7:day; }
function trGetISOWeek(d) {
  const date=new Date(Date.UTC(d.getFullYear(),d.getMonth(),d.getDate()));
  const dayNum=date.getUTCDay()||7;
  date.setUTCDate(date.getUTCDate()+4-dayNum);
  const yearStart=new Date(Date.UTC(date.getUTCFullYear(),0,1));
  return Math.ceil((((date-yearStart)/86400000)+1)/7);
}
function trISOWeekKey(d) { return `${d.getFullYear()}-W${String(trGetISOWeek(d)).padStart(2,"0")}`; }
function trDateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function trGetMonday(d) { const day=d.getDay()||7; const m=new Date(d); m.setDate(d.getDate()-day+1); m.setHours(0,0,0,0); return m; }
function trAddDays(d,n) { const r=new Date(d); r.setDate(r.getDate()+n); return r; }
function trDaysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function trFirstDayOfMonth(y,m) { return trGetISODay(new Date(y,m,1)); }

function TreningApp({ t, onBack }) {
  const isDark = t.bg === "#0d1117";
  const [loaded, setLoaded] = useState(false);
  const [mainTab, setMainTab] = useState("trening");
  const [treningTab, setTreningTab] = useState("logg");
  const [program, setProgram] = useState(DEFAULT_TRENING_PROGRAM);
  const [logg, setLogg] = useState({});
  const [ukeplan, setUkeplan] = useState({ default:{}, overrides:{} });
  const [helse, setHelse] = useState({ prosesser:[], notater:[] });
  const [trSettings, setTrSettings] = useState({ posEmojis:DEFAULT_POS_EMOJIS, negEmojis:DEFAULT_NEG_EMOJIS });
  const today = new Date(); today.setHours(0,0,0,0);
  const [calMonth, setCalMonth] = useState(today.getMonth());
  const [calYear, setCalYear] = useState(today.getFullYear());
  const [loggModal, setLoggModal] = useState(null);
  const [progEdit, setProgEdit] = useState(null);
  const [showUkeModal, setShowUkeModal] = useState(false);
  const [showDefaultPlan, setShowDefaultPlan] = useState(false);
  const [showEmojiSettings, setShowEmojiSettings] = useState(false);
  const [helseTab, setHelseTab] = useState("prosesser");
  const [newProsNavn, setNewProsNavn] = useState("");
  const [showNewPros, setShowNewPros] = useState(false);
  const [editPros, setEditPros] = useState(null);
  const [newNotatText, setNewNotatText] = useState("");
  const [newNotatDato, setNewNotatDato] = useState("");
  const [showNewNotat, setShowNewNotat] = useState(false);
  const [statsView, setStatsView] = useState("maned");

  useEffect(()=>{
    try {
      const p=localStorage.getItem("trening:program"); if(p) setProgram(JSON.parse(p));
      const l=localStorage.getItem("trening:logg"); if(l) setLogg(JSON.parse(l));
      const u=localStorage.getItem("trening:ukeplan"); if(u) setUkeplan(JSON.parse(u));
      const h=localStorage.getItem("trening:helse"); if(h) setHelse(JSON.parse(h));
      const s=localStorage.getItem("trening:settings"); if(s) setTrSettings(JSON.parse(s));
    } catch(_){}
    setLoaded(true);
  },[]);

  function saveProgram(v){ setProgram(v); try{localStorage.setItem("trening:program",JSON.stringify(v));}catch(_){} }
  function saveLogg(v){ setLogg(v); try{localStorage.setItem("trening:logg",JSON.stringify(v));}catch(_){} }
  function saveUkeplan(v){ setUkeplan(v); try{localStorage.setItem("trening:ukeplan",JSON.stringify(v));}catch(_){} }
  function saveHelse(v){ setHelse(v); try{localStorage.setItem("trening:helse",JSON.stringify(v));}catch(_){} }
  function saveTrSettings(v){ setTrSettings(v); try{localStorage.setItem("trening:settings",JSON.stringify(v));}catch(_){} }

  function getWeekPlan(weekKey) {
    const override=ukeplan.overrides[weekKey];
    const def=ukeplan.default||{};
    if(override){ const m={}; for(let i=1;i<=7;i++) m[i]=override.hasOwnProperty(i)?override[i]:(def[i]||null); return m; }
    return def;
  }

  function calcStreak() {
    let streak=0;
    const monday=trGetMonday(today);
    for(let w=0;w<52;w++){
      const weekStart=trAddDays(monday,-7*w);
      let count=0;
      for(let d=0;d<7;d++){
        const day=trAddDays(weekStart,d);
        if(day>today) continue;
        if(logg[trDateKey(day)]?.catId) count++;
      }
      if(count>=3) streak++;
      else if(w===0) { /* current week still in progress */ }
      else break;
    }
    return streak;
  }

  function sessionsThisWeek() {
    const monday=trGetMonday(today);
    let count=0;
    for(let d=0;d<7;d++){
      const day=trAddDays(monday,d);
      if(day>today) break;
      if(logg[trDateKey(day)]?.catId) count++;
    }
    return count;
  }

  function handleLoggSave(dateStr,entry) {
    const newLogg={...logg};
    if(entry===null) delete newLogg[dateStr];
    else newLogg[dateStr]=entry;
    saveLogg(newLogg);
    setLoggModal(null);
  }
  function handleProgSave(prog) {
    const existing=program.find(p=>p.id===prog.id);
    if(existing) saveProgram(program.map(p=>p.id===prog.id?prog:p));
    else saveProgram([...program,prog]);
    setProgEdit(null);
  }
  function deleteProg(id) { if(!window.confirm("Slette dette programmet?")) return; saveProgram(program.filter(p=>p.id!==id)); }
  function handleUkeOverride(weekKey,plan) {
    if(plan===null){ const no={...ukeplan.overrides}; delete no[weekKey]; saveUkeplan({...ukeplan,overrides:no}); }
    else saveUkeplan({...ukeplan,overrides:{...ukeplan.overrides,[weekKey]:plan}});
  }
  function handleDefaultPlan(plan) { saveUkeplan({...ukeplan,default:plan}); }

  function addProsess() {
    if(!newProsNavn.trim()) return;
    const p={id:"pr"+Date.now(),name:newProsNavn.trim(),status:"pågår",notat:"",done:false};
    saveHelse({...helse,prosesser:[...helse.prosesser,p]});
    setNewProsNavn(""); setShowNewPros(false);
  }
  function updatePros(id,changes) { saveHelse({...helse,prosesser:helse.prosesser.map(p=>p.id===id?{...p,...changes}:p)}); }
  function deletePros(id) { if(!window.confirm("Slette denne prosessen?")) return; saveHelse({...helse,prosesser:helse.prosesser.filter(p=>p.id!==id)}); }
  function addNotat() {
    if(!newNotatText.trim()) return;
    const n={id:"n"+Date.now(),text:newNotatText.trim(),legeDato:newNotatDato,arkivert:false};
    saveHelse({...helse,notater:[...helse.notater,n]});
    setNewNotatText(""); setNewNotatDato(""); setShowNewNotat(false);
  }
  function arkiverNotat(id) { saveHelse({...helse,notater:helse.notater.map(n=>n.id===id?{...n,arkivert:!n.arkivert}:n)}); }
  function deleteNotat(id) { if(!window.confirm("Slette dette notatet?")) return; saveHelse({...helse,notater:helse.notater.filter(n=>n.id!==id)}); }

  function getMonthStats(year,month) {
    let sessions=0,totalRating=0,ratingCount=0;
    const days=trDaysInMonth(year,month);
    for(let d=1;d<=days;d++){
      const key=`${year}-${String(month+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const e=logg[key]; if(e?.catId){sessions++; if(e.rating>0){totalRating+=e.rating;ratingCount++;}}
    }
    return {sessions,avgRating:ratingCount?Math.round(totalRating/ratingCount*10)/10:null};
  }
  function getYearStats(year) {
    let sessions=0,goldWeeks=0,totalRating=0,ratingCount=0;
    for(let m=0;m<12;m++){const ms=getMonthStats(year,m);sessions+=ms.sessions;if(ms.avgRating){totalRating+=ms.avgRating;ratingCount++;}}
    for(let w=0;w<54;w++){
      const d=new Date(year,0,1+w*7); if(d.getFullYear()>year) break;
      const monday=trGetMonday(d); let c=0;
      for(let dd=0;dd<7;dd++){const day=trAddDays(monday,dd);if(day.getFullYear()!==year)continue;if(logg[trDateKey(day)]?.catId)c++;}
      if(c>=3) goldWeeks++;
    }
    return {sessions,goldWeeks,avgRating:ratingCount?Math.round(totalRating/ratingCount*10)/10:null};
  }
  function getAllTimeStats() {
    let sessions=0,totalRating=0,ratingCount=0;
    const years=new Set();
    Object.keys(logg).forEach(k=>{const e=logg[k];if(!e?.catId)return;sessions++;if(e.rating>0){totalRating+=e.rating;ratingCount++;}years.add(k.substring(0,4));});
    let goldWeeks=0;
    years.forEach(y=>{goldWeeks+=getYearStats(parseInt(y)).goldWeeks;});
    return {sessions,goldWeeks,avgRating:ratingCount?Math.round(totalRating/ratingCount*10)/10:null};
  }

  const inputSt={background:t.bg,border:`1px solid ${t.border}`,borderRadius:10,padding:"10px 12px",color:t.text,fontSize:14,outline:"none",fontFamily:"inherit",width:"100%",boxSizing:"border-box"};
  const tabBtnSt=(active,col)=>({flex:1,padding:"9px 4px",border:"none",background:active?(col||t.green):"transparent",color:active?"#fff":t.textMuted,fontSize:12,fontWeight:700,cursor:"pointer",borderRadius:9});

  const streak=loaded?calcStreak():0;
  const thisWeekSessions=loaded?sessionsThisWeek():0;
  const currentWeekKey=trISOWeekKey(today);
  const hasOverride=!!(ukeplan.overrides||{})[currentWeekKey];
  const weekPlan=loaded?getWeekPlan(currentWeekKey):{};
  const monday=trGetMonday(today);

  if(!loaded) return <div style={{background:t.bg,minHeight:"100vh"}}/>;

  return (
    <div style={{background:t.bg,minHeight:"100vh",color:t.text,paddingBottom:40}}>
      <div style={{padding:"16px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <button onClick={onBack} style={{background:t.surface2,border:`1px solid ${t.border}`,borderRadius:10,padding:"8px 14px",color:t.textMuted,fontSize:13,fontWeight:600,cursor:"pointer"}}>← Tilbake</button>
        <span style={{fontSize:19,fontWeight:800,color:t.text}}>💪 Trening & Helse</span>
        <button onClick={()=>setShowEmojiSettings(true)} style={{background:"transparent",border:"none",cursor:"pointer",fontSize:20,color:t.textMuted}}>⚙️</button>
      </div>

      <div style={{padding:"0 20px 16px"}}>
        <div style={{display:"flex",gap:4,background:t.surface,borderRadius:12,padding:4,border:`1px solid ${t.border}`}}>
          <button onClick={()=>setMainTab("trening")} style={tabBtnSt(mainTab==="trening",t.green)}>🏋️ Trening</button>
          <button onClick={()=>setMainTab("helse")} style={tabBtnSt(mainTab==="helse","#e11d48")}>❤️ Helse</button>
          <button onClick={()=>setMainTab("stats")} style={tabBtnSt(mainTab==="stats",t.blue)}>📊 Statistikk</button>
        </div>
      </div>

      {mainTab==="trening" && (
        <div>
          {/* Streak card */}
          <div style={{margin:"0 20px 16px",background:streak>=1?t.greenDim:t.surface,border:`1px solid ${streak>=1?t.green:t.border}`,borderRadius:16,padding:"14px 18px",display:"flex",alignItems:"center",gap:14}}>
            <div style={{fontSize:34}}>{streak>=3?"🏆":streak>=1?"🔥":"💤"}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:20,fontWeight:900,color:streak>=1?t.green:t.text}}>{streak} {streak===1?"uke":"uker"} på rad</div>

                {thisWeekSessions}/3 økter denne uka{thisWeekSessions>=3?" · ✅ Gulluke!":""}
              </div>
              {thisWeekSessions<3&&(
                <div style={{marginTop:6,display:"flex",gap:4}}>
                  {[1,2,3].map(n=><div key={n} style={{width:28,height:8,borderRadius:4,background:n<=thisWeekSessions?t.green:t.border}}/>)}
                </div>
              )}
            </div>
            {thisWeekSessions>=3&&<div style={{fontSize:28}}>⭐</div>}
          </div>

          <div style={{padding:"0 20px 14px"}}>
            <div style={{display:"flex",gap:4,background:t.surface,borderRadius:10,padding:3,border:`1px solid ${t.border}`}}>
              <button onClick={()=>setTreningTab("logg")} style={tabBtnSt(treningTab==="logg",t.green)}>📅 Kalender</button>
              <button onClick={()=>setTreningTab("program")} style={tabBtnSt(treningTab==="program",t.green)}>📋 Program</button>
            </div>
          </div>

          {treningTab==="logg" && (

              {/* Ukesvisning */}
              <div style={{margin:"0 20px 6px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{fontSize:13,fontWeight:700,color:t.text}}>
                  Uke {trGetISOWeek(today)}{hasOverride&&<span style={{fontSize:11,color:t.orange,marginLeft:6}}>✏️ Overstyrt</span>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <button onClick={()=>setShowDefaultPlan(true)} style={{fontSize:11,padding:"5px 10px",borderRadius:8,border:`1px solid ${t.border}`,background:"transparent",color:t.textMuted,cursor:"pointer"}}>Fast plan</button>
                  <button onClick={()=>setShowUkeModal(true)} style={{fontSize:11,padding:"5px 10px",borderRadius:8,border:`1px solid ${t.blue}`,background:t.blueDim,color:t.blue,cursor:"pointer",fontWeight:700}}>Endre uke</button>
                </div>
              </div>
              <div style={{display:"flex",gap:5,padding:"0 20px 16px"}}>
                {TR_UKEDAGER.map((dag,idx)=>{
                  const dayNum=idx+1;
                  const dayDate=trAddDays(monday,idx);
                  const dk=trDateKey(dayDate);
                  const isToday=dk===trDateKey(today);
                  const isPast=dayDate<today;
                  const logEntry=logg[dk];
                  const hasLog=!!logEntry?.catId;
                  const plannedCatId=weekPlan[dayNum]||null;
                  const plannedProg=program.find(p=>p.id===plannedCatId);
                  const loggedProg=hasLog?program.find(p=>p.id===logEntry.catId):null;
                  const isTrainingDay=!!plannedCatId;
                  return (
                    <button key={dayNum} onClick={()=>setLoggModal(dk)}

                      <div style={{fontSize:9,fontWeight:700,color:isToday?"#f97316":t.textMuted}}>{dag}</div>
                      <div style={{fontSize:13,fontWeight:900,color:hasLog?t.green:isToday?"#f97316":t.text}}>{dayDate.getDate()}</div>
                      {hasLog
                        ?<div style={{fontSize:14}}>{loggedProg?.icon||"✅"}</div>
                        :isTrainingDay
                          ?<div style={{fontSize:14,opacity:isPast?0.35:0.7}}>{plannedProg?.icon||"💪"}</div>
                          :<div style={{fontSize:9,color:t.textFaint}}>—</div>
                      }
                      {hasLog&&logEntry.rating>0&&<div style={{fontSize:8,color:t.green,fontWeight:700}}>{logEntry.rating}/5</div>}
                    </button>
                  );
                })}
              </div>

              {/* Månedkalender */}
              <div style={{margin:"0 20px 8px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <button onClick={()=>{let m=calMonth-1,y=calYear;if(m<0){m=11;y--;}setCalMonth(m);setCalYear(y);}} style={{background:"none",border:"none",color:t.textMuted,cursor:"pointer",fontSize:22,padding:"2px 10px"}}>‹</button>
                <div style={{fontWeight:700,fontSize:15,color:t.text,textTransform:"capitalize"}}>
                  {new Date(calYear,calMonth,1).toLocaleDateString("nb-NO",{month:"long",year:"numeric"})}
                </div>
                <button onClick={()=>{let m=calMonth+1,y=calYear;if(m>11){m=0;y++;}setCalMonth(m);setCalYear(y);}} style={{background:"none",border:"none",color:t.textMuted,cursor:"pointer",fontSize:22,padding:"2px 10px"}}>›</button>
              </div>
              {(()=>{
                const firstDay=trFirstDayOfMonth(calYear,calMonth);
                const daysInMonth=trDaysInMonth(calYear,calMonth);
                const grid=[];
                for(let i=1;i<firstDay;i++) grid.push(null);
                for(let d=1;d<=daysInMonth;d++) grid.push(d);
                while(grid.length%7!==0) grid.push(null);
                const rows=[];
                for(let i=0;i<grid.length;i+=7) rows.push(grid.slice(i,i+7));
                return (
                  <div style={{padding:"0 20px 16px"}}>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:4}}>
                      {["Ma","Ti","On","To","Fr","Lø","Sø"].map(d=><div key={d} style={{textAlign:"center",fontSize:10,color:t.textMuted,fontWeight:700,padding:"2px 0"}}>{d}</div>)}
                    </div>
                    {rows.map((row,ri)=>{
                      let weekSessions=0;
                      row.forEach(d=>{
                        if(!d) return;
                        const dk=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                        if(logg[dk]?.catId) weekSessions++;
                      });
                      const isGold=weekSessions>=3;
                      return (
                        <div key={ri} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3,marginBottom:3,position:"relative"}}>
                          {isGold&&<div style={{position:"absolute",inset:0,borderRadius:8,border:`1.5px solid ${t.green}`,background:t.greenDim,pointerEvents:"none",zIndex:0,opacity:0.5}}/>}
                          {row.map((d,di)=>{
                            if(!d) return <div key={di}/>;
                            const dk=`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
                            const e=logg[dk];
                            const hasLog=!!e?.catId;
                            const cellDate=new Date(calYear,calMonth,d);
                            const isTod=dk===trDateKey(today);
                            const isFut=cellDate>today;
                            return (
                              <button key={di} onClick={()=>setLoggModal(dk)}
                                style={{position:"relative",zIndex:1,padding:"5px 2px",borderRadius:7,border:`1px solid ${hasLog?t.green:isTod?"#f97316":"transparent"}`,background:hasLog?t.greenDim:isTod?t.orangeDim:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                                <div style={{fontSize:11,fontWeight:isTod?900:400,color:hasLog?t.green:isTod?"#f97316":isFut?t.textFaint:t.textMuted}}>{d}</div>
                                {hasLog&&<div style={{fontSize:10}}>{program.find(p=>p.id===e.catId)?.icon||"✓"}</div>}
                              </button>
                            );
                          })}
                          {isGold&&<div style={{position:"absolute",right:-18,top:"50%",transform:"translateY(-50%)",fontSize:13,zIndex:2}}>⭐</div>}
                        </div>
                      );
                    })}
                  </div>
                );
              })()}
            </div>
          )}

          {treningTab==="program" && (
            <div style={{padding:"0 20px"}}>
              {program.map(prog=>(
                <div key={prog.id} style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:14,padding:"14px 16px",marginBottom:12}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:prog.items.length?10:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      <span style={{fontSize:26}}>{prog.icon}</span>
                      <div style={{fontWeight:800,fontSize:15,color:t.text}}>{prog.name}</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setProgEdit(prog)} style={{padding:"5px 12px",borderRadius:8,border:`1px solid ${t.border}`,background:"transparent",color:t.textMuted,fontSize:12,cursor:"pointer"}}>Rediger</button>
                      <button onClick={()=>deleteProg(prog.id)} style={{padding:"5px 8px",borderRadius:8,border:"none",background:"transparent",color:"#ef4444",fontSize:14,cursor:"pointer"}}>🗑️</button>
                    </div>
                  </div>
                  {prog.items.map((item,idx)=>(
                    <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderTop:`1px solid ${t.border}`}}>
                      <div style={{width:18,height:18,borderRadius:5,border:`1.5px solid ${t.border}`,flexShrink:0}}/>
                      <span style={{fontSize:13,color:t.textMuted}}>{item.text}</span>
                    </div>
                  ))}
                </div>
              ))}
              <button onClick={()=>setProgEdit("new")} style={{width:"100%",padding:"13px",borderRadius:14,border:`2px dashed ${t.border}`,background:"transparent",color:t.textMuted,fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Nytt treningsprogram</button>
            </div>
          )}
        </div>
      )}

      {mainTab==="helse" && (
        <div>
          <div style={{padding:"0 20px 14px"}}>
            <div style={{display:"flex",gap:4,background:t.surface,borderRadius:10,padding:3,border:`1px solid ${t.border}`}}>
              <button onClick={()=>setHelseTab("prosesser")} style={tabBtnSt(helseTab==="prosesser","#e11d48")}>🔬 Prosesser</button>
              <button onClick={()=>setHelseTab("notater")} style={tabBtnSt(helseTab==="notater","#e11d48")}>📝 Legenotater</button>
            </div>
          </div>
          {helseTab==="prosesser" && (
            <div style={{padding:"0 20px"}}>
              <div style={{fontSize:12,color:t.textMuted,marginBottom:12}}>Hold oversikt over pågående utredninger og helseprosesser.</div>
              {helse.prosesser.filter(p=>!p.done).map(pros=>(
                <div key={pros.id} style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:14,padding:"14px 16px",marginBottom:10}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{fontWeight:700,fontSize:15,color:t.text,flex:1}}>{pros.name}</div>
                    <div style={{display:"flex",gap:6,marginLeft:10}}>
                      <button onClick={()=>setEditPros(pros)} style={{fontSize:12,padding:"4px 10px",borderRadius:8,border:`1px solid ${t.border}`,background:"transparent",color:t.textMuted,cursor:"pointer"}}>✏️</button>
                      <button onClick={()=>updatePros(pros.id,{done:true})} style={{fontSize:12,padding:"4px 10px",borderRadius:8,border:`1px solid ${t.green}`,background:t.greenDim,color:t.green,cursor:"pointer",fontWeight:700}}>Ferdig</button>
                    </div>
                  </div>
                  <div style={{fontSize:12,color:t.orange,fontWeight:700,marginTop:4}}>📍 {pros.status}</div>
                  {pros.notat&&<div style={{fontSize:13,color:t.textMuted,marginTop:6,lineHeight:1.5}}>{pros.notat}</div>}
                </div>
              ))}
              {showNewPros?(
                <div style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:14,padding:"14px 16px",marginBottom:10}}>
                  <input value={newProsNavn} onChange={e=>setNewProsNavn(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addProsess()} style={{...inputSt,marginBottom:10}} placeholder="Navn på utredning/prosess..." autoFocus />
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{setShowNewPros(false);setNewProsNavn("");}} style={{flex:1,padding:10,borderRadius:10,border:`1px solid ${t.border}`,background:"transparent",color:t.textMuted,cursor:"pointer",fontSize:13}}>Avbryt</button>
                    <button onClick={addProsess} style={{flex:2,padding:10,borderRadius:10,border:"none",background:"#e11d48",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>Legg til</button>

                <button onClick={()=>setShowNewPros(true)} style={{width:"100%",padding:"12px",borderRadius:14,border:`2px dashed ${t.border}`,background:"transparent",color:t.textMuted,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:12}}>+ Ny prosess</button>
              )}
              {helse.prosesser.filter(p=>p.done).length>0&&(
                <div style={{marginTop:8}}>
                  <div style={{fontSize:11,color:t.textMuted,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Avsluttede</div>

                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          {helseTab==="notater" && (
            <div style={{padding:"0 20px"}}>

              {helse.notater.filter(n=>!n.arkivert).map(notat=>(

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                    {notat.legeDato&&<div style={{fontSize:11,color:"#e11d48",fontWeight:700}}>🩺 {new Date(notat.legeDato+"T12:00:00").toLocaleDateString("nb-NO",{day:"numeric",month:"long",year:"numeric"})}</div>}
                    <div style={{display:"flex",gap:6,marginLeft:"auto"}}>
                      <button onClick={()=>arkiverNotat(notat.id)} style={{fontSize:11,padding:"4px 10px",borderRadius:8,border:`1px solid ${t.border}`,background:"transparent",color:t.textMuted,cursor:"pointer"}}>📦 Arkiver</button>
                      <button onClick={()=>deleteNotat(notat.id)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:14}}>🗑️</button>
                    </div>

                  <div style={{fontSize:14,color:t.text,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{notat.text}</div>
                </div>
              ))}
              {showNewNotat?(
                <div style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:14,padding:"14px 16px",marginBottom:10}}>
                  <textarea value={newNotatText} onChange={e=>setNewNotatText(e.target.value)} style={{...inputSt,minHeight:96,marginBottom:10,resize:"vertical"}} placeholder="Skriv hva du vil ta opp på neste legetime..." autoFocus />
                  <div style={{fontSize:12,color:t.textMuted,marginBottom:6}}>Dato for legetime (valgfritt)</div>
                  <input type="date" value={newNotatDato} onChange={e=>setNewNotatDato(e.target.value)} style={{...inputSt,marginBottom:12}} />
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>{setShowNewNotat(false);setNewNotatText("");setNewNotatDato("");}} style={{flex:1,padding:10,borderRadius:10,border:`1px solid ${t.border}`,background:"transparent",color:t.textMuted,cursor:"pointer",fontSize:13}}>Avbryt</button>
                    <button onClick={addNotat} style={{flex:2,padding:10,borderRadius:10,border:"none",background:"#e11d48",color:"#fff",fontWeight:700,cursor:"pointer",fontSize:13}}>Legg til</button>
                  </div>
                </div>
              ):(
                <button onClick={()=>setShowNewNotat(true)} style={{width:"100%",padding:"12px",borderRadius:14,border:`2px dashed ${t.border}`,background:"transparent",color:t.textMuted,fontSize:14,fontWeight:700,cursor:"pointer",marginBottom:12}}>+ Nytt legenotat</button>
              )}
              {helse.notater.filter(n=>n.arkivert).length>0&&(
                <div style={{marginTop:8}}>
