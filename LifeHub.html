                  {helse.notater.filter(n=>n.arkivert).map(notat=>(
                    <div key={notat.id} style={{background:t.surface,border:`1px solid ${t.border}`,borderRadius:12,padding:"10px 14px",marginBottom:8,opacity:0.5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

// ── Hemmelig: PIN hash helper ──────────────────────────────────────────────────
async function hashPin(pin) {
  const enc = new TextEncoder().encode("lifehub:" + pin);
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

// ── Hemmelig: PIN Modal ────────────────────────────────────────────────────────
function PinModal({ t, mode, onSuccess, onCancel }) {
  // mode: "setup" | "enter" | "change"
  const [step, setStep] = useState(mode === "setup" ? "set" : mode === "change" ? "verify" : "enter");
  // step: "enter" | "set" | "confirm" | "verify" (for change: verify old first)
  const [digits, setDigits] = useState([]);
  const [error, setError] = useState("");
  const [attempts, setAttempts] = useState(0);
  const [lockUntil, setLockUntil] = useState(null);
  const [firstPin, setFirstPin] = useState(null); // for confirm step
  const [shake, setShake] = useState(false);
  const isDark = t.bg === "#0d1117";

  useEffect(() => {
    try {
      const lu = localStorage.getItem("hemmelig:lockUntil");
      if (lu) setLockUntil(parseInt(lu));
      const att = localStorage.getItem("hemmelig:attempts");
      if (att) setAttempts(parseInt(att));
    } catch(_) {}
  }, []);

  const isLocked = lockUntil && Date.now() < lockUntil;
  const lockSecsLeft = isLocked ? Math.ceil((lockUntil - Date.now()) / 1000) : 0;

  const titleMap = {
    enter: "Skriv inn PIN",
    set: mode === "change" ? "Ny PIN" : "Sett PIN",
    confirm: "Bekreft PIN",
    verify: "Nåværende PIN",
  };
  const subtitleMap = {
    enter: "6-sifret kode",
    set: "Velg en 6-sifret kode",
    confirm: "Gjenta koden",
    verify: "Skriv inn nåværende PIN for å endre",
  };

  function triggerShake() {
    setShake(true);
    setTimeout(() => setShake(false), 500);
  }

  async function handleDigit(d) {
    if (isLocked) return;
    const next = [...digits, d];
    setDigits(next);
    setError("");
    if (next.length < 6) return;

    // Full PIN entered
    const pinStr = next.join("");

    if (step === "set") {
      setFirstPin(pinStr);
      setDigits([]);
      setStep("confirm");
      return;
    }

    if (step === "confirm") {
      if (pinStr !== firstPin) {
        triggerShake();
        setError("Kodene stemmer ikke — prøv igjen");
        setDigits([]);
        setStep("set");
        setFirstPin(null);
        return;
      }
      const hash = await hashPin(pinStr);
      try { localStorage.setItem("hemmelig:pin", hash); } catch(_) {}
      try { localStorage.removeItem("hemmelig:attempts"); localStorage.removeItem("hemmelig:lockUntil"); } catch(_) {}
      onSuccess();
      return;
    }

    if (step === "enter" || step === "verify") {
      const storedHash = localStorage.getItem("hemmelig:pin");
      const hash = await hashPin(pinStr);
      if (hash === storedHash) {
        try { localStorage.removeItem("hemmelig:attempts"); localStorage.removeItem("hemmelig:lockUntil"); } catch(_) {}
        if (step === "verify") {
          // Change flow: now set new PIN
          setDigits([]);
          setStep("set");
        } else {
          onSuccess();
        }
      } else {
        triggerShake();
        const newAttempts = attempts + 1;
        setAttempts(newAttempts);
        try { localStorage.setItem("hemmelig:attempts", String(newAttempts)); } catch(_) {}
        if (newAttempts >= 5) {
          const until = Date.now() + 30000;
          setLockUntil(until);
          try { localStorage.setItem("hemmelig:lockUntil", String(until)); } catch(_) {}
          setError("For mange forsøk — vent 30 sekunder");
        } else {
          setError(`Feil PIN (${5 - newAttempts} forsøk igjen)`);
        }
        setDigits([]);
      }
    }
  }

  function handleDelete() {
    setDigits(d => d.slice(0, -1));
    setError("");
  }

  const keys = [1,2,3,4,5,6,7,8,9,null,0,"del"];
  const btnStyle = (k) => ({
    width: 72, height: 72, borderRadius: 36, border: `1px solid ${t.border}`,
    background: k === null ? "transparent" : k === "del" ? "transparent" : t.surface2,
    color: k === "del" ? t.textMuted : t.text,
    fontSize: k === "del" ? 20 : 22, fontWeight: 600, cursor: k === null ? "default" : "pointer",
    display: "flex", alignItems: "center", justifyContent: "center",
    visibility: k === null ? "hidden" : "visible",
    transition: "background 0.1s",
  });

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 500, display: "flex", alignItems: "center", justifyContent: "center" }}
      onClick={onCancel}>
      <div onClick={e => e.stopPropagation()}
        style={{
          background: t.surface, borderRadius: 28, padding: "36px 32px 28px",
          width: "100%", maxWidth: 320, display: "flex", flexDirection: "column", alignItems: "center", gap: 24,
          border: `1px solid ${t.purpleBorder}`,
          animation: shake ? "pinShake 0.5s ease" : "none",
        }}>
        <style>{`
          @keyframes pinShake {
            0%,100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-6px); }
            80% { transform: translateX(6px); }
          }
        `}</style>
        {/* Icon + title */}
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🔒</div>
          <div style={{ fontSize: 18, fontWeight: 800, color: t.purple, marginBottom: 4 }}>{titleMap[step]}</div>
          <div style={{ fontSize: 13, color: t.textMuted }}>{subtitleMap[step]}</div>
        </div>

        {/* Dots */}
        <div style={{ display: "flex", gap: 14 }}>
          {Array.from({ length: 6 }).map((_, i) => (
            <div key={i} style={{
              width: 14, height: 14, borderRadius: 7,
              background: i < digits.length ? t.purple : "transparent",
              border: `2px solid ${i < digits.length ? t.purple : t.border}`,
              transition: "background 0.15s, border-color 0.15s",
            }} />
          ))}
        </div>

        {/* Error */}
        {error && <div style={{ fontSize: 13, color: "#ef4444", fontWeight: 600, textAlign: "center" }}>{error}</div>}
        {isLocked && <div style={{ fontSize: 13, color: "#ef4444", fontWeight: 600 }}>Låst — vent {lockSecsLeft}s</div>}

        {/* Keypad */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 72px)", gap: 14 }}>
          {keys.map((k, i) => (
            <button key={i} style={btnStyle(k)}
              onClick={() => {
                if (k === null) return;
                if (k === "del") handleDelete();
                else handleDigit(k);
              }}
              disabled={isLocked || k === null}>
              {k === "del" ? "⌫" : k === null ? "" : k}
            </button>
          ))}
        </div>

        {/* Cancel */}
        {onCancel && (
          <button onClick={onCancel} style={{ background: "transparent", border: "none", color: t.textMuted, fontSize: 14, cursor: "pointer", marginTop: -8 }}>
            Avbryt
          </button>
        )}
      </div>
    </div>
  );
}

function OrgRatingStars({ value, max, onChange, color, t }) {
  return (
    <div style={{ display: "flex", gap: 6 }}>
      {Array.from({ length: max }).map((_, i) => (
        <button key={i} onClick={() => onChange(i+1)}
          style={{ background: "none", border: "none", cursor: "pointer", fontSize: 22, padding: 2,
            color: i < value ? (color || "#f472b6") : t.textFaint }}>
          {i < value ? "★" : "☆"}
        </button>
      ))}
    </div>
  );
}

function OrgCheckList({ items, selected, onChange, color, t }) {
  function toggle(item) {
    if (selected.includes(item)) onChange(selected.filter(x => x !== item));
    else onChange([...selected, item]);
  }
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
      {items.map(item => {
        const on = selected.includes(item);
        return (
          <button key={item} onClick={() => toggle(item)}
            style={{ padding: "6px 13px", borderRadius: 20,
              border: `1px solid ${on ? (color||"#c084fc") : t.border}`,
              background: on ? (color||"#c084fc") + "30" : "transparent",
              color: on ? (color||"#c084fc") : t.textMuted,
              fontSize: 13, cursor: "pointer", fontWeight: on ? 700 : 400 }}>
            {item}
          </button>
        );
      })}
    </div>
  );
}

function OrgPartnerSelector({ partnere, onChange, t }) {
  const [annenNavn, setAnnenNavn] = useState("");
  const types = partnere.map(p => p.type);
  const andrePartnere = partnere.filter(p => p.type === "annen");

  function toggleType(type) {
    if (type === "meg") {
      if (types.includes("meg")) onChange(partnere.filter(p => p.type !== "meg"));
      else onChange([{ type: "meg", navn: "Meg selv" }, ...partnere]);
    } else if (type === "tore") {
      if (types.includes("tore")) onChange(partnere.filter(p => p.type !== "tore"));
      else onChange([...partnere, { type: "tore", navn: "Tore" }]);
    }
  }

  function addAnnen() {
    if (!annenNavn.trim()) return;
    onChange([...partnere, { type: "annen", navn: annenNavn.trim(), id: "a" + Date.now() }]);
    setAnnenNavn("");
  }

  function removeAnnen(id) {
    onChange(partnere.filter(p => p.id !== id));
  }

  const btnSt = (active) => ({
    padding: "8px 18px", borderRadius: 20,
    border: `1px solid ${active ? "#c084fc" : t.border}`,
    background: active ? "#c084fc30" : "transparent",
    color: active ? "#c084fc" : t.textMuted,
    fontSize: 14, cursor: "pointer", fontWeight: active ? 700 : 400,
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
        <button onClick={() => toggleType("meg")} style={btnSt(types.includes("meg"))}>🖐 Meg selv</button>
        <button onClick={() => toggleType("tore")} style={btnSt(types.includes("tore"))}>👨 Tore</button>
      </div>
      {andrePartnere.map(p => (
        <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 13, color: "#c084fc", fontWeight: 600 }}>👤 {p.navn}</span>
          <button onClick={() => removeAnnen(p.id)} style={{ background: "none", border: "none", color: t.textMuted, cursor: "pointer", fontSize: 16 }}>✕</button>
        </div>
      ))}
      <div style={{ display: "flex", gap: 8 }}>
        <input value={annenNavn} onChange={e => setAnnenNavn(e.target.value)}
          onKeyDown={e => e.key === "Enter" && addAnnen()}
          placeholder="Legg til navn..."
          style={{ flex: 1, background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.text, fontSize: 14 }} />
        <button onClick={addAnnen}
          style={{ padding: "8px 14px", borderRadius: 10, border: "1px solid #c084fc", background: "#c084fc20", color: "#c084fc", fontSize: 13, cursor: "pointer" }}>
          + Legg til
        </button>
      </div>
    </div>
  );
}

// Settings modal
function OrgSettingsModal({ settings, onSave, onClose, t }) {
  const [s, setS] = useState({ ...settings });
  const [activeTab, setActiveTab] = useState("aktiviteter");

  const listKeys = {
    aktiviteter: "Aktiviteter",
    sexleker: "Sexleker",
    komSteder: "Steder å komme",
    steder: "Hvor",
    kåtArsaker: "Hva gjør meg kåt",
    bonerHva: "Hva jeg gjør med boneren",
    bonerHvorfor: "Hvorfor ikke mer",
    smakListe: "Smak",
  };

  function addItem(key, val) {
    if (!val.trim()) return;
    setS(prev => ({ ...prev, [key]: [...prev[key], val.trim()] }));
  }
  function removeItem(key, idx) {
    setS(prev => ({ ...prev, [key]: prev[key].filter((_, i) => i !== idx) }));
  }
  function reorderItem(key, newArr) {
    setS(prev => ({ ...prev, [key]: newArr }));
  }

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 400, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
      onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
        style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, maxHeight: "88vh", display: "flex", flexDirection: "column", border: `1px solid ${t.border}` }}>
        <div style={{ padding: "20px 20px 12px", flexShrink: 0, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <span style={{ fontWeight: 800, fontSize: 17, color: t.text }}>⚙️ Innstillinger</span>
          <div style={{ display: "flex", gap: 10 }}>
            <button onClick={() => { orgSaveSettings(s); onSave(s); onClose(); }}
              style={{ background: "#c084fc30", border: "1px solid #c084fc", borderRadius: 10, padding: "8px 16px", color: "#c084fc", fontWeight: 700, cursor: "pointer", fontSize: 13 }}>
              Lagre
            </button>
            <button onClick={onClose} style={{ background: "transparent", border: "none", color: t.textMuted, fontSize: 20, cursor: "pointer" }}>✕</button>
          </div>
        </div>
        <div style={{ display: "flex", gap: 6, padding: "0 20px 12px", overflowX: "auto", flexShrink: 0 }}>
          {Object.entries(listKeys).map(([key, label]) => (
            <button key={key} onClick={() => setActiveTab(key)}
              style={{ padding: "7px 14px", borderRadius: 20,
                border: `1px solid ${activeTab===key ? "#c084fc" : t.border}`,
                background: activeTab===key ? "#c084fc30" : "transparent",
                color: activeTab===key ? "#c084fc" : t.textMuted,
                fontSize: 12, fontWeight: 700, cursor: "pointer", whiteSpace: "nowrap" }}>
              {label}
            </button>
          ))}
        </div>
        <div style={{ flex: 1, overflowY: "auto", padding: "0 20px 40px" }}>
          <OrgListEditor items={s[activeTab]} listKey={activeTab}
            onAdd={val => addItem(activeTab, val)}
            onRemove={idx => removeItem(activeTab, idx)}
            onReorder={newArr => reorderItem(activeTab, newArr)} t={t} />
        </div>
      </div>
    </div>
  );
}

    try { const r = localStorage.getItem("hemmelig:favorittvideoer"); if (r) setVideoer(JSON.parse(r)); } catch(_) {}

  const valgtVideo = videoer.find(v => v.id === videoId) || null;

  function velgVideo(v) {

function OrgKalender({ logg, onSelectEntry, calMonth, calYear, setCalMonth, setCalYear, t }) {
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const firstDay = (new Date(calYear, calMonth, 1).getDay() + 6) % 7;
  const pad = n => String(n).padStart(2,"0");
  const MONTHS = ["Januar","Februar","Mars","April","Mai","Juni","Juli","August","September","Oktober","November","Desember"];
  const DAYS = ["Ma","Ti","On","To","Fr","Lø","Sø"];

  function loggForDay(day) {
    const key = `${calYear}-${pad(calMonth+1)}-${pad(day)}`;
    return logg.filter(e => e.dato === key);
  }

  function dayEmojis(entries) {
    const harOrgasme = entries.some(e => e.type !== "boner" && e.mineOrgasmer?.length > 0);
    const harBoner = entries.some(e => e.type === "boner");
    const harSexUtenOrgasme = entries.some(e => e.type !== "boner" && (e.mineOrgasmer||[]).length === 0 && (e.partnere||[]).some(p => p.type !== "meg"));
    const emojis = [];
    if (harOrgasme) emojis.push("💦");
    if (harBoner) emojis.push("🍆");
    if (harSexUtenOrgasme && !harOrgasme) emojis.push("🍑");
    return emojis;
  }

  return (
    <div style={{ padding: "0 16px" }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
        <button onClick={() => { let m=calMonth-1,y=calYear; if(m<0){m=11;y--;} setCalMonth(m); setCalYear(y); }}
          style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "7px 14px", color: t.textMuted, fontSize: 15, cursor: "pointer" }}>‹</button>
        <span style={{ fontWeight: 800, fontSize: 16, color: t.text }}>{MONTHS[calMonth]} {calYear}</span>
        <button onClick={() => { let m=calMonth+1,y=calYear; if(m>11){m=0;y++;} setCalMonth(m); setCalYear(y); }}
          style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "7px 14px", color: t.textMuted, fontSize: 15, cursor: "pointer" }}>›</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3, marginBottom: 4 }}>
        {DAYS.map(d => <div key={d} style={{ textAlign: "center", fontSize: 11, color: t.textFaint, fontWeight: 700, padding: "4px 0" }}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", gap: 3, marginBottom: 20 }}>
        {Array.from({ length: firstDay }).map((_,i) => <div key={"e"+i} />)}
        {Array.from({ length: daysInMonth }).map((_,i) => {
          const day = i+1;
          const entries = loggForDay(day);
          const hasEntry = entries.length > 0;
          const emojis = dayEmojis(entries);
          const today = new Date();
          const isToday = today.getDate()===day && today.getMonth()===calMonth && today.getFullYear()===calYear;
          return (
            <button key={day} onClick={() => hasEntry && onSelectEntry(entries[0])}
              style={{ aspectRatio: "1", borderRadius: 8,
                border: `1px solid ${isToday ? "#c084fc" : hasEntry ? "#f472b640" : t.border}`,
                background: emojis.includes("💦") ? "#f472b615" : hasEntry ? "#c084fc10" : "transparent",
                cursor: hasEntry ? "pointer" : "default",
                display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 1 }}>
              <span style={{ fontSize: 11, color: isToday ? "#c084fc" : hasEntry ? t.text : t.textFaint, fontWeight: isToday ? 800 : 400 }}>{day}</span>
              {emojis.length > 0 && <span style={{ fontSize: 9, lineHeight: 1 }}>{emojis.join("")}</span>}
            </button>
          );
        })}
      </div>
    </div>
  );
}

// ── Statistikk ─────────────────────────────────────────────────────────────────
function OrgStatistikk({ logg, t }) {
  const [period, setPeriod] = useState("maaned");
  const now = new Date();

  const filtered = logg.filter(e => {
    const d = new Date(e.dato);
    if (period === "maaned") return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear();
    if (period === "aar") return d.getFullYear()===now.getFullYear();
    return true;
  });

  const orgasmeLogg = filtered.filter(e => e.type !== "boner");
  const bonerLogg = filtered.filter(e => e.type === "boner");

  const totalt = orgasmeLogg.length;
  const mineOrgasmer = orgasmeLogg.reduce((sum, e) => sum + (e.mineOrgasmer?.length||0), 0);
  const alene = orgasmeLogg.filter(e => e.partnere?.length===1 && e.partnere[0]?.type==="meg").length;
  const medPartner = orgasmeLogg.filter(e => e.partnere?.some(p => p.type!=="meg")).length;
  const snittRating = totalt ? (orgasmeLogg.reduce((s,e) => s+(e.helhetsrating||0),0)/totalt).toFixed(1) : "–";

  // Sted-frekvens — delt på boner og orgasme
  const bonerStedFreq = {};
  bonerLogg.forEach(e => (e.steder||[]).forEach(s => { bonerStedFreq[s] = (bonerStedFreq[s]||0)+1; }));
  const topBonerSted = Object.entries(bonerStedFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const orgasmeStedFreq = {};
  orgasmeLogg.forEach(e => (e.steder||[]).forEach(s => { orgasmeStedFreq[s] = (orgasmeStedFreq[s]||0)+1; }));
  const topOrgasmeSted = Object.entries(orgasmeStedFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Sted hvor jeg oftest kommer
  const komSted = {};
  orgasmeLogg.flatMap(e => e.mineOrgasmer||[]).flatMap(o => o.komSteder||[]).forEach(s => { komSted[s] = (komSted[s]||0)+1; });
  const topKomSted = Object.entries(komSted).sort((a,b)=>b[1]-a[1]).slice(0,3);

  // Kåt-årsaker — delt på boner og orgasme
  const bonerKåtFreq = {};
  bonerLogg.forEach(e => (e.kåtArsaker||[]).forEach(k => { bonerKåtFreq[k] = (bonerKåtFreq[k]||0)+1; }));
  const topBonerKåt = Object.entries(bonerKåtFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  const orgasmeKåtFreq = {};
  orgasmeLogg.forEach(e => (e.kåtArsaker||[]).forEach(k => { orgasmeKåtFreq[k] = (orgasmeKåtFreq[k]||0)+1; }));
  const topOrgasmeKåt = Object.entries(orgasmeKåtFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Aktiviteter
  const aktFreq = {};
  orgasmeLogg.flatMap(e => e.aktiviteter||[]).forEach(a => { aktFreq[a] = (aktFreq[a]||0)+1; });
  const topAkt = Object.entries(aktFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Streak (mine orgasmer)
  const mineDatoer = [...new Set(logg.filter(e => e.mineOrgasmer?.length>0).map(e => e.dato))].sort();
  let streak = 0;
  if (mineDatoer.length > 0) {
    const lastDate = new Date(mineDatoer[mineDatoer.length-1]);
    const diffDays = Math.floor((now - lastDate)/(1000*60*60*24));
    if (diffDays <= 1) {
      streak = 1;
      for (let i = mineDatoer.length-2; i >= 0; i--) {
        const diff = Math.floor((new Date(mineDatoer[i+1]) - new Date(mineDatoer[i]))/(1000*60*60*24));
        if (diff === 1) streak++; else break;
      }
    }
  }

  const siste = mineDatoer.length > 0 ? mineDatoer[mineDatoer.length-1] : null;
  const dagerSiden = siste ? Math.floor((now - new Date(siste))/(1000*60*60*24)) : null;
  const humørEtterSnitt = totalt ? (orgasmeLogg.reduce((s,e) => s+(e.humørEtter||0),0)/totalt).toFixed(1) : "–";
  const lystEtterSnitt = totalt ? (orgasmeLogg.reduce((s,e) => s+(e.lystEtter||0),0)/totalt).toFixed(1) : "–";

  const periodLabels = { maaned: "Denne måneden", aar: "Dette året", alt: "Totalt" };

  const statBox = (label, value, sub) => (
    <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", flex: 1, minWidth: 90 }}>
      <div style={{ fontSize: 22, fontWeight: 800, color: "#c084fc" }}>{value}</div>
      <div style={{ fontSize: 12, color: t.text, fontWeight: 600, marginTop: 2 }}>{label}</div>
      {sub && <div style={{ fontSize: 11, color: t.textFaint, marginTop: 2 }}>{sub}</div>}
    </div>
  );

  const miniList = (title, items, color) => items.length === 0 ? null : (
    <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 12 }}>
      <div style={{ fontSize: 13, color: t.textMuted, marginBottom: 10, fontWeight: 600 }}>{title}</div>
      {items.map(([name, count]) => (
        <div key={name} style={{ display: "flex", justifyContent: "space-between", padding: "5px 0", borderBottom: `1px solid ${t.border}` }}>
          <span style={{ fontSize: 13, color: t.text }}>{name}</span>
          <span style={{ fontSize: 13, color: color||"#c084fc", fontWeight: 700 }}>{count}x</span>
        </div>
      ))}
    </div>
  );

  return (
    <div style={{ padding: "0 16px 40px" }}>
      <div style={{ display: "flex", gap: 8, marginBottom: 18, flexWrap: "wrap" }}>
        {Object.entries(periodLabels).map(([k,v]) => (
          <button key={k} onClick={() => setPeriod(k)}
            style={{ padding: "7px 13px", borderRadius: 20,
              border: `1px solid ${period===k ? "#c084fc" : t.border}`,
              background: period===k ? "#c084fc20" : "transparent",
              color: period===k ? "#c084fc" : t.textMuted,
              fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            {v}
          </button>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
        {statBox("Økter", totalt)}
        {statBox("Mine org.", mineOrgasmer)}
        {statBox("Bonere", bonerLogg.length)}
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 12 }}>
        {statBox("Alene", alene)}
        {statBox("Med partner", medPartner)}
        {statBox("Snittrating", snittRating, "av 10")}
      </div>
      <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 18 }}>
        {statBox("Humør etter", humørEtterSnitt, "snitt 1–5")}
        {statBox("Lyst etter", lystEtterSnitt, "snitt 1–5")}
        {dagerSiden !== null && statBox("Dager siden", dagerSiden, "siste org.")}
      </div>
      {streak > 0 && (
        <div style={{ background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 12 }}>
          <div style={{ fontSize: 20, fontWeight: 800, color: "#f472b6" }}>{streak} {streak===1?"dag":"dager"} på rad 🔥</div>
        </div>
      )}
      {miniList("🍆 Hvor fikk jeg oftest boner", topBonerSted, "#c084fc")}
      {miniList("🔥 Hva ga meg oftest boner", topBonerKåt, "#c084fc")}
      {miniList("📍 Hvor har jeg fått flest orgasmer", topOrgasmeSted, "#f472b6")}
      {miniList("💦 Hva gjorde meg kåt før orgasme", topOrgasmeKåt, "#f472b6")}
      {miniList("🍑 Hvor jeg oftest kommer", topKomSted, "#f472b6")}
      {miniList("🎯 Mest gjorte aktiviteter", topAkt, "#c084fc")}
    </div>
  );
}

function OrgVideoKort({ videoId, videoUrl, t }) {
  const [video, setVideo] = useState(null);
  const [showEditModal, setShowEditModal] = useState(false);
  const scaleColors = ["","#ef4444","#f97316","#eab308","#22c55e","#c084fc"];

  useEffect(() => {
    try {
      const videoer = JSON.parse(localStorage.getItem("hemmelig:favorittvideoer") || "[]");
      if (videoId) {
        setVideo(videoer.find(v => v.id === videoId) || null);
      } else if (videoUrl) {
        setVideo(videoer.find(v => v.url === videoUrl) || { url: videoUrl, beskrivelse: null, _ny: true });
      }
    } catch(_) {}
  }, [videoId, videoUrl]);

  if (!video && !videoUrl) return null;

  const url = video?.url || videoUrl;
  const domain = url ? (() => { try { return new URL(url).hostname.replace(/^www\./,""); } catch(_) { return url; } })() : "";
  const snitt = video && video.helhet ? ((video.helhet + video.intensitet + video.tenner) / 3) : null;
  const snittFarge = snitt >= 4.5 ? "#c084fc" : snitt >= 3.5 ? "#22c55e" : snitt >= 2.5 ? "#eab308" : "#f97316";
  const erFavoritt = (video?.kategorier || []).includes("Favoritt");

  function handleSaveEdit(oppdatert) {
    try {
      const videoer = JSON.parse(localStorage.getItem("hemmelig:favorittvideoer") || "[]");
      const finnes = videoer.find(v => v.id === oppdatert.id);
      const updated = finnes
        ? videoer.map(v => v.id === oppdatert.id ? oppdatert : v)
        : [oppdatert, ...videoer];
      localStorage.setItem("hemmelig:favorittvideoer", JSON.stringify(updated));
      setVideo(oppdatert);
    } catch(_) {}
    setShowEditModal(false);
  }

  const fvSettings = (() => { try { const r = localStorage.getItem("hemmelig:favorittvideoer:settings"); return r ? JSON.parse(r) : null; } catch(_) { return null; } })();
  const kategoriGrupper = fvSettings?.kategorier || [];

  return (
    <>
      <div style={{ background: t.surface, border: `2px solid ${erFavoritt ? "#f59e0b" : t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 14 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10, marginBottom: 8 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 11, color: t.textFaint, marginBottom: 4, textTransform: "uppercase", letterSpacing: 0.5 }}>🎬 Video jeg kom til</div>
            {video?.beskrivelse ? (
              <div style={{ fontSize: 14, fontWeight: 700, color: t.text, lineHeight: 1.5 }}>
                {erFavoritt && <span style={{ color: "#f59e0b", marginRight: 5 }}>★</span>}
                {video.beskrivelse}
              </div>
            ) : (
              <div style={{ fontSize: 13, color: t.textMuted, fontStyle: "italic" }}>Ingen beskrivelse ennå</div>
            )}
          </div>
          <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
            {(video?._ny || !videoId) && (
              <button onClick={() => setShowEditModal(true)}
                style={{ padding: "5px 10px", borderRadius: 8, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontSize: 12, cursor: "pointer" }}>✏️ Rediger</button>
            )}
            {url && (
              <button onClick={() => window.open(url, "_blank", "noopener,noreferrer")}
                style={{ padding: "5px 12px", borderRadius: 8, border: "none", background: t.pink, color: "#fff", fontSize: 12, fontWeight: 700, cursor: "pointer" }}>▶ Åpne</button>
            )}
          </div>
        </div>

        {video?.kategorier?.length > 0 && (
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8 }}>
            {video.kategorier.map(k => (
              <span key={k} style={{ fontSize: 11, color: k === "Favoritt" ? "#f59e0b" : t.pink, background: k === "Favoritt" ? "#f59e0b22" : t.pinkDim, padding: "2px 8px", borderRadius: 20 }}>
                {k === "Favoritt" ? "★ Favoritt" : k}
              </span>
            ))}
          </div>
        )}

        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          {domain && <span style={{ fontSize: 12, color: t.textFaint }}>🔗 {domain}</span>}
          {video?.helhet && <>
            <span style={{ fontSize: 12, color: scaleColors[video.helhet], fontWeight: 700 }}>⭐ {video.helhet}</span>
            <span style={{ fontSize: 12, color: scaleColors[video.intensitet] }}>🔥 {video.intensitet}</span>
            <span style={{ fontSize: 12, color: scaleColors[video.tenner] }}>💜 {video.tenner}</span>
          </>}
          {snitt && (
            <span style={{ fontSize: 12, fontWeight: 700, color: snittFarge, background: snittFarge + "22", padding: "2px 8px", borderRadius: 20 }}>{snitt.toFixed(1)}</span>
          )}
          {video?.komTil > 0 && (
            <span style={{ fontSize: 12, color: "#a855f7", fontWeight: 700 }}>💦 Kom {video.komTil}× til denne</span>
          )}
        </div>
      </div>

      {showEditModal && (
        <FvModal
          entry={video?._ny ? null : video}
          onSave={handleSaveEdit}
          onClose={() => setShowEditModal(false)}
          t={t}
          kategorier={kategoriGrupper}
        />
      )}
    </>
  );
}

// ── Hoved-app ──────────────────────────────────────────────────────────────────
function OrgasmekalenderApp({ t, onBack }) {
  const [loaded, setLoaded] = useState(false);
  const [logg, setLogg] = useState([]);
  const [settings, setSettings] = useState(ORG_DEFAULT_SETTINGS);
  const [tab, setTab] = useState("hjem");
  const [showForm, setShowForm] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [viewEntry, setViewEntry] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [calMonth, setCalMonth] = useState(new Date().getMonth());
  const [calYear, setCalYear] = useState(new Date().getFullYear());

  useEffect(() => {
    setLogg(orgLoadLogg());
    setSettings(orgLoadSettings());
    setLoaded(true);
  }, []);

  function saveLogg(updated) { setLogg(updated); orgSaveLogg(updated); }

  function handleSave(entry) {
    const existing = logg.find(e => e.id === entry.id);
    if (existing) saveLogg(logg.map(e => e.id===entry.id ? entry : e));
    else saveLogg([entry, ...logg]);

    // Oppdater videolista hvis video er valgt
    if (entry.videoId || entry.videoUrl) {
      try {
        const videoer = JSON.parse(localStorage.getItem("hemmelig:favorittvideoer") || "[]");
        const alleLogg = existing
          ? logg.map(e => e.id===entry.id ? entry : e)
          : [entry, ...logg];

        if (entry.videoId) {
          // Tell opp antall ganger fra loggen
          const antall = alleLogg.filter(e => e.videoId === entry.videoId).length;
          const oppdatert = videoer.map(v => {
            if (v.id !== entry.videoId) return v;
            const kats = [...new Set([...(v.kategorier||[]), "Disse kom jeg til"])];
            return { ...v, kategorier: kats, komTil: antall };
          });
          localStorage.setItem("hemmelig:favorittvideoer", JSON.stringify(oppdatert));
        } else if (entry.videoUrl && !existing) {
          // Ny URL — legg til som ny video med kategori
          const nyVideo = {
            id: "fv" + Date.now(),
            url: entry.videoUrl,
            beskrivelse: "Video fra " + entry.dato,
            kategorier: ["Disse kom jeg til"],
            helhet: 3, intensitet: 3, tenner: 3,
            komTil: 1,
            createdAt: Date.now(),
          };
          localStorage.setItem("hemmelig:favorittvideoer", JSON.stringify([nyVideo, ...videoer]));
        }
      } catch(_) {}
    }

    setShowForm(false); setEditEntry(null);
  }

  function handleDelete(id) {
    if (!confirm("Slette denne loggen?")) return;
    saveLogg(logg.filter(e => e.id !== id));
    setViewEntry(null);
  }

  const mineDatoer = logg.filter(e => e.mineOrgasmer?.length>0).map(e => e.dato).sort();
  const sisteMin = mineDatoer.length > 0 ? mineDatoer[mineDatoer.length-1] : null;
  const dagerSidenMeg = sisteMin ? Math.floor((new Date() - new Date(sisteMin))/(1000*60*60*24)) : null;

  const sorted = [...logg].sort((a,b) => (b.dato+b.tid).localeCompare(a.dato+a.tid));

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;

  if (showForm || editEntry) {
    const entry = editEntry || orgBlankEntry(settings, "orgasme");
    return <OrgLoggForm entry={entry} settings={settings} onSave={handleSave} onCancel={() => { setShowForm(false); setEditEntry(null); }} t={t} />;
  }

  if (viewEntry) {
    return <OrgLoggDetalj entry={viewEntry} settings={settings} partnere={[]}
      onBack={() => setViewEntry(null)}
      onEdit={e => { setViewEntry(null); setEditEntry(e); }}
      onDelete={id => handleDelete(id)} t={t} />;
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontWeight: 800, fontSize: 18, color: "#c084fc" }}>📅 Orgasmekalender</span>
        <button onClick={() => setShowSettings(true)} style={{ background: "transparent", border: "none", color: t.textMuted, fontSize: 20, cursor: "pointer" }}>⚙️</button>
      </div>

      <div style={{ display: "flex", gap: 8, padding: "14px 20px 0" }}>
        {[["hjem","🏠 Hjem"],["statistikk","📊 Statistikk"]].map(([id,lbl]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ padding: "8px 18px", borderRadius: 20,
              border: `1px solid ${tab===id ? "#c084fc" : t.border}`,
              background: tab===id ? "#c084fc20" : "transparent",
              color: tab===id ? "#c084fc" : t.textMuted,
              fontSize: 13, fontWeight: 700, cursor: "pointer" }}>
            {lbl}
          </button>
        ))}
      </div>

      {tab === "hjem" && (
        <div style={{ paddingTop: 16 }}>
          <div style={{ padding: "0 16px 16px", display: "flex", gap: 12, alignItems: "stretch" }}>
            <button onClick={() => setShowForm(true)}
              style={{ flex: 2, padding: "16px 20px", borderRadius: 16, border: "1px solid #f472b660", background: "#f472b615", color: "#f472b6", fontSize: 15, fontWeight: 800, cursor: "pointer" }}>
              + Ny logg
            </button>
            <div style={{ flex: 1, background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, padding: "14px 10px", textAlign: "center" }}>
              <div style={{ fontSize: 22, fontWeight: 900, color: "#c084fc" }}>
                {dagerSidenMeg !== null ? dagerSidenMeg : "–"}
              </div>
              <div style={{ fontSize: 11, color: t.textMuted, lineHeight: 1.3 }}>dager siden siste orgasme</div>
            </div>
          </div>

          <OrgKalender logg={logg} onSelectEntry={setViewEntry} calMonth={calMonth} calYear={calYear} setCalMonth={setCalMonth} setCalYear={setCalYear} t={t} />

          <div style={{ padding: "0 16px" }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, letterSpacing: 1, textTransform: "uppercase", marginBottom: 10 }}>Siste oppføringer</div>
            {sorted.length === 0 && (
              <div style={{ color: t.textFaint, fontSize: 14, textAlign: "center", padding: "30px 0" }}>Ingen logg ennå — trykk «+ Ny logg»</div>
            )}
            {sorted.slice(0, 10).map(entry => {
              const isBoner = entry.type === "boner";
              const iKom = !isBoner && (entry.mineOrgasmer?.length||0) > 0;
              return (
                <button key={entry.id} onClick={() => setViewEntry(entry)}
                  style={{ width: "100%", background: t.surface, border: `1px solid ${iKom ? "#f472b630" : isBoner ? "#c084fc30" : t.border}`, borderRadius: 14, padding: "14px 16px", marginBottom: 10, textAlign: "left", cursor: "pointer" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontWeight: 700, fontSize: 14, color: t.text, marginBottom: 3 }}>
                        {isBoner ? "🍆" : iKom ? "💦" : "🍑"}{" "}
                        {new Date(entry.dato).toLocaleDateString("nb-NO", { weekday: "short", day: "numeric", month: "short" })}
                        {entry.tid && <span style={{ fontSize: 12, color: t.textFaint, marginLeft: 8 }}>{entry.tid}</span>}
                      </div>
                      {(entry.steder||[]).length > 0 && <div style={{ fontSize: 12, color: t.textMuted }}>📍 {entry.steder.join(", ")}</div>}
                      {!isBoner && (entry.aktiviteter||[]).length>0 && (
                        <div style={{ fontSize: 11, color: t.textFaint, marginTop: 3 }}>{entry.aktiviteter.slice(0,3).join(" · ")}</div>
                      )}
                      {isBoner && (entry.kåtArsaker||[]).length>0 && (
                        <div style={{ fontSize: 11, color: t.textFaint, marginTop: 3 }}>{entry.kåtArsaker.slice(0,2).join(" · ")}</div>
                      )}
                    </div>
                    <div style={{ textAlign: "right" }}>
                      {!isBoner && <div style={{ fontSize: 16, fontWeight: 800, color: "#f472b6" }}>{entry.helhetsrating}/10</div>}
                      {isBoner && <div style={{ fontSize: 13, color: "#c084fc", fontWeight: 700 }}>Boner</div>}
                      {iKom && <div style={{ fontSize: 11, color: "#f472b6", marginTop: 2 }}>🔥 {entry.mineOrgasmer.length}</div>}
                    </div>
                  </div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {tab === "statistikk" && <OrgStatistikk logg={logg} t={t} />}

      {showSettings && (
        <OrgSettingsModal settings={settings} onSave={setSettings} onClose={() => setShowSettings(false)} t={t} />
      )}
    </div>
  );
}


// ── Hemmelig: Body count-liste ─────────────────────────────────────────────────
// Storage: hemmelig:bodycount

function bcLoad() {
  try { const r = localStorage.getItem("hemmelig:bodycount"); return r ? JSON.parse(r) : []; } catch(_) { return []; }
}
function bcSave(data) {
  try { localStorage.setItem("hemmelig:bodycount", JSON.stringify(data)); } catch(_) {}
}

function bcNextNr(liste) {
  if (liste.length === 0) return 1;
  const max = Math.max(...liste.map(p => p.nr || 0));
  return max + 1;
}

function bcBlank(liste) {
  return {
    id: "bc" + Date.now(),
    nr: bcNextNr(liste),
    navn: "",
    dato: "",
    sted: [],
    aktiviteter: [],
    seksRating: 3,
    fysiskRating: 3,
    psykiskRating: 3,
    kjemiRating: 3,
    igjen: false,
    igjenAntall: "",
    igjenMerknad: "",
    kommentar: "",
  };
}

function BcRatingRow({ label, value, onChange, t }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 12, color: t.textMuted, marginBottom: 6, fontWeight: 600 }}>{label}</div>
      <div style={{ display: "flex", gap: 8 }}>
        {[1,2,3,4,5].map(n => (
          <button key={n} onClick={() => onChange(n)}
            style={{ flex: 1, height: 36, borderRadius: 10,
              border: `1px solid ${n <= value ? "#f472b6" : t.border}`,
              background: n <= value ? "#f472b620" : "transparent",
              color: n <= value ? "#f472b6" : t.textMuted,
              fontSize: 14, fontWeight: n <= value ? 800 : 400, cursor: "pointer" }}>
            {n}
          </button>
        ))}
      </div>
    </div>
  );
}

function BcForm({ entry: init, liste, onSave, onCancel, t, orgSettings }) {
  const [e, setE] = useState(init);
  function upd(f, v) { setE(p => ({ ...p, [f]: v })); }

  // Validate nr uniqueness
  const nrConflict = liste.some(p => p.id !== e.id && Number(p.nr) === Number(e.nr));

  const inputSt = { width: "100%", background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, boxSizing: "border-box" };
  const secSt = { background: t.surface, border: `1px solid ${t.border}`, borderRadius: 16, padding: 18, marginBottom: 14 };
  const labelSt = { fontSize: 12, color: t.textMuted, marginBottom: 7, display: "block", fontWeight: 600 };

  const aktiviteter = orgSettings?.aktiviteter || ["Runking", "Suging/blowjob", "Analsex (aktiv)", "Analsex (passiv)", "Frotting", "Kyssing", "Kåting/klyping", "Fingering/prostata", "BDSM/lek"];
  const steder = orgSettings?.steder || ["Soverom hjemme", "Badet hjemme", "Stuen hjemme", "Soverom hos noen andre", "Hotell/overnatting", "Bil", "Utendørs", "På jobb", "Annet sted"];

  function toggleAkt(a) {
    const cur = e.aktiviteter || [];
    upd("aktiviteter", cur.includes(a) ? cur.filter(x => x !== a) : [...cur, a]);
  }
  function toggleSted(s) {
    const cur = e.sted || [];
    upd("sted", cur.includes(s) ? cur.filter(x => x !== s) : [...cur, s]);
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", paddingBottom: 60 }}>
      <div style={{ padding: "16px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", borderBottom: `1px solid ${t.border}`, position: "sticky", top: 0, background: t.bg, zIndex: 10 }}>
        <button onClick={onCancel} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Avbryt</button>
        <span style={{ fontWeight: 800, fontSize: 16, color: "#c084fc" }}>🗒️ {init.navn || "Ny person"}</span>
        <button onClick={() => { if (!e.navn.trim()) return; onSave(e); }}
          style={{ background: "#c084fc", border: "none", borderRadius: 10, padding: "8px 16px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Lagre</button>
      </div>

      <div style={{ padding: "16px 16px 0" }}>

        {/* Nr + Navn */}
        <div style={secSt}>
          <div style={{ display: "flex", gap: 12, marginBottom: 14 }}>
            <div style={{ width: 80 }}>
              <label style={labelSt}>Nr. #</label>
              <input type="number" min="1" value={e.nr} onChange={ev => upd("nr", Number(ev.target.value))}
                style={{ ...inputSt, borderColor: nrConflict ? "#ef4444" : t.border }} />
              {nrConflict && <div style={{ fontSize: 11, color: "#ef4444", marginTop: 3 }}>Duplikat!</div>}
            </div>
            <div style={{ flex: 1 }}>
              <label style={labelSt}>Navn / kallenavn *</label>
              <input value={e.navn} onChange={ev => upd("navn", ev.target.value)}
                placeholder="Eks. Jonas, Tinder-guyen..." style={inputSt} />
            </div>
          </div>
          <label style={labelSt}>Dato (omtrentlig, valgfritt)</label>
          <input type="date" value={e.dato} onChange={ev => upd("dato", ev.target.value)} style={inputSt} />
        </div>

        {/* Sted */}
        <div style={secSt}>
          <label style={labelSt}>📍 Sted</label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {steder.map(s => {
              const on = (e.sted||[]).includes(s);
              return (
                <button key={s} onClick={() => toggleSted(s)}
                  style={{ padding: "6px 13px", borderRadius: 20, border: `1px solid ${on ? "#c084fc" : t.border}`,
                    background: on ? "#c084fc30" : "transparent", color: on ? "#c084fc" : t.textMuted,
                    fontSize: 13, cursor: "pointer", fontWeight: on ? 700 : 400 }}>
                  {s}
                </button>
              );
            })}
          </div>
        </div>

        {/* Aktiviteter */}
        <div style={secSt}>
          <label style={labelSt}>🔥 Hva vi gjorde</label>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
            {aktiviteter.map(a => {
              const on = (e.aktiviteter||[]).includes(a);
              return (
                <button key={a} onClick={() => toggleAkt(a)}
                  style={{ padding: "6px 13px", borderRadius: 20, border: `1px solid ${on ? "#f472b6" : t.border}`,
                    background: on ? "#f472b620" : "transparent", color: on ? "#f472b6" : t.textMuted,
                    fontSize: 13, cursor: "pointer", fontWeight: on ? 700 : 400 }}>
                  {a}
                </button>
              );
            })}
          </div>
        </div>

        {/* Ratinger */}
        <div style={secSt}>

              return (
                <button key={o} onClick={() => upd("igjen", o==="Ja")}
                  style={{ flex: 1, padding: "9px", borderRadius: 12,
                    border: `1px solid ${active ? "#c084fc" : t.border}`,
                    background: active ? "#c084fc20" : "transparent",

                    fontSize: 14, cursor: "pointer", fontWeight: 600 }}>

            })}

              <div>
                <label style={labelSt}>Antall ganger totalt</label>
                <input type="number" min="2" value={e.igjenAntall} onChange={ev => upd("igjenAntall", ev.target.value)}
                  placeholder="Eks. 3" style={{ ...inputSt, width: 100 }} />
              </div>
              <div>
                <label style={labelSt}>Merknad</label>
                <input value={e.igjenMerknad} onChange={ev => upd("igjenMerknad", ev.target.value)}
                  placeholder="Eks. sporadisk, kortvarig ting..." style={inputSt} />

        {/* Kommentar */}

          <textarea value={e.kommentar} onChange={ev => upd("kommentar", ev.target.value)}

}

function BcImportModal({ liste, onImport, onClose, t }) {
  const [tekst, setTekst] = useState("");
  const [preview, setPreview] = useState([]);
  const [feil, setFeil] = useState("");
  const [ferdig, setFerdig] = useState(null);

  function parseLinjer(raw) {
    return raw.split("\n")
      .map(l => l.trim())
      .filter(l => l.length > 0)
      .map(l => {
        const deler = l.split(",").map(d => d.trim());
        const navn = deler[0];
        const dato = deler[1] || "";
        return { navn, dato };
      })
      .filter(r => r.navn.length > 0);
  }

  function handleTekst(val) {
    setTekst(val);
    setFeil("");
    setFerdig(null);
    if (val.trim()) setPreview(parseLinjer(val).slice(0, 5));
    else setPreview([]);
  }

  function handleFil(e) {
    const fil = e.target.files[0];
    if (!fil) return;
    const reader = new FileReader();
    reader.onload = ev => handleTekst(ev.target.result);
    reader.readAsText(fil, "utf-8");
  }

  function handleImporter() {
    const rader = parseLinjer(tekst);
    if (rader.length === 0) { setFeil("Ingen gyldige navn funnet."); return; }
    const startNr = liste.length > 0 ? Math.max(...liste.map(p => p.nr || 0)) + 1 : 1;
    const nye = rader.map((r, i) => ({
      id: "bc" + Date.now() + i,
      nr: startNr + i,
      navn: r.navn,
      dato: r.dato,
      sted: [], aktiviteter: [],
      seksRating: 3, fysiskRating: 3, psykiskRating: 3, kjemiRating: 3,
      igjen: false, igjenAntall: "", igjenMerknad: "", kommentar: "",
    }));
    onImport(nye);
    setFerdig(nye.length);
  }

  const inputSt = { background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", color: t.text, fontSize: 14, outline: "none", fontFamily: "inherit", width: "100%", boxSizing: "border-box" };

  return (
    <div style={{ position: "fixed", inset: 0, background: t.overlay, zIndex: 300, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={onClose}>
      <div onClick={e => e.stopPropagation()} style={{ background: t.surface, borderRadius: "20px 20px 0 0", width: "100%", maxWidth: 480, padding: "24px 20px 44px", maxHeight: "88vh", overflowY: "auto" }}>
        <div style={{ fontWeight: 800, fontSize: 18, color: t.text, marginBottom: 6 }}>📥 Importer liste</div>
        <div style={{ fontSize: 13, color: t.textMuted, marginBottom: 20, lineHeight: 1.6 }}>
          Lim inn navn — ett per linje. Du kan eventuelt legge til dato etter et komma.<br />
          <span style={{ color: t.textFaint, fontSize: 12 }}>Eks: <code style={{ background: t.bg, padding: "1px 5px", borderRadius: 4 }}>Jonas, 2022-06-15</code></span>
        </div>

        <div style={{ marginBottom: 14 }}>
          <span style={{ fontSize: 13, fontWeight: 700, color: t.textMuted, display: "block", marginBottom: 6 }}>Last opp fil (.csv eller .txt)</span>
          <input type="file" accept=".csv,.txt,text/plain,text/csv" onChange={handleFil}
            style={{ ...inputSt, padding: "8px 12px", cursor: "pointer" }} />
        </div>

        <div style={{ textAlign: "center", color: t.textFaint, fontSize: 13, marginBottom: 14 }}>— eller lim inn direkte —</div>

        <textarea value={tekst} onChange={e => handleTekst(e.target.value)}
          placeholder={"Jonas\nMikkel, 2021-03-10\nTinder-guyen\nHotell-Karl, 2023-08-20"}
          rows={7} style={{ ...inputSt, resize: "none", lineHeight: 1.7, fontFamily: "monospace", fontSize: 13 }} />

        {preview.length > 0 && !ferdig && (
          <div style={{ background: t.bg, border: `1px solid ${t.border}`, borderRadius: 10, padding: "12px 14px", marginTop: 12 }}>
            <div style={{ fontSize: 12, fontWeight: 700, color: t.textMuted, marginBottom: 8 }}>
              Forhåndsvisning ({parseLinjer(tekst).length} navn totalt):
            </div>
            {preview.map((r, i) => (
              <div key={i} style={{ fontSize: 13, color: t.text, padding: "3px 0", borderBottom: i < preview.length - 1 ? `1px solid ${t.border}` : "none" }}>
                <span style={{ color: t.purple, fontWeight: 700, marginRight: 8 }}>#{liste.length + 1 + i}</span>
                {r.navn}
                {r.dato && <span style={{ color: t.textFaint, marginLeft: 8, fontSize: 12 }}>{r.dato}</span>}
              </div>
            ))}
            {parseLinjer(tekst).length > 5 && (
              <div style={{ fontSize: 12, color: t.textFaint, marginTop: 6 }}>...og {parseLinjer(tekst).length - 5} til</div>
            )}
          </div>
        )}

        {feil && <div style={{ color: "#ef4444", fontSize: 13, marginTop: 10 }}>{feil}</div>}

        {ferdig !== null && (
          <div style={{ background: "#22c55e22", border: "1px solid #22c55e", borderRadius: 10, padding: "12px 14px", marginTop: 12, color: "#22c55e", fontWeight: 700, fontSize: 14 }}>
            ✓ {ferdig} personer importert!
          </div>
        )}

        <div style={{ display: "flex", gap: 10, marginTop: 20 }}>
          <button onClick={onClose} style={{ flex: 1, padding: "14px", borderRadius: 12, border: `1px solid ${t.border}`, background: t.bg, color: t.textMuted, fontWeight: 700, cursor: "pointer" }}>
            {ferdig !== null ? "Lukk" : "Avbryt"}
          </button>
          {ferdig === null && (
            <button onClick={handleImporter} disabled={!tekst.trim()}
              style={{ flex: 2, padding: "14px", borderRadius: 12, border: "none", background: tekst.trim() ? t.purple : t.border, color: "#fff", fontWeight: 700, fontSize: 15, cursor: tekst.trim() ? "pointer" : "default" }}>
              Importer {tekst.trim() ? parseLinjer(tekst).length + " navn" : ""}
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function BodyCountApp({ t, onBack }) {
  const [liste, setListe] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [sort, setSort] = useState("nr");
  const [sortDir, setSortDir] = useState("desc");
  const [showForm, setShowForm] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [viewEntry, setViewEntry] = useState(null);
  const [search, setSearch] = useState("");
  const [orgSettings, setOrgSettings] = useState(null);
  const [showImport, setShowImport] = useState(false);

  useEffect(() => {
    setListe(bcLoad());
    try {
      const os = localStorage.getItem("hemmelig:orgasme:settings");
      if (os) setOrgSettings(JSON.parse(os));
    } catch(_) {}
    setLoaded(true);
  }, []);

  function save(updated) { setListe(updated); bcSave(updated); }

  function handleImport(nye) {
    const updated = [...liste, ...nye];
    save(updated);
    setShowImport(false);
  }

  function handleSave(entry) {
    const existing = liste.find(e => e.id === entry.id);
    if (existing) save(liste.map(e => e.id===entry.id ? entry : e));
    else save([entry, ...liste]);
    setShowForm(false); setEditEntry(null);
  }

  function handleDelete(id) {
    if (!confirm("Slette denne personen fra listen?")) return;
    save(liste.filter(e => e.id !== id));
    setViewEntry(null);
  }

  const snitt = (p) => (p.seksRating + p.fysiskRating + p.psykiskRating + p.kjemiRating) / 4;

  function handleSort(k) {
    if (sort === k) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSort(k); setSortDir(k === "rating" ? "desc" : k === "nr" ? "desc" : "asc"); }
  }

  const sorted = [...liste]
    .filter(p => !search || p.navn.toLowerCase().includes(search.toLowerCase()))
    .sort((a, b) => {
      let cmp = 0;
      if (sort === "navn") cmp = a.navn.localeCompare(b.navn, "nb");
      else if (sort === "rating") cmp = snitt(a) - snitt(b);
      else if (sort === "dato") cmp = (a.dato || "").localeCompare(b.dato || "");
      else cmp = (a.nr||0) - (b.nr||0);
      return sortDir === "desc" ? -cmp : cmp;
    });

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;

  if (showForm || editEntry) {
    return <BcForm entry={editEntry || bcBlank(liste)} liste={liste} onSave={handleSave}
      onCancel={() => { setShowForm(false); setEditEntry(null); }} t={t} orgSettings={orgSettings} />;
  }
  if (viewEntry) {
    return <BcDetalj person={viewEntry} onBack={() => setViewEntry(null)}
      onEdit={p => { setViewEntry(null); setEditEntry(p); }} onDelete={handleDelete} t={t} />;
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontWeight: 800, fontSize: 18, color: "#c084fc" }}>🗒️ Body count</span>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => setShowImport(true)}
            style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 12px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>📥</button>
          <button onClick={() => setShowForm(true)}
            style={{ background: "#c084fc", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ny</button>
        </div>
      </div>

      <div style={{ margin: "14px 20px 0", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 14, padding: "14px 18px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <span style={{ fontSize: 13, color: t.textMuted }}>Totalt antall</span>
        <span style={{ fontSize: 28, fontWeight: 900, color: "#c084fc" }}>{liste.length}</span>
      </div>

      <div style={{ padding: "12px 20px 0" }}>
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Søk på navn..."
          style={{ width: "100%", background: t.surface, border: `1px solid ${t.border}`, borderRadius: 12, padding: "10px 14px", color: t.text, fontSize: 14, boxSizing: "border-box" }} />
      </div>

      <div style={{ display: "flex", gap: 8, padding: "10px 20px 0" }}>
        {[["nr","# Nr"],["dato","📅 Dato"],["navn","🔤 Navn"],["rating","⭐ Rating"]].map(([k,l]) => (
          <button key={k} onClick={() => handleSort(k)}
            style={{ padding: "7px 14px", borderRadius: 20, border: `1px solid ${sort===k ? "#c084fc" : t.border}`,
              background: sort===k ? "#c084fc20" : "transparent", color: sort===k ? "#c084fc" : t.textMuted,
              fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            {l}{sort===k ? (sortDir === "desc" ? " ↓" : " ↑") : ""}
          </button>
        ))}
      </div>

      <div style={{ padding: "14px 20px 0" }}>
        {sorted.length === 0 && (
          <div style={{ textAlign: "center", color: t.textFaint, fontSize: 14, padding: "40px 0" }}>
            {search ? "Ingen treff" : "Ingen registrert ennå — trykk «+ Ny» eller importer med 📥"}
          </div>
        )}
        {sorted.map(p => <BcKort key={p.id} person={p} onClick={() => setViewEntry(p)} t={t} />)}
      </div>

      {showImport && (
        <BcImportModal liste={liste} onImport={handleImport} onClose={() => setShowImport(false)} t={t} />
      )}
    </div>
  );
}

  try { const r = localStorage.getItem("hemmelig:onskeliste"); return r ? JSON.parse(r) : []; } catch(_) { return []; }
}
function onSaveData(data) {
  try { localStorage.setItem("hemmelig:onskeliste", JSON.stringify(data)); } catch(_) {}
}

  return {
    id: "on" + Date.now(),
    navn: "",
    interessegrad: 3,
    realistisk: 3,
    fraHvor: "",
    drommer: "",
    notater: "",

function OnForm({ entry: init, onSave, onCancel, t }) {
  const [e, setE] = useState(init);
  function upd(f, v) { setE(p => ({ ...p, [f]: v })); }

function OnskelisteApp({ t, onBack }) {
  const [liste, setListe] = useState([]);
  const [loaded, setLoaded] = useState(false);
  const [sort, setSort] = useState("interesse"); // "interesse"|"realistisk"|"navn"
  const [showForm, setShowForm] = useState(false);
  const [editEntry, setEditEntry] = useState(null);
  const [viewEntry, setViewEntry] = useState(null);

  useEffect(() => { setListe(onLoad()); setLoaded(true); }, []);

  function save(updated) { setListe(updated); onSaveData(updated); }

  function handleSave(entry) {
    const existing = liste.find(e => e.id === entry.id);
    if (existing) save(liste.map(e => e.id===entry.id ? entry : e));
    else save([entry, ...liste]);
    setShowForm(false); setEditEntry(null);
  }

  function handleDelete(id) {
    if (!confirm("Slette denne personen fra ønskelisten?")) return;
    save(liste.filter(e => e.id !== id));
    setViewEntry(null);
  }

  const sorted = [...liste].sort((a, b) => {
    if (sort === "navn") return a.navn.localeCompare(b.navn, "nb");
    if (sort === "realistisk") return b.realistisk - a.realistisk;
    return b.interessegrad - a.interessegrad;
  });

  if (!loaded) return <div style={{ background: t.bg, minHeight: "100vh" }} />;

  if (showForm || editEntry) {
    return <OnForm entry={editEntry || onBlank()} onSave={handleSave} onCancel={() => { setShowForm(false); setEditEntry(null); }} t={t} />;
  }
  if (viewEntry) {
    return <OnDetalj person={viewEntry} onBack={() => setViewEntry(null)} onEdit={p => { setViewEntry(null); setEditEntry(p); }} onDelete={handleDelete} t={t} />;
  }

  return (
    <div style={{ background: t.bg, minHeight: "100vh", color: t.text, paddingBottom: 40 }}>
      <div style={{ padding: "16px 20px 0", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
        <button onClick={onBack} style={{ background: t.surface2, border: `1px solid ${t.border}`, borderRadius: 10, padding: "8px 14px", color: t.textMuted, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>← Tilbake</button>
        <span style={{ fontWeight: 800, fontSize: 18, color: "#f472b6" }}>💭 Ønskeliste</span>
        <button onClick={() => setShowForm(true)}
          style={{ background: "#c084fc", border: "none", borderRadius: 10, padding: "8px 14px", color: "#fff", fontSize: 13, fontWeight: 700, cursor: "pointer" }}>+ Ny</button>
      </div>

      {/* Sortering */}
      <div style={{ display: "flex", gap: 8, padding: "14px 20px 0" }}>
        {[["interesse","🔥 Interesse"],["realistisk","🎯 Realistisk"],["navn","🔤 Navn"]].map(([k,l]) => (
          <button key={k} onClick={() => setSort(k)}
            style={{ padding: "7px 14px", borderRadius: 20,
              border: `1px solid ${sort===k ? "#f472b6" : t.border}`,
              background: sort===k ? "#f472b615" : "transparent",
              color: sort===k ? "#f472b6" : t.textMuted,
              fontSize: 12, fontWeight: 700, cursor: "pointer" }}>
            {l}
          </button>
        ))}
      </div>

      <div style={{ padding: "14px 20px 0" }}>
        {sorted.length === 0 && (
          <div style={{ textAlign: "center", color: t.textFaint, fontSize: 14, padding: "40px 0" }}>
            Ingen på ønskelisten ennå — trykk «+ Ny»
          </div>
        )}
        {sorted.map(p => (
          <OnKort key={p.id} person={p} onClick={() => setViewEntry(p)} t={t} />
        ))}
      </div>
    </div>
  );
}

// CSV export
function kinkExportCSV(vurderinger, notater) {
  const rows = [["Kategori", "Element", "Gi/Motta", "Status", "Notat"]];
  KINK_KATEGORIER.forEach(kat => {
    kat.items.forEach(item => {
      const key = item.id;
      const grLabel = item.gr === true ? "Gi" : item.gr === false ? "Motta" : "";
      const status = vurderinger[key] || "";
      const statusLabel = KINK_STATUS[status]?.label || "Ikke vurdert";
      const notat = notater[key] || "";
      rows.push([kat.navn.replace(/[^\w\s]/g,"").trim(), item.navn, grLabel, statusLabel, notat]);
    });
  });
  const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(",")).join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "kink-profil.csv"; a.click();
  URL.revokeObjectURL(url);
}

// CSV import
function kinkImportCSV(text, existingV, existingN) {
  const lines = text.split("\n").slice(1); // skip header
  const newV = { ...existingV };
  const newN = { ...existingN };
  const statusMap = {};
  Object.entries(KINK_STATUS).forEach(([k,v]) => { statusMap[v.label.toLowerCase()] = k; });
  let count = 0;
  lines.forEach(line => {
    const cols = line.split(/,(?=(?:[^"]*"[^"]*")*[^"]*$)/).map(c => c.replace(/^"|"$/g,"").replace(/""/g,'"'));
    if (cols.length < 4) return;
    const [, navn, , statusLabel, notat] = cols;
    // Find item by name
    for (const kat of KINK_KATEGORIER) {
      const item = kat.items.find(i => i.navn === navn);
      if (item) {
        const sk = statusMap[statusLabel.toLowerCase()];
        if (sk !== undefined) { newV[item.id] = sk; count++; }
        if (notat) newN[item.id] = notat;
        break;
      }
    }
  });
  return { vurderinger: newV, notater: newN, count };
}
